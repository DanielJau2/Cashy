  } else {
    var sign=e.type==="Ingreso"?"+":"−", tdc=E.isTDC(e.account);
    var tg=(e.tags||"").trim()?("#"+String(e.tags).split(",").map(function(x){return x.trim();}).filter(Boolean).join(" #")):"";
    var isSh=(e.scope==="shared"), isMir=!!e.mirror;
    var shInfo=isSh?(names()[e.paidBy==="p2"?"p2":"p1"]+" · "+E.splitLabel(e.splitP1)):"";
    var sub=[shInfo,e.account!=="Cash"?e.account:"",e.place,e.details,tg].filter(Boolean).join(" · ")||(e.expenseType||e.type);
    var chip=isSh?((e.review==="reviewed")?'<span class="rvchip done">'+ico("check",10)+'revisado</span>':'<span class="rvchip pend">por revisar</span>'):"";
    var tag=(isSh||isMir)?('<span class="rmark">'+ico("mouse",12)+'</span>'):'';
    inner='<div class="ic" style="color:'+esc(colorFor(e.account))+'">'+esc(catInitial(e.category))+'</div>'+
      '<div class="mid"><div class="t">'+tag+esc(e.category||"Sin categoría")+chip+'</div><div class="s">'+esc(sub)+'</div></div>'+
      (e.exported?'<div class="dot"></div>':'')+'<div class="amt '+(e.type==="Ingreso"?"in":"out")+'">'+sign+esc(money(e.amount).replace("$",""))+'</div>';
  }
  var rowEl='<div class="row" onclick="rowClick(\''+click+'\',\''+e.id+'\')"'+
    (swipe?' ontouchstart="rswStart(event,\''+e.id+'\')" ontouchmove="rswMove(event)" ontouchend="rswEnd(event)"':'')+'>'+inner+'</div>';
  if(!swipe) return rowEl.replace('class="row"','class="row" style="margin-bottom:8px"');
  var delay=(idx>=0)?(' style="animation-delay:'+Math.min(idx*26,220)+'ms"'):'';
  return '<div class="rwrap'+(idx>=0?" anim":"")+'" id="rw_'+e.id+'"'+delay+'>'+
    '<div class="ract"><button class="dup" onclick="rowDup(\''+e.id+'\')">'+ico("copy",18)+'</button><button class="del" onclick="rowDel(\''+e.id+'\')">'+ico("trash",18)+'</button></div>'+
    rowEl+'</div>';
}
/* --- gesto horizontal en filas --- */
var __rs=null,__rsOpen=null;
function rswCloseOpen(){ if(__rsOpen){ var r=document.querySelector("#rw_"+__rsOpen+" .row"); if(r) r.style.transform=""; __rsOpen=null; } }
function rswStart(ev,id){ var t=ev.touches&&ev.touches[0]; if(!t) return;
  if(__rsOpen&&__rsOpen!==id) rswCloseOpen();
  __rs={id:id,x:t.clientX,y:t.clientY,dx:0,drag:false,base:(__rsOpen===id?-132:0)};
}
function rswMove(ev){ if(!__rs) return; var t=ev.touches&&ev.touches[0]; if(!t) return;
  var dx=t.clientX-__rs.x, dy=Math.abs(t.clientY-__rs.y);
  if(!__rs.drag){ if(Math.abs(dx)>10&&Math.abs(dx)>dy) __rs.drag=true; else if(dy>10){ __rs=null; return; } else return; }
  if(ev.cancelable) ev.preventDefault();
  var x=Math.max(-150,Math.min(0,__rs.base+dx)); __rs.dx=x;
  var r=document.querySelector("#rw_"+__rs.id+" .row"); if(r){ r.style.transition="none"; r.style.transform="translateX("+x+"px)"; }
}
function rswEnd(ev){ if(!__rs) return; var s=__rs; __rs=null;
  var r=document.querySelector("#rw_"+s.id+" .row"); if(!r) return;
  r.style.transition="";
  if(!s.drag) return;
  s.suppress=true; __rsSuppress=s.id;
  setTimeout(function(){ if(__rsSuppress===s.id) __rsSuppress=null; },350);
  if(s.dx<-70){ r.style.transform="translateX(-132px)"; __rsOpen=s.id; buzz(6); }
  else { r.style.transform=""; if(__rsOpen===s.id) __rsOpen=null; }
}
var __rsSuppress=null;
function rowClick(fn,id){ if(__rsSuppress===id){ __rsSuppress=null; return; } if(__rsOpen){ rswCloseOpen(); return; } if(typeof window[fn]==="function") window[fn](id); }
function rowDup(id){ var e=DB.entries[id]; if(!e) return; var nid=uid(); var copy=Object.assign({},e);
  copy.id=nid; copy.createdAt=Date.now(); copy.updatedAt=Date.now(); copy.exported=false; copy.deleted=false; copy.date=E.todayISO();
  DB.entries[nid]=copy; __rsOpen=null; save(); render(); toast("Duplicado a hoy ✔",true); }
function rowDel(id){ var e=DB.entries[id]; if(!e) return; e.deleted=true; e.updatedAt=Date.now(); __rsOpen=null; save(); render();
  toast("Borrado","",{label:"Deshacer",fn:function(){ var x=DB.entries[id]; if(x){ x.deleted=false; x.updatedAt=Date.now(); save(); render(); toast("Restaurado ✔",true); } }}); }

/* ============ RESUMEN / GRÁFICAS ============ */
function resRange(){
  var t=E.todayISO();
  if(V.resPeriod==="sem") return [E.addDays(t,-6), t];
  if(V.resPeriod==="ano") return [E.addDays(t,-364), t];
  if(V.resPeriod==="rango") return [V.resFrom||null, V.resTo||null];
  return [E.addDays(t,-29), t]; // mes = últimos 30 días
}
function resLabel(){
  if(V.resPeriod==="sem") return "Últimos 7 días";
  if(V.resPeriod==="ano") return "Último año";
  if(V.resPeriod==="rango"){ return (V.resFrom||"…")+" → "+(V.resTo||"…"); }
  return "Últimos 30 días";
}
function viewResumen(){
  var r=resRange(), from=r[0], to=r[1];
  var ents=entriesFor(V.resScope);
  var isEt=V.resDim==="et";
  var kind=V.resKind;
  var rows;
  if(V.resDim==="acct") rows=E.accountTotals(ents,from,to,kind);
  else if(isEt){ rows=E.etTotals(ents,from,to); kind="Egreso"; }
  else rows=E.categoryTotals(ents,from,to,kind).map(function(c){return {label:c.category,total:c.total};});
  var total=rows.reduce(function(s,x){return s+x.total;},0);

  var periods=[["sem","Semana"],["mes","Mes"],["ano","Año"],["rango","Rango"]];
  var pseg='<div class="seg mini" style="margin-top:6px">'+periods.map(function(p){return '<button class="'+(V.resPeriod===p[0]?"on out":"")+'" onclick="V.resPeriod=\''+p[0]+'\';render()">'+p[1]+'</button>';}).join("")+'</div>';
  var rangeUI = V.resPeriod==="rango"
    ? '<div class="rangerow"><div class="field"><div class="fl">Desde</div><input type="date" value="'+esc(V.resFrom)+'" oninput="V.resFrom=this.value;render()"></div><div class="field"><div class="fl">Hasta</div><input type="date" value="'+esc(V.resTo)+'" oninput="V.resTo=this.value;render()"></div></div>' : '';
  var dims=[["cat","Categoría"],["acct","Cuenta"],["et","Vital/Extra"]];
  var dseg='<div class="seg mini" style="margin-top:6px">'+dims.map(function(x){return '<button class="'+(V.resDim===x[0]?"on out":"")+'" onclick="V.resDim=\''+x[0]+'\';render()">'+x[1]+'</button>';}).join("")+'</div>';
  var kseg = isEt? '' : '<div class="seg mini" style="margin-top:6px"><button class="'+(V.resKind==="Egreso"?"on out":"")+'" onclick="V.resKind=\'Egreso\';render()">Gastos</button><button class="'+(V.resKind==="Ingreso"?"on in":"")+'" onclick="V.resKind=\'Ingreso\';render()">Ingresos</button></div>';

  var isIn=(kind==="Ingreso");
  var bars = rows.length? rows.map(function(x,i){
    var pct=total>0?Math.round(x.total/total*100):0;
    var dl=Math.min(i*35,280);
    return '<div class="bar'+(isIn?" in":"")+'" style="animation-delay:'+dl+'ms"><div class="lab"><span class="c">'+esc(x.label)+'</span><span class="v">'+esc(money(x.total))+'</span></div>'+
      '<div class="track"><div class="fill" style="width:'+Math.max(pct,2)+'%;animation-delay:'+dl+'ms"></div></div></div>';
  }).join("") : '<div class="empty"><div class="big">Sin datos</div>No hay movimientos en este periodo.</div>';

  var hasShared=E.activeEntries(DB.entries).some(function(e){return e.scope==="shared";});
  var views=[["bars","Barras"],["dona","Dona"],["line","Tendencia"],["cal","Calendario"]];
  if(hasShared) views.push(["rat","Ratones"]);
  var vseg='<div class="seg mini">'+views.map(function(x){return '<button class="'+(V.resView===x[0]?"on out":"")+'" onclick="V.resView=\''+x[0]+'\';render()">'+x[1]+'</button>';}).join("")+'</div>';
  var sseg=hasShared?('<div class="seg mini" style="margin-top:6px">'+[["personal","Personal"],["shared","Ratones"],["all","Todo"]].map(function(x){return '<button class="'+(V.resScope===x[0]?"on out":"")+'" onclick="V.resScope=\''+x[0]+'\';render()">'+x[1]+'</button>';}).join("")+'</div>'):"";

  if(V.resView==="rat") return header("Resumen")+vseg+viewRatones();
  if(V.resView==="cal") return header("Resumen")+vseg+sseg+weekCompareCard()+calView();
  var chart;
  if(V.resView==="dona") chart=donutView(rows,total,isIn);
  else if(V.resView==="line") chart=trendView(from,to,kind);
  else chart=bars;

  var isLine=(V.resView==="line");
  return header("Resumen")+
    vseg+ sseg+ pseg+ rangeUI+ ((isLine||V.resScope==="shared")?"":dseg)+ kseg+
    '<div class="card" style="text-align:center;padding:12px;margin-top:10px"><div class="k" style="font-size:11px;color:var(--faint);letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px">'+(isEt?"Total gastado":(isIn?"Total ingresos":"Total gastado"))+' · '+esc(resLabel())+'</div><div style="font-family:var(--fd);font-size:32px;letter-spacing:.02em;'+(isIn?"color:var(--green)":"")+'">'+esc(money(total))+'</div></div>'+
    chart+
    weekCompareCard();
}
/* --- comparativa semanal --- */
function sumEgreso(from,to){
  var t=0; E.activeEntries(entriesFor(V.tab==="res"?V.resScope:"all")).forEach(function(e){ if(e.kind==="txn"&&e.type==="Egreso"&&E.inRange(e.date,from,to)) t+=e.amount||0; });
  return Math.round(t*100)/100;
}
function weekCompareCard(){
  var t=E.todayISO();
  var cur=sumEgreso(E.addDays(t,-6),t), prev=sumEgreso(E.addDays(t,-13),E.addDays(t,-7));
  if(!cur&&!prev) return "";
  var msg,cls,pct;
  if(!prev){ msg="No hay datos de la semana pasada para comparar."; cls=""; pct="—"; }
  else{
    var d=Math.round((cur-prev)/prev*100);
    pct=(d>0?"+":"")+d+"%"; cls=d>0?"up":"down";
    msg=d>0?"Llevas más gasto que la semana pasada.":(d<0?"Vas gastando menos que la semana pasada. 👏":"Igual que la semana pasada.");
  }
  return '<div class="card" style="margin-top:12px"><div class="weekcmp"><div class="pct '+cls+'">'+esc(pct)+'</div>'+
    '<div class="txt"><b style="color:var(--bone)">Últimos 7 días: '+esc(money(cur))+'</b><br>'+esc(msg)+' (7 días previos: '+esc(money(prev))+')</div></div></div>';
}
/* --- dona --- */
var DONUT_PAL_ROT=[0,26,-30,52,-60,86,-95,120,150,-140];
function donutView(rows,total,isIn){
  if(!rows.length||total<=0) return '<div class="empty"><div class="big">Sin datos</div>No hay movimientos en este periodo.</div>';
  var top=rows.slice(0,8), rest=rows.slice(8);
  if(rest.length){ top.push({label:"Otros",total:rest.reduce(function(s,x){return s+x.total;},0)}); }
  var base=hexToHsl(colorFor((V.mode==="Transferencia"?V.xferFrom:V.account)||"Cash"));
  if(base.s<10){ base={h:252,s:70,l:60}; }
  var C=2*Math.PI*70, off=0, segs="", legend="";
  top.forEach(function(x,i){
    var frac=x.total/total;
    var col=hsl(base.h+DONUT_PAL_ROT[i%DONUT_PAL_ROT.length], Math.max(40,Math.min(85,base.s)), Math.max(38,Math.min(66,base.l+((i%3)-1)*6)));
    segs+='<circle r="70" cx="90" cy="90" fill="none" stroke="'+col+'" stroke-width="26" stroke-linecap="butt" '+
      'stroke-dasharray="'+(Math.max(frac*C-2,1)).toFixed(2)+' '+C.toFixed(2)+'" stroke-dashoffset="'+(-off).toFixed(2)+'" transform="rotate(-90 90 90)"/>';
    off+=frac*C;
    legend+='<div class="dl"><span class="sw" style="background:'+col+'"></span><span class="nm">'+esc(x.label)+'</span><span class="vv">'+esc(money(x.total))+' · '+Math.round(frac*100)+'%</span></div>';
  });
  return '<div class="card"><div class="donut"><svg width="180" height="180" viewBox="0 0 180 180">'+segs+
    '<text x="90" y="86" text-anchor="middle" style="font-family:var(--fd);font-weight:800;font-size:19px" fill="var(--text)">'+esc(money(total))+'</text>'+
    '<text x="90" y="104" text-anchor="middle" style="font-size:10px" fill="var(--faint)">'+(isIn?"ingresos":"gastado")+'</text>'+
    '</svg></div><div class="dlegend">'+legend+'</div></div>';
}
/* --- tendencia (línea por día) --- */
function trendView(from,to,kind){
  var t=E.todayISO();
  if(!from) from=E.addDays(t,-29); if(!to) to=t;
  var days=[],d=from,guard=0;
  while(d<=to&&guard<370){ days.push(d); d=E.addDays(d,1); guard++; }
  if(days.length<2) return '<div class="empty"><div class="big">Rango muy corto</div>Elige al menos dos días.</div>';
  var byDay={};
  E.activeEntries(entriesFor(V.resScope)).forEach(function(e){ if(e.kind==="txn"&&e.type===kind&&E.inRange(e.date,from,to)) byDay[e.date]=(byDay[e.date]||0)+(e.amount||0); });
  var vals=days.map(function(x){return byDay[x]||0;});
  var mx=Math.max.apply(null,vals.concat([1]));
  var W=340,H=150,PL=8,PR=8,PT=12,PB=22;
  var iw=(W-PL-PR)/(days.length-1);
  function X(i){ return PL+i*iw; } function Y(v){ return PT+(H-PT-PB)*(1-v/mx); }
  var pts=vals.map(function(v,i){return X(i).toFixed(1)+","+Y(v).toFixed(1);}).join(" ");
  var dots=vals.map(function(v,i){ return v>0?'<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(v).toFixed(1)+'" r="2.6" fill="var(--acc)"/>':""; }).join("");
  var avg=vals.reduce(function(s,x){return s+x;},0)/days.length;
  var labels="";
  for(var i=0;i<days.length;i+=Math.max(1,Math.round(days.length/6))){
    labels+='<text x="'+X(i).toFixed(1)+'" y="'+(H-6)+'" text-anchor="middle" font-size="9" fill="var(--faint)">'+(+days[i].slice(8,10))+'</text>';
  }
  var area='<polygon points="'+X(0).toFixed(1)+','+Y(0)+' '+pts+' '+X(days.length-1).toFixed(1)+','+Y(0)+'" fill="var(--acc)" opacity="0.10"/>';
  return '<div class="card trendwrap"><div class="k" style="font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">'+(kind==="Ingreso"?"Ingresos":"Gasto")+' por día · máx '+esc(money(mx))+'</div>'+
    '<svg viewBox="0 0 '+W+' '+H+'">'+
    '<line x1="'+PL+'" x2="'+(W-PR)+'" y1="'+Y(avg).toFixed(1)+'" y2="'+Y(avg).toFixed(1)+'" stroke="var(--line)" stroke-dasharray="4 4"/>'+
    area+
    '<polyline points="'+pts+'" fill="none" stroke="var(--acc)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>'+
    dots+labels+'</svg>'+
    '<div style="font-size:11.5px;color:var(--faint);margin-top:4px">Línea punteada = promedio diario ('+esc(money(Math.round(avg)))+')</div></div>';
}
/* --- calendario de balance por día --- */
function calView(){
  var m=V.resCalMonth, y=+m.slice(0,4), mo=+m.slice(5,7);
  var label=E.fromISO(m+"-01").toLocaleDateString("es-MX",{month:"long",year:"numeric"});
  var daysIn=new Date(y,mo,0).getDate();
  var first=new Date(y,mo-1,1).getDay(); /* 0=dom */
  var lead=(first+6)%7; /* lunes primero */
  var byDay={};
  E.activeEntries(entriesFor(V.resScope)).forEach(function(e){
    if(e.kind!=="txn") return;
    if(e.date.slice(0,7)!==m) return;
    var o=byDay[e.date]||(byDay[e.date]={inn:0,out:0});
    if(e.type==="Ingreso") o.inn+=e.amount||0; else o.out+=e.amount||0;
  });
  var t=E.todayISO();
  var cells='<div class="dow">Lun</div><div class="dow">Mar</div><div class="dow">Mié</div><div class="dow">Jue</div><div class="dow">Vie</div><div class="dow">Sáb</div><div class="dow">Dom</div>';
  for(var b=0;b<lead;b++) cells+='<div class="calcell blank"></div>';
  for(var dnum=1;dnum<=daysIn;dnum++){
    var iso=m+"-"+String(dnum).padStart(2,"0");
    var o=byDay[iso];
    cells+='<button class="calcell'+(iso===t?" today":"")+'" onclick="openDaySheet(\''+iso+'\')">'+
      '<span class="dn">'+dnum+'</span>'+
      (o&&o.inn?'<span class="ci">+'+esc(money(Math.round(o.inn)).replace("$","$"))+'</span>':'')+
      (o&&o.out?'<span class="co">'+esc(money(Math.round(o.out)))+'</span>':'')+
      '</button>';
  }
  var mi=byDay, totIn=0, totOut=0; Object.keys(mi).forEach(function(k){ totIn+=mi[k].inn; totOut+=mi[k].out; });
  return '<div class="sechead" style="margin-top:14px"><h3>'+esc(cap(label))+'</h3><div class="nav"><button onclick="shiftCal(-1)">'+ico("chevL",18)+'</button><button onclick="shiftCal(1)">'+ico("chevR",18)+'</button></div></div>'+
    '<div class="twocol"><div class="card"><div class="k">Entró</div><div class="val in">'+esc(money(totIn))+'</div></div>'+
    '<div class="card"><div class="k">Salió</div><div class="val out">'+esc(money(totOut))+'</div></div></div>'+
    '<div class="calgrid">'+cells+'</div>'+
    '<p style="font-size:12px;color:var(--faint);margin-top:10px;text-align:center">Toca un día para ver sus movimientos.</p>';
}
function shiftCal(d){ var dt=E.fromISO(V.resCalMonth+"-01"); dt.setMonth(dt.getMonth()+d); V.resCalMonth=E.iso(dt).slice(0,7); render(); }
function openDaySheet(iso){

/* ============ RATONES (balance de pareja) ============ */

  var balCard='<div class="card bigbal ratbal"><div class="lbl">'+ico("mouse",16)+' Cuentas de Ratones · histórico</div>'+
    '<div class="v'+(abs&&meOwes?" neg":"")+'">'+(abs?esc(money(abs)):"$0")+'</div>'+
    '<div class="who">'+esc(owes)+(abs?"":" 🎉".replace(" 🎉",""))+'</div>'+
    (abs?('<button class="btn ghost mini" style="margin-top:12px" onclick="openCorte()">Registrar corte de '+esc(money(abs))+'</button>'):'')+

    var paid=(p==="p1")?sb.p1Paid:sb.p2Paid, share=(p==="p1")?sb.p1Share:sb.p2Share;

  var rangeUI = V.resPeriod==="rango"

  var rows=E.sharedCatTotals(DB.entries,from,to);

function openCorte(){

/* ============ EXPORTAR ============ */
function scopeEntries(){
  var arr=E.activeEntries(liveEntries()).slice().sort(function(a,b){ return (a.date+"~"+(a.createdAt||0))<(b.date+"~"+(b.createdAt||0))?-1:1; });
  if(V.expScope==="pend") return arr.filter(function(e){return !e.exported;});
  if(V.expScope==="mes"){ var m=E.todayISO().slice(0,7); return arr.filter(function(e){return e.date.slice(0,7)===m;}); }
  if(V.expScope==="rango"){ var f=V.expFrom,t=V.expTo; return arr.filter(function(e){return E.inRange(e.date,f||null,t||null);}); }
  return arr;
}
function exportMine(e){ return e.scope!=="shared" || (e.paidBy||"p1")===prof(); }
function exportSharedArr(arr){

function copyExpShared(n){

  if(!text){ toast("Nada para copiar"); return; }

function copyText(text,cb){
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(cb,function(){fb(text,cb);}); }
  else fb(text,cb);
}
function fb(text,cb){
  try{ var ta=document.createElement("textarea"); ta.value=text; ta.setAttribute("readonly","");
    ta.style.position="fixed"; ta.style.top="-1000px"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    var okc=document.execCommand("copy"); document.body.removeChild(ta);
    if(okc){ cb&&cb(); return; } }catch(e){}
  toast("Usa «Ver texto» y copia manual");
}

function saveWebhook(){

  var el2=document.getElementById("whUrlS"); if(el2){ var v=el2.value.trim(); if(v!==(DB.sharedMeta.webhookUrl||"")){ DB.sharedMeta.webhookUrl=v; touchSharedMeta(); } }

function sendWebhook(){
  var url=((document.getElementById("whUrl")||{}).value||"").trim();
  var urlS=((document.getElementById("whUrlS")||{}).value||"").trim();
  var ok=function(u){ return /^https:\/\/script\.google\.com\//.test(u); };
  DB.settings.webhookUrl=ok(url)?url:DB.settings.webhookUrl;
  if(urlS!==(DB.sharedMeta.webhookUrl||"")){ DB.sharedMeta.webhookUrl=urlS; touchSharedMeta(); }
  save();
  var pend=E.activeEntries(liveEntries()).slice().sort(function(a,b){ return (a.date+"~"+(a.createdAt||0))<(b.date+"~"+(b.createdAt||0))?-1:1; })
    .filter(function(e){return !e.exported&&exportMine(e);});
  if(!pend.length){ setWh("No hay pendientes por enviar."); return; }
  var normal=[],tdc=[],shRows=[];
  pend.forEach(function(e){
    E.expandEntry(e).forEach(function(x){ (x.tab==="tdc"?tdc:normal).push(x.row); });
    if(e.scope==="shared"&&e.kind!=="transfer") shRows.push(E.sharedRow(e,names()));
  });
  var jobs=[];
  if(normal.length||tdc.length){
    if(!ok(url)){ setWh("Pon la URL de tu sheet personal."); return; }
    jobs.push(fetch(url,{method:"POST",mode:"no-cors",body:JSON.stringify({normal:normal,tdc:tdc,colsNormal:E.COLS_NORMAL,colsTDC:E.COLS_TDC})}));
  }
  if(shRows.length){
    if(!ok(urlS)){ setWh("Hay Ratones pendientes: pon la URL del sheet compartido."); return; }
    jobs.push(fetch(urlS,{method:"POST",mode:"no-cors",body:JSON.stringify({ratones:shRows,colsRatones:E.colsShared(names())})}));
  }
  setWh("Enviando "+pend.length+"…");
  Promise.all(jobs).then(function(){ pend.forEach(function(e){ e.exported=true; e.updatedAt=Date.now(); }); save(); render(); setWh("Enviados "+pend.length+" ✔ (revisa tus hojas)"); })
    .catch(function(){ setWh("Sin conexión o Google no respondió. Usa Copiar."); });
}

function csvSplit(line,delim){
  var out=[],cur="",q=false;
  for(var i=0;i<line.length;i++){ var c=line[i];
    if(q){ if(c==='"'){ if(line[i+1]==='"'){ cur+='"'; i++; } else q=false; } else cur+=c; }
    else if(c==='"') q=true;
    else if(c===delim){ out.push(cur); cur=""; }
    else cur+=c;
  }
  out.push(cur); return out;
}
function parseImpDate(s){
  s=String(s||"").trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  var m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(m){ var y=+m[3]; if(y<100) y+=2000; var mo=+m[1], d=+m[2];
    if(mo>12&&d<=12){ var tmp=mo; mo=d; d=tmp; } /* tolera D/M/AA */
    if(mo<1||mo>12||d<1||d>31) return null;
    return y+"-"+String(mo).padStart(2,"0")+"-"+String(d).padStart(2,"0"); }
  return null;
}
function impNum(s){ var n=parseFloat(String(s||"").replace(/[$,\s]/g,"")); return isNaN(n)?null:Math.round(n*100)/100; }
function ensureAccount(name,tdc){
  if(!name) return;
  if(!DB.settings.accounts.some(function(a){return a.name===name;})){ DB.settings.accounts.push({name:name,tdc:!!tdc}); }
}
function ensureCategory(name,kind){
  if(!name||name==="Transferencias") return;
  if(!DB.settings.cats[name]) DB.settings.cats[name]={kind:kind||"out",et:"",orig:null};
}
function importRows(text,tab){
  var lines=String(text).replace(/\r/g,"").split("\n").filter(function(l){return l.trim();});
  if(!lines.length) return "Nada que importar.";
  var delim=(lines[0].indexOf("\t")>=0)?"\t":",";
  var start=0;
  if(/^date$/i.test(csvSplit(lines[0],delim)[0].trim())) start=1;
  var sig={}; E.activeEntries(DB.entries).forEach(function(e){ sig[impSig(e)]=1; });
  var okN=0,dup=0,bad=0,now=Date.now();
  for(var i=start;i<lines.length;i++){
    var c=csvSplit(lines[i],delim).map(function(x){return x.trim();});
    var date=parseImpDate(c[0]), e=null;
    if(!date){ bad++; continue; }
    if(tab==="tdc"){
      var amt=impNum(c[1]); if(amt===null){ bad++; continue; }
      var isPay=(c[3]==="Transferencias");
      var acct=isPay?(c[4]||c[5]||"TDC importada"):(c[5]||"TDC importada");
      e={kind:"txn",date:date,amount:Math.abs(amt),type:amt<0?"Ingreso":"Egreso",
         expenseType:c[2]||"",category:c[3]||"Sin categoría",place:isPay?"":(c[4]||""),account:acct,
         details:c[6]||"",msi:Math.max(1,parseInt(c[7])||1),tags:c[8]||""};
      ensureAccount(acct,true); ensureCategory(e.category,e.type==="Ingreso"?"in":"out");
    } else {
      var amt2=impNum(c[1]); if(amt2===null){ bad++; continue; }
      var acct2=c[6]||"Cash";
      e={kind:"txn",date:date,amount:Math.abs(amt2),type:(c[2]==="Ingreso")?"Ingreso":"Egreso",
         expenseType:c[3]||"",category:c[4]||"Sin categoría",place:c[5]||"",account:acct2,
         details:c[7]||"",msi:1,tags:c[8]||""};
      ensureAccount(acct2,false); ensureCategory(e.category,e.type==="Ingreso"?"in":"out");
    }
    var s=impSig(e);
    if(sig[s]){ dup++; continue; }
    sig[s]=1;
    var nid=uid()+i.toString(36);
    DB.entries[nid]=Object.assign({id:nid,createdAt:now+i,updatedAt:now+i,exported:true,deleted:false},e);
    okN++;
  }
  applyConfig(); save();
  var msg=okN+" importados";
  if(dup) msg+=" · "+dup+" duplicados saltados";
  if(bad) msg+=" · "+bad+" renglones no válidos";
  return msg+".";
}
function impSig(e){ if(e.kind==="transfer") return ["x",e.date,e.amount,e.fromAccount,e.toAccount].join("|");
  return ["t",e.date,e.amount,e.type,e.category,e.account,e.place||"",e.details||""].join("|"); }

    if(e.account===oldN) e.account=newN; if(e.fromAccount===oldN) e.fromAccount=newN; if(e.toAccount===oldN) e.toAccount=newN; });
  var f=DB.settings.favAccounts, fi=f.indexOf(oldN); if(fi>=0) f[fi]=newN;
  if(DB.settings.lastAccount===oldN) DB.settings.lastAccount=newN;
  if(V.account===oldN) V.account=newN; if(V.xferFrom===oldN) V.xferFrom=newN; if(V.xferTo===oldN) V.xferTo=newN;
}
function addAcct(tdc){ var nm=((document.getElementById("acNew")||{}).value||"").trim(); if(!nm){toast("Escribe el nombre");return;} if(DB.settings.accounts.some(function(a){return a.name===nm;})){toast("Ya existe");return;} DB.settings.accounts.push({name:nm,tdc:!!tdc}); applyConfig(); save(); render(); toast("Cuenta agregada",true); }
function toggleAcctTDC(i){ DB.settings.accounts[i].tdc=!DB.settings.accounts[i].tdc; applyConfig(); save(); render(); }
function renameAcct(i){ var a=DB.settings.accounts[i]; if(!a) return; var nn=prompt("Nuevo nombre para «"+a.name+"»:",a.name); if(nn==null) return; nn=nn.trim(); if(!nn||nn===a.name) return; if(DB.settings.accounts.some(function(x){return x.name===nn;})){toast("Ya existe");return;} var old=a.name; a.name=nn; migrateAccountName(old,nn); applyConfig(); save(); render(); toast("Renombrada",true); }

var draft=null,draftId=null,draftMultiIndex=null;
var __swy=null,__swSh=null,__swAtTop=false,__swInner=null;
function sheetShell(closer,inner){
  window.__sheetCloser=closer;
  return '<div class="sheetwrap"><div class="sheetbg" onclick="'+closer+'()"></div>'+
    '<div class="sheet" ontouchstart="swipeStart(event)" ontouchmove="swipeMove(event)" ontouchend="swipeEnd(event,\''+closer+'\')">'+
    '<div class="grab"></div>'+inner+'</div></div>';
}
function dismissSheet(){
  var root=document.getElementById("sheetroot"), wrap=root.firstElementChild;
  if(!wrap){ root.innerHTML=""; return; }
  wrap.classList.add("closing");
  setTimeout(function(){ if(wrap.parentNode===root) root.removeChild(wrap); },200);
}
function swipeStart(ev){ __swy=(ev.touches&&ev.touches[0]?ev.touches[0].clientY:null); __swSh=ev.currentTarget&&ev.currentTarget.closest?ev.currentTarget.closest(".sheet"):null;
  /* solo se puede arrastrar-para-cerrar si el gesto EMPIEZA con el sheet en el tope;
     si empieza a media lista, todo el gesto es scroll (no cierra "sin querer") */
  __swAtTop=!!(__swSh && __swSh.scrollTop<=0);
  var t=ev.target; __swInner=(t&&t.closest)?t.closest(".catgrid,.acctlist,textarea"):null;
}
function swipeMove(ev){ if(__swy==null||!__swSh||!__swAtTop) return; var y=(ev.touches&&ev.touches[0])?ev.touches[0].clientY:__swy; var dy=y-__swy;
  if(dy>0){
    if(__swInner && __swInner.scrollTop>0) return; /* deja scrollear la lista interna */
    var pull=Math.max(0,dy-14); /* zona muerta: toques y micro-arrastres no mueven el sheet */
    if(pull>0){ __swSh.style.transform="translateY("+Math.min(pull,170)+"px)"; if(ev.cancelable) ev.preventDefault(); }
  } }
function swipeEnd(ev,closer){ if(__swy==null) return; var y=(ev.changedTouches&&ev.changedTouches[0])?ev.changedTouches[0].clientY:__swy; var dy=y-__swy; var atTop=__swAtTop; var sh=__swSh; __swy=null; __swSh=null; __swAtTop=false; __swInner=null;
  if(sh){ sh.style.transition="transform .18s ease"; sh.style.transform=""; setTimeout(function(){ sh.style.transition=""; },200); }
  if(atTop && dy>130 && typeof window[closer]==="function") window[closer](); }

function fmtAmtIn(n){ if(!n) return ""; var s=String(n),p=s.split(".");
  return p[0].replace(/\B(?=(\d{3})+(?!\d))/g,",")+(p.length>1?("."+p[1].slice(0,2)):""); }
function amtInput(el){
  var raw=el.value.replace(/[^0-9.]/g,""); var p=raw.split(".");
  var ints=p[0].slice(0,10);
  raw=ints+(p.length>1?("."+p.slice(1).join("").slice(0,2)):"");
  draft.amount=parseFloat(raw)||0;
  var disp=ints.replace(/\B(?=(\d{3})+(?!\d))/g,",")+(raw.indexOf(".")>=0?("."+raw.split(".")[1]):"");
  el.value=disp; sizeAmt();
  try{ el.setSelectionRange(disp.length,disp.length); }catch(e){}
}

function placeSug(v){
  var el=document.getElementById("plSug"); if(!el) return;
  var q=E.normAlnum(v||"");
  if(q.length<2){ el.className="suglist hide"; el.innerHTML=""; return; }
  var names=DB.learn.placeNames||{}, keys=Object.keys(DB.learn.places||{});
  var starts=[],inc=[];
  keys.forEach(function(k){
    var disp=names[k]||cap(k);
    if(E.normAlnum(disp)===q) return;
    if(k.indexOf(q)===0) starts.push(disp);
    else if(k.indexOf(q)>0) inc.push(disp);
  });
  var list=starts.concat(inc).slice(0,5);
  if(!list.length){ el.className="suglist hide"; el.innerHTML=""; return; }
  el.innerHTML=list.map(function(n){
    return '<button onmousedown="event.preventDefault()" onclick="pickPlace(\''+jsq(n)+'\')">'+esc(n)+'</button>';
  }).join("");
  el.className="suglist";
}

/* ---- commit ---- */
function incomeCatIn(cats){ cats=cats||DB.settings.cats||{}; for(var k in cats){ if(cats[k]&&cats[k].kind==="in") return k; } return "Otros Ingresos"; }
function defaultIncomeName(p){ return p==="p2"?"Otros ingresos":"Otros Ingresos"; }
function findMirrorFor(entryId){ for(var id in DB.entries){ var e=DB.entries[id]; if(e&&e.mirror&&e.giftLink===entryId&&!e.deleted) return e; } return null; }
/* crea/actualiza/borra el espejo personal ligado a un movimiento de efectivo compartido */
function ensureMirror(ent){
  var now=Date.now(), rec=giftReceiver(ent), mir=findMirrorFor(ent.id);
  if(!rec){ if(mir){ mir.deleted=true; mir.updatedAt=now; } return; }
  var creator=ent.createdBy||prof(), senderName=names()[creator]||"";
  if(mir){
    mir.amount=ent.amount; mir.date=ent.date; mir.personalFor=rec;
    mir.details="Efectivo de "+senderName; mir.updatedAt=now;
  } else {
    var nid=uid();
    DB.entries[nid]={ id:nid, mirror:true, kind:"txn", scope:"personal",
      personalFor:rec, accept:(rec===creator)?"accepted":"pending",
      type:"Ingreso", account:"Cash",
      category:(rec===prof())?incomeCatIn(DB.settings.cats):defaultIncomeName(rec),
      amount:ent.amount, date:ent.date, details:"Efectivo de "+senderName,
      tags:"", msi:1, exported:false, deleted:false,
      giftLink:ent.id, createdBy:creator, createdAt:now, updatedAt:now };
    ent.giftLink=nid; ent.updatedAt=now;
  }
}
function commitTxn(data,id){ commitGeneric(Object.assign({kind:"txn"},data),id,data.place,data.category); }
function commitTransfer(data,id){ commitGeneric(Object.assign({kind:"transfer"},data),id,null,null); }
function commitGeneric(data,id,place,category){
  var now=Date.now(), target;
  var prevCreatedBy=(id&&DB.entries[id])?DB.entries[id].createdBy:null;
  if(id&&DB.entries[id]){ var e=DB.entries[id]; for(var k in e){ if(k!=="id"&&k!=="createdAt") delete e[k]; } Object.assign(e,data); e.id=id; e.updatedAt=now; e.exported=false; e.deleted=false; target=e; }
  else { var nid=uid(); DB.entries[nid]=Object.assign({id:nid,createdAt:now,updatedAt:now,exported:false,deleted:false},data); target=DB.entries[nid]; }
  if(target.kind!=="transfer" && !target.mirror){
    if(target.scope==="shared"){
      target.createdBy = prevCreatedBy || prof();
      target.review = (id&&prevCreatedBy&&prof()!==prevCreatedBy) ? "reviewed" : "pending";
      ensureMirror(target);
    } else {
      var m=findMirrorFor(target.id); if(m){ m.deleted=true; m.updatedAt=now; } /* dejó de ser compartido */
    }
  }
  if(place&&category&&data.scope!=="shared"&&E.catsMap()[category]){ var key=E.normAlnum(place); if(key&&key.length>=2){ DB.learn.places[key]=category; DB.learn.placeNames[key]=String(place).trim(); } }
  if(data.account) DB.settings.lastAccount=data.account;
  save();
}

/* ---- notificaciones / cola de revisión ---- */
function openNotifs(){
  var mine=pendingForMe(), sent=sentPendingByMe(), body="";
  if(!mine.length && !sent.length){
    body='<p style="color:var(--dim);text-align:center;margin:22px 4px">Sin pendientes 🎉<br><span style="font-size:12.5px">Aquí aparece lo que '+esc(names()[otherProf()])+' agregue y toque revisar, o el efectivo que te manden.</span></p>';
  }
  if(mine.length){
    body+='<div class="nsec">Para ti · por revisar</div>';
    mine.forEach(function(e){
      var isGift=!!giftReceiver(e), who=names()[e.createdBy||otherProf()];
      var line=esc(who)+' · '+esc(money(e.amount))+' · '+esc(e.category||"")+((e.scope==="shared"&&!isGift)?(' · '+esc(E.splitLabel(e.splitP1))):'');
      var sub=(isGift?'Efectivo para ti':esc(e.place||e.details||"sin nota"))+' · '+esc(fmtShort(e.date));
      body+='<div class="ncard"><div class="nline">'+line+'</div><div class="nsub">'+sub+'</div>'+
        '<div class="nbtns"><button class="nb ok" onclick="reviewFromNotif(\''+e.id+'\')">'+(isGift?"Aceptar":"Revisar")+'</button>'+
        '<button class="nb no" onclick="rejectFromNotif(\''+e.id+'\')">Rechazar</button></div></div>';
    });
  }
  if(sent.length){
    body+='<div class="nsec">Enviado · esperando a '+esc(names()[otherProf()])+'</div>';
    sent.forEach(function(e){
      var isGift=!!giftReceiver(e);
      var line=esc(money(e.amount))+' · '+esc(e.category||"")+((e.scope==="shared"&&!isGift)?(' · '+esc(E.splitLabel(e.splitP1))):'');
      var sub=(isGift?('Efectivo para '+esc(names()[giftReceiver(e)])):esc(e.place||e.details||"sin nota"))+' · '+esc(fmtShort(e.date));
      body+='<div class="ncard wait"><div class="nline">'+line+'</div><div class="nsub">'+sub+'</div>'+
        '<div class="nbtns"><button class="nb no" onclick="rejectFromNotif(\''+e.id+'\')">Cancelar</button></div></div>';
    });
  }
  var inner='<h2>Notificaciones</h2>'+body+'<div class="sheetbtns"><button class="btn ghost" onclick="dismissSheet()">Cerrar</button></div>';
  document.getElementById("sheetroot").innerHTML=sheetShell("dismissSheet",inner);
}

function advanceISO(iso,freq){
  if(freq==="w") return E.addDays(iso,7);
  if(freq==="q") return E.addDays(iso,14);
  /* mensual: mismo día del mes siguiente (ajustado al fin de mes) */
  var y=+iso.slice(0,4), m=+iso.slice(5,7), day=+iso.slice(8,10);
  m++; if(m>12){ m=1; y++; }
  var last=new Date(y,m,0).getDate(); if(day>last) day=last;
  return y+"-"+String(m).padStart(2,"0")+"-"+String(day).padStart(2,"0");
}
function freqLabel(f){ return f==="w"?"Semanal":f==="q"?"Cada 14 días":"Mensual"; }
function addRecurring(obj,freq){
  DB.settings.recurring.push({id:uid(),freq:freq,active:true,
    next:advanceISO(obj.date,freq),
    template:{type:obj.type,category:obj.category,account:obj.account,amount:obj.amount,
      place:obj.place||"",details:obj.details||"",tags:obj.tags||"",expenseType:obj.expenseType||"",msi:obj.msi||1}});
  save();
}
function processRecurring(){
  var today=E.todayISO(), n=0;
  (DB.settings.recurring||[]).forEach(function(r){
    if(!r.active||!r.next) return;
    var guard=0;
    while(r.next<=today && guard<120){
      commitTxn(Object.assign({},r.template,{date:r.next}));
      r.next=advanceISO(r.next,r.freq); n++; guard++;
    }
  });
  if(n){ save(); render(); toast(n+(n===1?" recurrente registrado":" recurrentes registrados"),true); }
  return n;
}
function recurringBlock(){
  var rs=DB.settings.recurring||[];
  var rows=rs.length?rs.map(function(r,i){
    var t=r.template;
    return '<div class="catrow"><div class="cn">'+esc(t.category)+' · '+esc(money(t.amount))+'<span style="color:var(--faint);font-size:11px"> · '+freqLabel(r.freq)+' · próx. '+esc(dateChipLabel(r.next))+(r.active?"":" · pausado")+'</span></div>'+
      '<div class="tg"><button class="'+(r.active?"on":"")+'" onclick="toggleRec('+i+')">'+(r.active?"Activo":"Pausado")+'</button><button onclick="rmRec('+i+')">Quitar</button></div></div>';
  }).join(""):'<p>Sin recurrentes. Al crear un registro, elige «Repetir» y se registrará solo cada semana, 14 días o mes.</p>';
  return '<div class="sblk"><h3>Recurrentes</h3>'+rows+'</div>';
}
function toggleRec(i){ var r=DB.settings.recurring[i]; if(!r) return; r.active=!r.active; save(); render(); }
function rmRec(i){ if(!confirm("¿Quitar este recurrente? (los registros ya creados se quedan)")) return; DB.settings.recurring.splice(i,1); save(); render(); }

/* ============ CANDADO (Face ID / Touch ID) ============ */
function lockSupported(){ return !!(window.PublicKeyCredential && navigator.credentials && navigator.credentials.create && window.isSecureContext); }
function b64u(buf){ var b=new Uint8Array(buf),s=""; for(var i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function b64uDec(s){ s=s.replace(/-/g,"+").replace(/_/g,"/"); while(s.length%4) s+="="; var bin=atob(s),a=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i); return a.buffer; }
function rnd32(){ var a=new Uint8Array(32); (window.crypto||{getRandomValues:function(x){for(var i=0;i<x.length;i++)x[i]=Math.floor(Math.random()*256);}}).getRandomValues(a); return a; }
function lockBlock(){
  if(!lockSupported()) return '<div class="sblk"><h3>Candado</h3><p>Face ID requiere HTTPS y un navegador compatible. En este dispositivo no está disponible.</p></div>';
  var on=!!(DB.settings.lockOn&&DB.settings.lockCred);
  return '<div class="sblk"><h3>Candado (Face ID / Touch ID)</h3><p>Pide tu biometría al abrir Cashy. Es un candado de pantalla: protege miradas ajenas, no cifra los datos.</p>'+
    '<button class="btn ghost mini" onclick="'+(on?"disableLock()":"enableLock()")+'">'+(on?"Desactivar candado":"Activar candado")+'</button></div>';
}
function enableLock(){
  if(!lockSupported()){ toast("No disponible aquí"); return; }
  var uid8=rnd32().slice(0,16);
  navigator.credentials.create({publicKey:{
    challenge:rnd32(), rp:{name:"Cashy", id:location.hostname},
    user:{id:uid8, name:"cashy", displayName:"Cashy"},
    pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],
    authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required"},
    timeout:60000, attestation:"none"
  }}).then(function(cred){
    DB.settings.lockCred=b64u(cred.rawId); DB.settings.lockOn=true; save(); render(); toast("Candado activado ✔",true);
  }).catch(function(){ toast("No se pudo activar (¿cancelaste?)"); });
}
function disableLock(){
  requireUnlock(function(){ DB.settings.lockOn=false; DB.settings.lockCred=""; save(); render(); toast("Candado desactivado",true); });
}
function requireUnlock(okFn){
  if(!lockSupported()||!DB.settings.lockCred){ okFn(); return; }
  navigator.credentials.get({publicKey:{
    challenge:rnd32(), timeout:60000, userVerification:"required",
    allowCredentials:[{type:"public-key", id:b64uDec(DB.settings.lockCred), transports:["internal"]}]
  }}).then(function(){ okFn(); }).catch(function(){ toast("No se pudo verificar"); });
}
var __locked=false;
function showLock(){
  if(__locked) return; __locked=true;
  var el=document.getElementById("lockwrap");
  if(!el){ el=document.createElement("div"); el.id="lockwrap"; document.body.appendChild(el); }
  el.innerHTML='<div class="lbrand">Cashy</div><button class="btn primary" onclick="tryUnlock()">Desbloquear con Face ID</button>';
  el.style.display="flex";
  setTimeout(tryUnlock,350); /* pide biometría de una */
}
function tryUnlock(){
  requireUnlock(function(){ __locked=false; var el=document.getElementById("lockwrap"); if(el) el.style.display="none"; buzz(10); });
}
function initLock(){
  if(!(DB.settings.lockOn&&DB.settings.lockCred&&lockSupported())) return;
  showLock();
  document.addEventListener("visibilitychange",function(){
    if(document.hidden && DB.settings.lockOn){ showLock._t=Date.now(); }
    else if(!document.hidden && DB.settings.lockOn && showLock._t && Date.now()-showLock._t>45000){ showLock(); }
  });
}

/* ============ SPOTLIGHT (buscar) ============ */
var spotQ="";
function openSearch(fromPeek){
  var root=document.getElementById("sheetroot");
  if(root.innerHTML.trim() && !root.querySelector(".closing")) return; // ya hay algo abierto
  spotQ=""; renderSearch(fromPeek); buzz(8);
  setTimeout(function(){ var i=document.getElementById("spotQ"); if(i) i.focus(); },60);
}
function renderSearch(fromPeek){
  document.getElementById("sheetroot").innerHTML=
    '<div class="spotwrap"><div class="spotbg" onclick="closeSearch()"></div><div class="spot"'+(fromPeek?' style="animation:none"':'')+'>'+
      '<div style="display:flex;align-items:center;gap:10px">'+
        '<div class="spotbox" style="flex:1">'+ico("search",19)+'<input id="spotQ" placeholder="Buscar movimientos…" value="'+esc(spotQ)+'" oninput="spotQ=this.value;refreshSpot()"></div>'+
        '<button class="spotx" onclick="closeSearch()" aria-label="Cerrar búsqueda">'+ico("close",17)+'</button>'+
      '</div>'+
      '<div class="spotres" id="spotRes">'+spotResHTML()+'</div>'+
    '</div></div>';
}
function spotResHTML(){
  var q=E.normAlnum(spotQ||"");
  if(!q) return '<div class="spothint">Escribe para buscar por categoría, lugar, descripción, cuenta, tags, monto o fecha.</div>';
  var res=E.activeEntries(DB.entries).filter(function(e){ return spotMatch(e,q); }).sort(sortDesc).slice(0,30);
  if(!res.length) return '<div class="spothint">Nada coincide con «'+esc(spotQ)+'».</div>';
  return res.map(function(e){ return entryRowBase(e,"spotGo"); }).join("");
}
function spotMatch(e,q){
  var hay=E.normAlnum([e.category,e.place,e.details,e.tags,e.account,e.fromAccount,e.toAccount,
    e.kind==="transfer"?"transferencia":"",e.expenseType,String(e.amount||""),e.date].filter(Boolean).join(" "));
  return hay.indexOf(q)>=0;
}
function refreshSpot(){ var el=document.getElementById("spotRes"); if(el) el.innerHTML=spotResHTML(); }
function spotGo(id){ closeSearch(true); openEdit(id); }
function closeSearch(instant){
  var root=document.getElementById("sheetroot"), wrap=root.firstElementChild; spotQ="";
  if(!wrap){ root.innerHTML=""; return; }
  if(instant){ if(wrap.parentNode===root) root.removeChild(wrap); return; }
  wrap.classList.add("closing");
  setTimeout(function(){ if(wrap.parentNode===root) root.removeChild(wrap); },180);
}
/* gesto: jalar hacia abajo desde arriba — con peek en vivo tipo iOS */
var __pt=null;
function peekEl(){
  var p=document.getElementById("spotpeek");
  if(!p){ p=document.createElement("div"); p.id="spotpeek";
    p.innerHTML='<div class="pbg"></div><div class="pbar">'+ico("search",19)+'<span>Buscar movimientos…</span></div>';
    document.body.appendChild(p); }
  return p;
}
function peekUpdate(dy){
  var p=peekEl(); p.classList.remove("free");
  var prog=Math.max(0,Math.min(1,dy/110));
  var bar=p.querySelector(".pbar"), bg=p.querySelector(".pbg");
  bar.style.transform="translateY("+(-84+prog*84)+"px) scale("+(0.9+prog*0.1)+")";
  bar.style.opacity=prog;
  bg.style.opacity=prog*0.85;
  return prog;
}
function peekRelease(commit){
  var p=document.getElementById("spotpeek"); if(!p) return;
  if(commit){ p.remove(); openSearch(true); return; }
  p.classList.add("free");
  var bar=p.querySelector(".pbar"), bg=p.querySelector(".pbg");
  bar.style.transform="translateY(-84px)"; bar.style.opacity=0; bg.style.opacity=0;
  setTimeout(function(){ if(p.parentNode) p.remove(); },220);
}
document.addEventListener("touchstart",function(ev){
  __pt=null;
  if(document.getElementById("sheetroot").firstElementChild) return;
  if((window.scrollY||window.pageYOffset||0)>4) return;
  var tg=ev.target;
  if(tg&&tg.closest&&tg.closest(".chips,textarea,input,select,.tabbar")) return;
  var t=ev.touches[0]; __pt={x:t.clientX,y:t.clientY,peek:false,fired:false};
},{passive:true});
document.addEventListener("touchmove",function(ev){
  if(!__pt||__pt.fired) return;
  var t=ev.touches[0], dy=t.clientY-__pt.y, dx=Math.abs(t.clientX-__pt.x);
  if(!__pt.peek){ if(dy>14&&dx<45){ __pt.peek=true; } else if(dx>45||dy<-8){ __pt=null; return; } else return; }
  __pt.prog=peekUpdate(dy);
},{passive:true});
document.addEventListener("touchend",function(){
  if(!__pt) return;
  if(__pt.peek) peekRelease(__pt.prog>=0.8);
  __pt=null;
},{passive:true});
document.addEventListener("keydown",function(e){
  if((e.metaKey||e.ctrlKey)&&(e.key==="k"||e.key==="K")){ e.preventDefault(); openSearch(); return; }
  /* Escape cierra lo que esté abierto */
  if(e.key==="Escape"){
    var root=document.getElementById("sheetroot");
    if(root.querySelector(".spotwrap:not(.closing)")){ closeSearch(); return; }
    if(root.querySelector(".sheetwrap:not(.closing)")){ if(typeof window.__sheetCloser==="string"&&typeof window[__sheetCloser]==="function") window[__sheetCloser](); else closeSheet(); return; }
    return;
  }
  /* teclado numérico físico en Registrar */
  if(V.tab!=="reg") return;
  var tg=e.target, tn=tg&&tg.tagName;
  if(tn==="INPUT"||tn==="TEXTAREA"||tn==="SELECT") return;
  if(document.getElementById("sheetroot").firstElementChild) return;
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  if(/^[0-9]$/.test(e.key)){ padDigit(e.key); e.preventDefault(); }
  else if(e.key==="."||e.key===","){ padDot(); e.preventDefault(); }
  else if(e.key==="Backspace"){ padBack(); e.preventDefault(); }
  else if(e.key==="Enter"){ quickSave(); e.preventDefault(); }
});

/* ============ SYNC ============ */
function initSync(){
  if(!SYNC_ON) return;
  if(!(window.supabase&&window.supabase.createClient)){ syncMsg="Sin conexión a la nube."; return; }
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  sb.auth.getSession().then(function(res){ session=(res.data&&res.data.session)||null; if(session) afterLogin(); else if(V.tab==="set") render(); });
  sb.auth.onAuthStateChange(function(_e,s){ session=s||null; if(V.tab==="set") render(); });
  window.addEventListener("online",function(){ if(session) pullRemote(); });
  document.addEventListener("visibilitychange",function(){ if(!document.hidden&&session) pullRemote(); });
}
function uiSignIn(btn){ var e=document.getElementById("sy-email"),p=document.getElementById("sy-pass"); doSignIn(e?e.value:"",p?p.value:"",btn); }
function uiSignOut(){ doSignOut(); }
function doSignIn(email,pw,btn){
  if(!sb){ syncMsg="Sync no disponible."; upSync(); return; }
  if(!email||!pw){ syncMsg="Escribe correo y contraseña."; upSync(); return; }
  syncMsg="Entrando…"; upSync(); if(btn) btn.disabled=true;
  sb.auth.signInWithPassword({email:String(email).trim(),password:pw}).then(function(r){ if(btn) btn.disabled=false; if(r.error){ syncMsg="No se pudo entrar: "+r.error.message; if(V.tab==="set") render(); return; } sb.auth.getSession().then(function(res){ session=(res.data&&res.data.session)||null; afterLogin(); }); });
}
function afterLogin(){ pullRemote().then(function(){ pushRemote(); if(V.tab==="set") render(); }); }
function doSignOut(){ try{ if(sb) sb.auth.signOut(); }catch(e){} session=null; if(V.tab==="set") render(); }
function pullRemote(){
  if(!sb||!session) return Promise.resolve();
  syncMsg="Sincronizando…"; upSync();
  var p1=sb.from(TABLE).select("data").eq("id",session.user.id).maybeSingle();
  var p2=sb.from(TABLE_SHARED).select("data").eq("id",SHARED_ROW).maybeSingle();
  return Promise.all([p1,p2]).then(function(res){
    var r=res[0], rs=res[1];
    applyingRemote=true;
    if(!r.error && r.data && r.data.data){ DB=migrate(mergeDB(DB,r.data.data)); }
    if(rs && !rs.error && rs.data && rs.data.data){ mergeShared(rs.data.data); }
    applyConfig(); persist(); applyingRemote=false; render();
    syncMsg=(r.error)?("Error: "+r.error.message):"Sincronizado"; upSync();
  }).catch(function(){ syncMsg="Sin conexión."; upSync(); });
}
/* la tabla personal solo guarda MIS registros (scope personal) + los Ratones que yo pagué;
   el resto de Ratones vive en shared_data. Así ninguno pisa lo del otro. */
function myEntriesForPersonal(){
  var o={}; for(var id in DB.entries){ var e=DB.entries[id]; if(!e) continue;
    if(e.scope==="shared") continue;   /* compartidos viven solo en el blob compartido */
    if(e.mirror) continue;             /* espejos viven solo en el blob compartido */
    o[id]=e; }
  return o;
}
function sharedEntriesAll(){
  var o={}; for(var id in DB.entries){ var e=DB.entries[id]; if(e&&(e.scope==="shared"||e.mirror)) o[id]=e; }
  return o;
}
function pushRemote(){
  if(!sb||!session) return Promise.resolve();
  DB.updatedAt=Date.now();
  var clean={schemaVersion:DB.schemaVersion,settings:DB.settings,entries:myEntriesForPersonal(),learn:DB.learn,updatedAt:DB.updatedAt};
  var sharedBlob={entries:sharedEntriesAll(),meta:DB.sharedMeta,updatedAt:Date.now()};
  var j1=sb.from(TABLE).upsert({id:session.user.id,data:clean,updated_at:new Date().toISOString()});
  var j2=sb.from(TABLE_SHARED).upsert({id:SHARED_ROW,data:sharedBlob,updated_at:new Date().toISOString()});
  return Promise.all([j1,j2]).then(function(res){ var er=res[0].error||res[1].error; syncMsg=er?("Error: "+er.message):"Sincronizado"; upSync(); }).catch(function(){ syncMsg="Sin conexión."; upSync(); });
}
/* fusiona el blob compartido: registros por updatedAt, meta por updatedAt */
function mergeShared(remote){
  remote=remote||{};
  var re=remote.entries||{};
  Object.keys(re).forEach(function(k){
    var a=DB.entries[k], b=re[k]; if(!b) return;
    if(!a || (b.updatedAt||0)>(a.updatedAt||0)) DB.entries[k]=b;
  });
  var rm=remote.meta;
  if(rm && (rm.updatedAt||0)>(DB.sharedMeta.updatedAt||0)){
    DB.sharedMeta.names=rm.names||DB.sharedMeta.names;
    if(rm.aliases){ DB.sharedMeta.aliases=rm.aliases; }
    if(typeof rm.defaultSplitP1==="number") DB.sharedMeta.defaultSplitP1=rm.defaultSplitP1;
    DB.sharedMeta.webhookUrl=rm.webhookUrl||DB.sharedMeta.webhookUrl;
    DB.sharedMeta.updatedAt=rm.updatedAt;
  }
}
function scheduleSync(){ if(!sb||!session) return; clearTimeout(pushTimer); syncMsg="Sincronizando…"; upSync(); pushTimer=setTimeout(function(){ pullRemote().then(pushRemote); },1500); }
function upSync(){ var el=document.getElementById("syncline"); if(el) el.textContent=syncMsg; }
function mergeDB(local,remote){
  local=local||{}; remote=remote||{};
  var out={schemaVersion:Math.max(local.schemaVersion||1,remote.schemaVersion||1),
    settings:Object.assign({},remote.settings||{},local.settings||{}),
    entries:{},learn:{places:Object.assign({},(remote.learn&&remote.learn.places)||{},(local.learn&&local.learn.places)||{})},
    updatedAt:Math.max(local.updatedAt||0,remote.updatedAt||0)};
  out.settings.catET=Object.assign({},(remote.settings&&remote.settings.catET)||{},(local.settings&&local.settings.catET)||{});
  var le=local.entries||{},re=remote.entries||{},keys={};
  Object.keys(le).forEach(function(k){keys[k]=1;}); Object.keys(re).forEach(function(k){keys[k]=1;});
  Object.keys(keys).forEach(function(k){ var a=le[k],b=re[k]; if(a&&b) out.entries[k]=((a.updatedAt||0)>=(b.updatedAt||0))?a:b; else out.entries[k]=a||b; });
  return out;
}

/* ============ misc ============ */
function dayLabel(isoStr){ var d=E.fromISO(isoStr),t=E.todayISO(); if(isoStr===t) return "Hoy"; if(isoStr===E.addDays(t,-1)) return "Ayer"; return d.toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long"}); }
var __tabDrag=false;
function renderTabs(){
  var tabs=[["reg","Registrar","reg"],["saldo","Saldo","saldo"],["hist","Historial","hist"],["res","Resumen","res"],["exp","Exportar","exp"]];
  var el=document.getElementById("tabs");
  if(__tabDrag){ /* durante el drag solo actualiza clases, sin reconstruir */
    var bs=el.querySelectorAll("button");
    for(var i=0;i<bs.length;i++){ var on=(V.tab===tabs[i][0]); bs[i].classList.toggle("on",on); }
    return;
  }
  el.innerHTML='<div class="tabind" id="tabind"></div>'+tabs.map(function(t){ var on=(V.tab===t[0]); return '<button class="'+(on?"on":"")+'" onclick="go(\''+t[0]+'\')">'+ico(t[2],22)+'<span>'+t[1]+'</span></button>'; }).join("");
  moveTabInd();
}
function moveTabInd(){
  var el=document.getElementById("tabs"), ind=document.getElementById("tabind"); if(!el||!ind) return;
  var on=el.querySelector("button.on"); if(!on){ ind.style.opacity="0"; return; }
  ind.style.opacity="1";
  ind.style.transform="translate("+on.offsetLeft+"px,"+on.offsetTop+"px)";
}
/* deslizar el dedo sobre la píldora: el indicador te sigue y suelta con resorte */
(function(){
  var el=document.getElementById("tabs"); if(!el) return;
  var order=["reg","saldo","hist","res","exp"], drag=null;
  function btns(){ return el.querySelectorAll("button"); }
  el.addEventListener("touchstart",function(ev){
    var t=ev.touches[0]; drag={x0:t.clientX,moved:false};
  },{passive:true});
  el.addEventListener("touchmove",function(ev){
    if(!drag) return;
    var t=ev.touches[0];
    if(!drag.moved && Math.abs(t.clientX-drag.x0)<6) return;
    drag.moved=true; __tabDrag=true;
    var ind=document.getElementById("tabind"), bs=btns(); if(!ind||!bs.length) return;
    var r=el.getBoundingClientRect();
    var first=bs[0], last=bs[bs.length-1];
    var x=Math.max(first.offsetLeft, Math.min(last.offsetLeft, t.clientX-r.left-27));
    ind.style.transition="none";
    ind.style.transform="translate("+x+"px,"+first.offsetTop+"px)";
    /* tab más cercana al dedo */
    var best=0,bd=1e9;
    for(var i=0;i<bs.length;i++){ var c=bs[i].offsetLeft+27; var d=Math.abs(c-(x+27)); if(d<bd){bd=d;best=i;} }
    if(order[best]!==V.tab && V.tab!=="set"){ go(order[best]); }
  },{passive:true});
  el.addEventListener("touchend",function(){
    if(drag&&drag.moved){
      __tabDrag=false;
      var ind=document.getElementById("tabind");
      if(ind){ ind.style.transition=""; }
      renderTabs(); /* reconstruye y hace snap con resorte */
    }
    drag=null; __tabDrag=false;
  },{passive:true});
})();

render();
if(needsProfilePick()) showProfilePick();
initSync();
initLock();
processRecurring();
document.addEventListener("visibilitychange",function(){ if(!document.hidden) processRecurring(); });
