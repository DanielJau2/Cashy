:root{
  --acc:#7c6cf0; --acc2:#5b7cf7; --acc3:#a78bfa;
  --grad:linear-gradient(155deg,#a78bfa 0%,#7c6cf0 55%,#5b7cf7 100%);
  --green:#2fae7d; --red:#e0614c;
  --fb:-apple-system,system-ui,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --fd:'Sora',var(--fb);
  --safeb:env(safe-area-inset-bottom,0px); --safet:env(safe-area-inset-top,0px);
  --tabh:86px;
  /* alias legacy → tokens de tema (todo el resto de vistas se re-tematiza solo) */
  --gold:var(--acc); --gold-dim:var(--acc);
}
:root, [data-theme="light"]{
  --bg:#f6f4fb; --panel:#ffffff; --panel2:#f1eef9; --line:#e7e3f2;
  --text:#1d1830; --dim:#6f6a84; --faint:#a09bb4;
  --shadow:0 6px 16px rgba(60,50,120,.07);
  --glassbar:rgba(255,255,255,.44); --glassbrd:rgba(255,255,255,.7); --glasshadow:0 10px 30px rgba(70,60,140,.15);
  --sheetbg:rgba(250,249,253,.92); --scrim:rgba(30,25,60,.35);
  --ink:var(--bg); --ink2:var(--panel); --ink3:var(--panel2); --bone:var(--text);
}
[data-theme="dark"]{
  --bg:#141019; --panel:#1e1a28; --panel2:#262133; --line:#322c42;
  --text:#f1ecf6; --dim:#a89fc0; --faint:#6f688a;
  --shadow:0 6px 16px rgba(0,0,0,.25);
  --glassbar:rgba(30,25,42,.4); --glassbrd:rgba(255,255,255,.12); --glasshadow:0 10px 30px rgba(0,0,0,.4);
  --sheetbg:rgba(24,20,34,.94); --scrim:rgba(5,3,12,.55);
  --ink:var(--bg); --ink2:var(--panel); --ink3:var(--panel2); --bone:var(--text);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{overflow-x:clip;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--fb);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overscroll-behavior-y:contain;overflow-x:clip;}
/* cambio de tema: crossfade nativo (View Transitions); sin transiciones por-elemento (causaban lag) */
::view-transition-old(root),::view-transition-new(root){animation-duration:.26s;}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0;}
input,textarea,select{font-family:inherit;color:inherit;max-width:100%;}
input:focus,textarea:focus,select:focus{outline:none;}
::placeholder{color:var(--faint);}
.hide{display:none!important;}

#app{max-width:520px;margin:0 auto;padding:0 16px calc(var(--safeb) + var(--tabh) + 18px);min-height:100vh;}

/* header */
.head{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:calc(var(--safet) + 12px) 0 12px;margin-bottom:8px;
  background:linear-gradient(var(--bg) 74%, transparent);}
.head .lft{display:flex;align-items:center;gap:9px;min-width:0;}
.head .brand{font-family:var(--fd);font-weight:800;font-size:20px;letter-spacing:-.02em;}
.head .title{font-family:var(--fd);font-weight:800;font-size:19px;letter-spacing:-.01em;}
.head .rgt{display:flex;align-items:center;gap:8px;}
.head .bal{font-size:11px;color:var(--dim);text-align:right;line-height:1.25;}
.head .bal b{display:block;font-family:var(--fd);font-weight:800;font-size:15px;color:var(--text);letter-spacing:-.01em;}
.iconbtn{width:38px;height:38px;border-radius:13px;display:grid;place-items:center;color:var(--dim);
  background:var(--panel);box-shadow:var(--shadow);flex:0 0 auto;}
.iconbtn:active{background:var(--panel2);}

/* HERO CARD (registrar) */
.herocard{border-radius:30px;padding:16px 16px 15px;color:#fff;position:relative;background:var(--grad);
  box-shadow:0 18px 34px rgba(0,0,0,.2);display:flex;flex-direction:column;min-height:300px;}
.crow{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
.modes{display:flex;gap:5px;font-size:12px;}
.modes button{padding:8px 12px;border-radius:20px;background:rgba(255,255,255,.22);font-weight:600;color:#fff;}
.modes button.on{background:#fff;color:var(--acc);font-weight:700;}
.acctpill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.22);border-radius:20px;
  padding:8px 12px;font-size:12px;font-weight:700;color:#fff;width:auto;border:none;}
.acctpill .lbl{display:none;}
.acctpill .nm{color:#fff;margin:0;}
.acctpill .nm.tdc{color:#ffe08a;}
.acctpill svg{width:13px;height:13px;color:rgba(255,255,255,.85);}
.xfrow{display:flex;gap:8px;align-items:stretch;margin-top:10px;}
.xfrow .acctpill{flex:1;justify-content:space-between;}
.xfrow .ar{display:grid;place-items:center;color:rgba(255,255,255,.8);flex:0 0 auto;}
.hero{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 0 12px;position:relative;}
.hero .lbl{font-size:10px;letter-spacing:2.6px;text-transform:uppercase;color:rgba(255,255,255,.85);font-weight:700;}
.hero .amt{font-family:var(--fd);font-weight:800;font-size:64px;letter-spacing:-.03em;line-height:1;margin-top:6px;
  display:flex;align-items:baseline;justify-content:center;gap:2px;white-space:nowrap;color:#fff;}
.hero .amt .cur{font-size:26px;color:rgba(255,255,255,.8);transform:translateY(-18px);}
.hero .amt.zero{color:rgba(255,255,255,.55);}
.hero .amt .dec{color:rgba(255,255,255,.75);}
.dictrow{display:flex;align-items:flex-end;gap:9px;}
.nlfield2{display:block;flex:1;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);
  border-radius:16px;padding:12px 14px;font-size:14px;line-height:1.45;resize:none;overflow:hidden;min-height:46px;color:#fff;}
.nlfield2::placeholder{color:rgba(255,255,255,.75);}
.miccirc{position:relative;left:auto;top:auto;transform:none;width:50px;height:50px;border-radius:50%;flex:0 0 auto;
  display:grid;place-items:center;color:var(--acc);background:#fff;box-shadow:0 8px 18px rgba(0,0,0,.2);}
.miccirc:active{filter:brightness(.95);}
.miccirc svg{width:24px;height:24px;}
.miccirc.rec{background:#ff5a4e;color:#fff;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 8px 18px rgba(255,90,78,.3);}50%{box-shadow:0 8px 30px rgba(255,90,78,.6);}}

/* segmented genérico (otras vistas) */
.seg{display:flex;gap:5px;background:var(--panel);border-radius:16px;padding:5px;box-shadow:var(--shadow);border:none;}
.seg button{flex:1;padding:9px 4px;border-radius:12px;font-size:13px;font-weight:600;color:var(--dim);transition:.12s;}
.seg button.on{background:var(--panel2);color:var(--acc);}
.seg button.on.in{color:var(--green);} .seg button.on.out{color:var(--acc);} .seg button.on.xf{color:var(--acc);}

/* chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 16px;margin:13px -16px 11px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;padding:9px 14px;border-radius:20px;background:var(--panel);font-size:13px;color:var(--dim);
  white-space:nowrap;font-weight:600;box-shadow:var(--shadow);border:none;}
.chip.on{background:var(--acc);color:#fff;}
.chip.more{color:var(--faint);}
.chip:active{filter:brightness(.96);}

/* keypad */
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.key{border-radius:18px;background:var(--panel);font-family:var(--fd);font-weight:800;font-size:20px;color:var(--text);
  display:grid;place-items:center;height:52px;box-shadow:var(--shadow);border:none;letter-spacing:-.01em;}
.key:active{background:var(--panel2);}
.key.sub{font-size:20px;color:var(--dim);}
.key svg{width:22px;height:22px;color:var(--faint);}

/* buttons */
.btn{width:100%;padding:15px;border-radius:18px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:9px;}
.btn.primary{background:var(--grad);color:#fff;box-shadow:0 10px 22px rgba(0,0,0,.2);margin-top:12px;}
.btn.primary:active{filter:brightness(.95);}
.btn.ghost{background:var(--panel);color:var(--text);box-shadow:var(--shadow);border:none;}
.btn.ghost:active{background:var(--panel2);}
.btn.mini{padding:11px;font-size:13.5px;border-radius:14px;}
.btn:disabled{opacity:.45;}

/* cards / saldo */
.card{background:var(--panel);border:none;border-radius:22px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow);}
.bigbal{text-align:center;padding:26px 18px 22px;background:var(--grad);color:#fff;box-shadow:0 18px 34px rgba(0,0,0,.18);}
.bigbal .lbl{font-size:10px;letter-spacing:2.4px;color:rgba(255,255,255,.85);text-transform:uppercase;font-weight:700;}
.bigbal .v{font-family:var(--fd);font-weight:800;font-size:52px;letter-spacing:-.03em;line-height:1.05;margin-top:8px;}
.bigbal .v.neg{color:#ffd9d4;}
.twocol{display:flex;gap:12px;margin-bottom:12px;}
.twocol .card{flex:1;margin:0;text-align:center;padding:16px 10px;}
.twocol .k{font-size:11px;color:var(--faint);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;font-weight:700;}
.twocol .val{font-family:var(--fd);font-weight:800;font-size:24px;letter-spacing:-.02em;}
.twocol .val.in{color:var(--green);} .twocol .val.out{color:var(--red);}
.sechead{display:flex;align-items:center;justify-content:space-between;margin:18px 2px 10px;}
.sechead h3{font-family:var(--fd);font-weight:800;font-size:16px;letter-spacing:-.01em;margin:0;text-transform:none;}
.sechead .nav{display:flex;align-items:center;gap:6px;color:var(--dim);}
.sechead .nav button{width:30px;height:30px;border-radius:11px;background:var(--panel);box-shadow:var(--shadow);display:grid;place-items:center;color:var(--dim);border:none;}

/* list rows */
.row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--panel);border:none;border-radius:18px;margin-bottom:8px;box-shadow:var(--shadow);}
.row:active{background:var(--panel2);}
.row .ic{width:38px;height:38px;border-radius:13px;background:var(--panel2);display:grid;place-items:center;flex:0 0 auto;
  font-family:var(--fd);font-weight:800;font-size:15px;color:var(--acc);}
.row .ic.tdc{color:#c98a2e;} .row .ic.xf{color:var(--dim);}
.row .mid{flex:1;min-width:0;}
.row .mid .t{font-size:14.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row .mid .s{font-size:12px;color:var(--faint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row .amt{font-family:var(--fd);font-weight:800;font-size:17px;letter-spacing:-.02em;flex:0 0 auto;}
.row .amt.in{color:var(--green);} .row .amt.out{color:var(--text);} .row .amt.xf{color:var(--dim);}
.row .dot{width:7px;height:7px;border-radius:50%;background:var(--acc);flex:0 0 auto;}
.daygrp{font-size:11px;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin:16px 4px 8px;font-weight:700;}
.empty{text-align:center;color:var(--faint);padding:40px 20px;font-size:14px;line-height:1.6;}
.empty .big{font-family:var(--fd);font-weight:800;font-size:20px;color:var(--dim);margin-bottom:8px;}

/* fields */
.field{margin-bottom:12px;}
.field .fl{font-size:11px;color:var(--dim);letter-spacing:.05em;margin-bottom:6px;text-transform:uppercase;font-weight:700;}
.field input,.field textarea,.field select{width:100%;background:var(--panel2);border:1px solid var(--line);
  border-radius:14px;padding:12px 13px;font-size:15px;color:var(--text);}
.field textarea{min-height:50px;resize:vertical;line-height:1.5;}
.profpick{text-align:center;padding:14px 6px 6px;}
.profpick .pp-icon{width:64px;height:64px;border-radius:20px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.profpick h2{margin:0 0 6px;}
.profpick p{color:var(--dim);font-size:13.5px;margin:0 0 16px;}
.rmark{display:inline-flex;vertical-align:-2px;margin-right:5px;color:var(--acc);}
.rmark svg{display:block;}
.bellbtn{position:relative;}
.nbadge{position:absolute;top:2px;right:2px;min-width:16px;height:16px;padding:0 3px;border-radius:9px;background:var(--gold,#e0a500);color:#1a1400;font-size:10px;font-weight:800;display:grid;place-items:center;line-height:1;box-shadow:0 0 0 2px var(--bg);}
.nsec{font-size:12px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--faint);margin:14px 2px 8px;}
.ncard{background:var(--panel);border-radius:16px;padding:12px 13px;margin-bottom:9px;box-shadow:var(--shadow);}
.ncard.wait{opacity:.82;}
.ncard .nline{font-size:14.5px;font-weight:600;color:var(--ink);}
.ncard .nsub{font-size:12.5px;color:var(--dim);margin-top:2px;}
.ncard .nbtns{display:flex;gap:8px;margin-top:10px;}
.ncard .nb{flex:1;border:none;border-radius:11px;padding:9px 0;font-size:13.5px;font-weight:700;cursor:pointer;}
.ncard .nb.ok{background:var(--acc);color:#fff;}
.ncard .nb.no{background:var(--chip,#ececec);color:var(--dim);}
.giftnote{background:color-mix(in srgb,var(--acc) 10%,transparent);border:1px solid color-mix(in srgb,var(--acc) 26%,transparent);
  border-radius:14px;padding:10px 12px;margin:2px 0 12px;display:flex;align-items:flex-start;gap:10px;}
.giftnote>svg{flex:0 0 auto;margin-top:1px;color:var(--acc);}
.giftnote .gtxt{display:flex;flex-direction:column;gap:1px;min-width:0;}
.giftnote .gtxt b{font-size:13.5px;font-weight:800;color:var(--acc);line-height:1.25;}
.giftnote .gtxt span{font-size:12px;color:var(--dim);line-height:1.35;}
.rvchip{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:8px;margin-left:6px;vertical-align:1px;}
.rvchip.pend{background:color-mix(in srgb,var(--gold,#e0a500) 20%,transparent);color:var(--gold,#b8860b);}
.rvchip.done{background:color-mix(in srgb,var(--acc) 16%,transparent);color:var(--acc);}
.rowbtn{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:var(--panel2);border-radius:14px;padding:11px 12px;}
.rowbtn .ric{flex:0 0 auto;display:grid;place-items:center;color:var(--dim);}
.rowbtn .rtx{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0;}
.rowbtn .rtx b{font-size:14px;font-weight:700;}
.rowbtn .rtx small{font-size:11.5px;color:var(--faint);}
.rsw{flex:0 0 auto;width:44px;height:26px;border-radius:13px;background:var(--chip,#d8d8de);position:relative;transition:background .2s ease;}
.rsw i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25);transition:transform .22s cubic-bezier(.3,1.3,.4,1);}
.rsw.on{background:var(--acc);}
.rsw.on i{transform:translateX(18px);}
.pill2 button svg{vertical-align:-2px;margin-right:4px;}
.pill2.wrapp button{flex:0 1 auto;min-width:0;padding:9px 12px;font-size:12.5px;}
.pill2.scopep button svg{vertical-align:-2px;margin-right:3px;}
.ratmini{display:flex;align-items:center;gap:12px;cursor:pointer;}
.ratmini .ic{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--panel2);}
.ratmini .mid{flex:1;}
.ratmini .t{font-weight:700;font-size:14.5px;}
.ratmini .s{font-size:12.5px;color:var(--dim);}
.ratmini .amt{font-family:var(--fd);font-weight:700;font-size:17px;}
.ratmini .amt.in{color:var(--green);} .ratmini .amt.out{color:var(--red);}
.ratbal .who{margin-top:6px;font-size:13.5px;color:rgba(255,255,255,.9);font-weight:600;}
.swatches{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
.cswatch{width:34px;height:34px;border-radius:10px;border:2px solid transparent;box-shadow:0 2px 8px rgba(0,0,0,.15);position:relative;}
.cswatch.on{border-color:var(--text);transform:scale(1.08);}
.cswatch.custom{display:flex;align-items:center;justify-content:center;background:conic-gradient(from 0deg,#ef4444,#f59e0b,#10b981,#0ea5e9,#8b5cf6,#ec4899,#ef4444);overflow:hidden;}
.cswatch.custom input{opacity:0;width:100%;height:100%;cursor:pointer;}
.pill2{display:flex;gap:8px;flex-wrap:wrap;}
.pill2 button{flex:1;min-width:70px;padding:11px;border-radius:14px;border:1px solid var(--line);background:var(--panel2);color:var(--dim);font-weight:600;font-size:13px;}
.pill2 button.on{border-color:var(--acc);color:var(--acc);background:transparent;}

/* sheet */
.sheetwrap{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;}
.sheetbg{position:absolute;inset:0;background:var(--scrim);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);}
.sheet{position:relative;width:100%;max-width:520px;background:var(--sheetbg);
  backdrop-filter:blur(28px) saturate(1.4);-webkit-backdrop-filter:blur(28px) saturate(1.4);
  border:1px solid var(--glassbrd);border-radius:28px 28px 0 0;padding:12px 18px calc(var(--safeb) + 20px);
  max-height:92vh;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;touch-action:pan-y;
  box-shadow:0 -20px 60px rgba(0,0,0,.3);animation:up .22s ease;color:var(--text);}
@keyframes up{from{transform:translateY(28px);opacity:.6;}to{transform:none;opacity:1;}}
.sheet *{max-width:100%;}
.grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 10px;}
.sheet h2{font-family:var(--fd);font-weight:800;font-size:18px;letter-spacing:-.01em;margin:0 0 8px;text-transform:none;}
.sheet .amt-edit{font-family:var(--fd);font-weight:800;font-size:44px;text-align:center;letter-spacing:-.03em;margin:2px 0 12px;border:none;background:none;width:100%;color:var(--text);}
.sheethead{position:sticky;top:0;z-index:3;display:flex;align-items:center;gap:10px;margin:0 -18px 12px;padding:6px 16px 10px;
  background:var(--sheetbg);-webkit-backdrop-filter:blur(24px) saturate(1.3);backdrop-filter:blur(24px) saturate(1.3);}
.sheethead::after{content:"";position:absolute;left:0;right:0;bottom:-12px;height:12px;pointer-events:none;
  background:linear-gradient(180deg,var(--sheetbg),transparent);}
.sheethead .shtitle{flex:1;font-family:var(--fd);font-weight:800;font-size:16px;text-align:center;text-transform:none;letter-spacing:-.01em;}
.shbtn{width:40px;height:40px;border-radius:14px;display:grid;place-items:center;flex:0 0 auto;background:var(--panel);box-shadow:var(--shadow);color:var(--dim);border:none;}
.shbtn:active{background:var(--panel2);}
.shbtn.danger{color:var(--red);}
.shbtn.save{background:var(--grad);color:#fff;box-shadow:0 6px 14px rgba(0,0,0,.25);}
.shright{display:flex;gap:8px;flex:0 0 auto;}
.catgrid{display:flex;flex-wrap:wrap;gap:7px;max-height:190px;overflow-y:auto;overflow-x:hidden;padding:2px;}
.catgrid button{padding:8px 11px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);font-size:12.5px;color:var(--dim);}
.catgrid button.on{border-color:var(--acc);color:#fff;background:var(--acc);}
.catgrid .gl{width:100%;font-size:10.5px;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin:8px 2px 2px;font-weight:700;}
.sheetbtns{display:flex;gap:10px;margin-top:14px;}
.sheetbtns .btn{margin-top:0;}
.mcard{background:var(--panel);border:none;border-radius:18px;padding:12px;margin-bottom:9px;box-shadow:var(--shadow);}
.mcard .top{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.mcard .top .a{font-family:var(--fd);font-weight:800;font-size:19px;letter-spacing:-.02em;}
.mcard select{width:100%;margin-top:8px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:9px;font-size:13px;color:var(--text);}
.mcard .rm{color:var(--faint);font-size:12px;}

/* settings */
.sblk{background:var(--panel);border:none;border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.sblk h3{font-family:var(--fd);font-weight:800;font-size:15px;letter-spacing:-.01em;margin:0 0 10px;text-transform:none;}
.sblk p{font-size:13.5px;color:var(--dim);line-height:1.55;margin:0 0 10px;}
.sblk .mono{font-family:ui-monospace,Menlo,monospace;font-size:11px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:11px;white-space:pre-wrap;color:var(--dim);line-height:1.5;max-height:220px;overflow:auto;}
.catrow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 0;border-bottom:1px solid var(--line);}
.catrow:last-child{border-bottom:none;}
.catrow .cn{font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.catrow .tg{display:flex;gap:6px;flex:0 0 auto;}
.catrow .tg button{padding:6px 10px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);font-size:11.5px;color:var(--faint);font-weight:600;}
.catrow .tg button.on{color:#fff;border-color:var(--acc);background:var(--acc);}
.sync-line{font-size:12.5px;color:var(--faint);margin-top:8px;}
details.foldable summary{cursor:pointer;color:var(--acc);font-size:13.5px;font-weight:700;list-style:none;}
details.foldable summary::-webkit-details-marker{display:none;}
.export-ta{width:100%;height:150px;background:var(--panel2);border:1px solid var(--line);border-radius:14px;color:var(--dim);font-family:ui-monospace,Menlo,monospace;font-size:10.5px;padding:11px;line-height:1.5;resize:vertical;}
.export-prev{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:14px;color:var(--faint);
  font-family:ui-monospace,Menlo,monospace;font-size:10.5px;padding:11px;line-height:1.5;max-height:56px;overflow:hidden;
  white-space:pre;text-overflow:ellipsis;pointer-events:none;user-select:none;-webkit-user-select:none;
  -webkit-mask-image:linear-gradient(180deg,#000 60%,transparent);mask-image:linear-gradient(180deg,#000 60%,transparent);}

/* account sheet */
.acctlist button{display:flex;align-items:center;gap:10px;width:100%;padding:12px 12px;border-radius:16px;border:1px solid var(--line);background:var(--panel2);margin-bottom:8px;font-size:15px;color:var(--text);}
.acctlist button.sel{border-color:var(--acc);background:transparent;color:var(--acc);}
.acctlist .star{margin-left:auto;color:var(--faint);}
.acctlist .star.on{color:var(--acc);}
.acctlist .tag{font-size:10px;color:var(--faint);border:1px solid var(--line);border-radius:8px;padding:2px 6px;}
.acctlist .glabel{font-size:10.5px;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin:10px 2px 6px;font-weight:700;}

/* charts */
.bar{margin-bottom:11px;}
.bar .lab{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
.bar .lab .c{color:var(--text);font-weight:600;} .bar .lab .v{color:var(--dim);font-family:var(--fd);font-weight:800;font-size:13px;letter-spacing:-.01em;}
.bar .track{height:9px;background:var(--panel2);border-radius:6px;overflow:hidden;}
.bar .fill{height:100%;background:var(--grad);border-radius:6px;}
.bar.in .fill{background:linear-gradient(90deg,#4ade9e,#2fae7d);}

/* tab bar — píldora liquid glass */
.tabbar{position:fixed;left:0;right:0;bottom:calc(var(--safeb) + 12px);z-index:40;display:flex;justify-content:center;
  background:none;border:none;padding:0;pointer-events:none;}
.tabbar .inner{pointer-events:auto;display:flex;align-items:center;gap:8px;width:auto;max-width:none;
  background:var(--glassbar);backdrop-filter:blur(30px) saturate(1.7);-webkit-backdrop-filter:blur(30px) saturate(1.7);
  border:1px solid var(--glassbrd);border-radius:34px;padding:10px 14px;box-shadow:var(--glasshadow);}
.tabbar button{flex:0 0 auto;display:grid;place-items:center;width:54px;height:44px;border-radius:22px;color:var(--faint);font-size:0;
  transition:transform .16s cubic-bezier(.2,.9,.3,1.4),background .2s ease,color .2s ease;}
.tabbar button svg{width:23px;height:23px;}
.tabbar button.on{color:var(--acc);background:var(--panel2);}
.tabbar button:active{transform:scale(.88);}
.tabbar button span{display:none;}

/* ===== micro-interacciones (feel premium) ===== */
button{touch-action:manipulation;}
.key,.chip,.iconbtn,.shbtn,.modes button,.acctpill,.pill2 button,.catgrid button,.seg button,.row,.ddbtn{
  transition:transform .13s cubic-bezier(.2,.9,.3,1.3),background .16s ease,color .16s ease,filter .16s ease,box-shadow .16s ease;}
.key:active,.iconbtn:active,.shbtn:active,.pill2 button:active,.ddbtn:active{transform:scale(.94);}
.chip:active,.modes button:active,.acctpill:active,.catgrid button:active{transform:scale(.95);}
.row:active{transform:scale(.985);}
.btn{transition:transform .13s ease,filter .16s ease,background .16s ease;}
.btn:active{transform:scale(.98);}
.miccirc{transition:transform .13s ease,background .2s ease,color .2s ease;}
.miccirc:active{transform:scale(.92);}
/* cambio de vista: fade corto y suave en toda la vista */
#app.viewfade{animation:vin .16s ease-out both;}
@keyframes vin{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
/* pop del monto al teclear */
.hero .amt.pop{animation:amtpop .15s ease;}
@keyframes amtpop{0%{transform:scale(1);}45%{transform:scale(1.035);}100%{transform:scale(1);}}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}

/* ===== registrar: todo visible sin scroll ===== */
body.reg{position:fixed;inset:0;width:100%;overflow:hidden;}
body.reg #app{height:100vh;height:100dvh;display:flex;flex-direction:column;
  padding-bottom:calc(var(--safeb) + var(--tabh));min-height:0;}
body.reg .head{position:static;flex:0 0 auto;background:none;margin-bottom:4px;}
.regpage{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;}
.regpage .herocard{flex:1 1 auto;min-height:168px;padding:13px 14px 12px;}
.regpage .hero{padding:4px 0;min-height:0;}
.regpage .chips{flex:0 0 auto;margin:9px -16px 8px;}
.regpage .pad{flex:0 0 auto;gap:7px;}
.regpage .key{height:clamp(38px,5.9vh,52px);}
.regpage .btn.primary{flex:0 0 auto;margin-top:9px;padding:12px;}
.regpage .dictrow .nlfield2{min-height:42px;padding:10px 13px;}
.regpage .miccirc{width:46px;height:46px;}
/* monto adaptable al largo */
.hero .amt{font-size:clamp(42px,8.2vh,64px);}
.hero .amt.sz2{font-size:clamp(34px,6.4vh,50px);}

  box-shadow:var(--shadow);overflow:hidden;max-height:340px;
  transition:max-height .3s cubic-bezier(.3,.9,.35,1),opacity .22s ease,transform .25s cubic-bezier(.3,.9,.35,1),
    padding .25s ease,margin .25s ease,border-width .25s ease;}
.catpanel.hide{display:block!important;max-height:0;opacity:0;transform:translateY(-8px) scale(.985);
  padding-top:0;padding-bottom:0;margin-top:0;border-width:0;pointer-events:none;box-shadow:none;}
.catsearch{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;
  padding:10px 12px;font-size:15px;color:var(--text);margin-bottom:8px;}
.catpanel .catgrid{max-height:215px;}
.catgrid .cempty{width:100%;text-align:center;color:var(--faint);font-size:13px;padding:14px 0;}
/* multi: botón de categoría en tarjeta */
.mcat{display:flex;align-items:center;gap:6px;width:100%;justify-content:space-between;margin-top:8px;
  background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:9px 11px;font-size:13px;color:var(--text);font-weight:600;}
.mcat svg{color:var(--faint);}
/* fecha rápida */
.dquick{display:flex;gap:8px;margin-top:8px;}
.dquick button{flex:1;padding:9px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);color:var(--dim);font-weight:600;font-size:12.5px;}
.dquick button.on{border-color:var(--acc);color:var(--acc);}

/* ===== sheets: apertura suave + cierre animado ===== */
.sheetbg{opacity:1;transition:opacity .18s ease;}
.sheet{animation:up .26s cubic-bezier(.2,.9,.3,1);}
.sheetwrap.closing .sheetbg{opacity:0;}
.sheetwrap.closing .sheet{transition:transform .2s cubic-bezier(.5,0,.8,.5);transform:translateY(105%)!important;animation:none;}
.sheetwrap.rerender .sheet{animation:none;}
.sheetwrap.rerender .sheetbg{animation:none;opacity:1;}

/* ===== spotlight (buscar deslizando hacia abajo) ===== */
.spotwrap{position:fixed;inset:0;z-index:55;display:flex;flex-direction:column;align-items:center;
  padding:calc(var(--safet) + 16px) 16px 0;}
.spotbg{position:absolute;inset:0;background:var(--scrim);backdrop-filter:blur(16px) saturate(1.2);-webkit-backdrop-filter:blur(16px) saturate(1.2);
  opacity:1;transition:opacity .18s ease;}
.spot{position:relative;width:100%;max-width:520px;animation:spotin .22s cubic-bezier(.2,.9,.3,1);}
@keyframes spotin{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:none;}}
.spotwrap.closing .spotbg{opacity:0;}
.spotwrap.closing .spot{transition:opacity .16s ease,transform .16s ease;opacity:0;transform:translateY(-12px);}
.spotbox{display:flex;align-items:center;gap:10px;background:var(--glassbar);backdrop-filter:blur(28px) saturate(1.6);-webkit-backdrop-filter:blur(28px) saturate(1.6);
  border:1px solid var(--glassbrd);border-radius:20px;padding:0 15px;box-shadow:var(--glasshadow);}
.spotbox svg{color:var(--faint);flex:0 0 auto;}
.spotbox input{flex:1;background:none;border:none;padding:15px 0;font-size:16px;color:var(--text);}
.spotres{margin-top:12px;max-height:62vh;overflow-y:auto;overscroll-behavior:contain;border-radius:22px;padding-bottom:8px;}
.spothint{text-align:center;color:var(--dim);font-size:13.5px;padding:16px 14px;line-height:1.5;
  background:var(--glassbar);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--glassbrd);border-radius:18px;}

/* ===== swipe en filas (duplicar / borrar) ===== */
.rwrap{position:relative;margin-bottom:8px;border-radius:18px;overflow:hidden;}
.rwrap .row{margin-bottom:0;position:relative;z-index:1;transition:transform .2s cubic-bezier(.2,.8,.3,1);}
.ract{position:absolute;top:0;bottom:0;right:0;display:flex;z-index:0;}
.ract button{width:66px;display:grid;place-items:center;color:#fff;}
.ract .dup{background:var(--acc);}
.ract .del{background:var(--red);}
/* filas y barras con entrada escalonada */
.rwrap.anim{animation:vin .26s cubic-bezier(.2,.8,.3,1) both;}
.bar{animation:vin .28s cubic-bezier(.2,.8,.3,1) both;}
.bar .fill{transform-origin:left;animation:barx .55s cubic-bezier(.2,.8,.3,1) both;}
@keyframes barx{from{transform:scaleX(0);}to{transform:scaleX(1);}}
/* pop del ícono de tab activo */
.tabbar button.on svg{animation:tabpop .3s cubic-bezier(.3,1.5,.5,1);}
@keyframes tabpop{0%{transform:scale(.72);}60%{transform:scale(1.14);}100%{transform:scale(1);}}

/* ===== sheet: monto con $ y comas + fecha arriba ===== */
.amtwrap{display:flex;align-items:baseline;justify-content:center;gap:3px;margin:2px 0 6px;}
.amtwrap .cur{font-family:var(--fd);font-weight:800;font-size:22px;color:var(--faint);}
.amtwrap .amt-edit{margin:0;width:auto;min-width:1ch;max-width:82%;text-align:center;}
.daterow{display:flex;align-items:center;justify-content:center;gap:8px;margin:0 0 14px;}
.datechip{position:relative;display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);
  border-radius:12px;padding:8px 12px;font-size:13px;font-weight:700;color:var(--acc);overflow:hidden;}
.datechip svg{color:var(--acc);}
.datechip input{position:absolute;inset:0;opacity:0;width:100%;height:100%;}
.daterow .dquick{margin:0;flex:0 0 auto;}
.daterow .dquick button{flex:0 0 auto;min-width:0;padding:8px 12px;font-size:12.5px;}

/* ===== autocompletado de lugares ===== */
.autoc{position:relative;}
.suglist{position:absolute;left:0;right:0;top:calc(100% - 6px);z-index:5;background:var(--panel);border:1px solid var(--line);
  border-radius:14px;box-shadow:var(--shadow);overflow:hidden;animation:ddin .14s ease;}
.suglist button{display:block;width:100%;text-align:left;padding:11px 13px;font-size:14px;color:var(--text);border-bottom:1px solid var(--line);}
.suglist button:last-child{border-bottom:none;}
.suglist button b{color:var(--acc);font-weight:700;}
.suglist button:active{background:var(--panel2);}

/* ===== spotlight: X para cerrar + peek al jalar ===== */
.spotx{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;
  background:var(--panel2);color:var(--dim);margin:8px 0;}
#spotpeek{position:fixed;inset:0;z-index:54;pointer-events:none;}
#spotpeek .pbg{position:absolute;inset:0;background:var(--scrim);opacity:0;}
#spotpeek .pbar{position:absolute;left:16px;right:16px;top:calc(var(--safet) + 16px);max-width:520px;margin:0 auto;
  display:flex;align-items:center;gap:10px;background:var(--glassbar);backdrop-filter:blur(28px) saturate(1.6);-webkit-backdrop-filter:blur(28px) saturate(1.6);
  border:1px solid var(--glassbrd);border-radius:20px;padding:15px;box-shadow:var(--glasshadow);color:var(--faint);font-size:16px;
  transform:translateY(-84px);opacity:0;}
#spotpeek.free .pbar{transition:transform .2s ease,opacity .2s ease;}
#spotpeek.free .pbg{transition:opacity .2s ease;}

/* ===== recurrentes / import ===== */
.imp-ta{width:100%;height:110px;background:var(--panel2);border:1px solid var(--line);border-radius:14px;color:var(--dim);
  font-family:ui-monospace,Menlo,monospace;font-size:10.5px;padding:11px;line-height:1.5;resize:vertical;}

/* ===== colores por cuenta ===== */
.cdot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;display:inline-block;box-shadow:0 0 0 2px rgba(127,127,127,.15);}
.cpick{position:relative;display:inline-block;width:20px;height:20px;border-radius:50%;margin-right:9px;vertical-align:-4px;
  box-shadow:0 0 0 2px var(--line);overflow:hidden;cursor:pointer;}
.cpick input{position:absolute;inset:-8px;opacity:0;cursor:pointer;}
.acctpill .cdot{width:9px;height:9px;box-shadow:0 0 0 2px rgba(255,255,255,.35);}

/* rangos de fecha: que no se encimen los campos */
.twocol .field{min-width:0;}
.twocol .field input{min-width:0;width:100%;}

/* ===== tabbar: indicador que sigue el dedo ===== */
.tabbar .inner{position:relative;touch-action:none;}
.tabind{position:absolute;left:0;top:0;width:54px;height:44px;border-radius:22px;background:var(--panel2);z-index:0;
  transition:transform .3s cubic-bezier(.25,1.35,.4,1);}
.tabbar .inner button{position:relative;z-index:1;}
.tabbar .inner button.on{background:none;}

/* ===== historial: selector de mes ===== */
.monthpick{position:relative;display:inline-flex;align-items:center;gap:5px;cursor:pointer;overflow:hidden;}
.monthpick svg{color:var(--faint);}
.monthpick input{position:absolute;inset:0;opacity:0;width:100%;height:100%;}

/* ===== resumen: calendario de balance ===== */
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.calgrid .dow{text-align:center;font-size:10px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:4px 0;}
.calcell{min-height:52px;border-radius:12px;background:var(--panel);box-shadow:var(--shadow);padding:5px 3px 4px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:1px;border:none;transition:transform .12s ease;}
.calcell:active{transform:scale(.93);}
.calcell .dn{font-family:var(--fd);font-weight:800;font-size:12.5px;color:var(--dim);line-height:1;}
.calcell.today{background:var(--grad);}
.calcell.today .dn,.calcell.today .ci,.calcell.today .co{color:#fff;}
.calcell.blank{background:none;box-shadow:none;}
.calcell .ci{font-size:9.5px;color:var(--green);font-weight:700;line-height:1.2;}
.calcell .co{font-size:9.5px;color:var(--red);font-weight:700;line-height:1.2;}
.calcell.today .ci{color:#d9ffe9;} .calcell.today .co{color:#ffe0da;}

/* ===== dona ===== */
.donut{display:flex;align-items:center;justify-content:center;margin:6px 0 4px;}
.dlegend{display:flex;flex-direction:column;gap:7px;margin-top:8px;}
.dlegend .dl{display:flex;align-items:center;gap:9px;font-size:13px;}
.dlegend .dl .sw{width:11px;height:11px;border-radius:4px;flex:0 0 auto;}
.dlegend .dl .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;}
.dlegend .dl .vv{font-family:var(--fd);font-weight:800;font-size:13px;color:var(--dim);}

/* ===== línea de tendencia ===== */
.trendwrap svg{display:block;width:100%;height:auto;}

/* ===== comparativa semanal ===== */
.weekcmp{display:flex;align-items:center;gap:12px;}
.weekcmp .pct{font-family:var(--fd);font-weight:800;font-size:26px;letter-spacing:-.02em;}
.weekcmp .pct.down{color:var(--green);} .weekcmp .pct.up{color:var(--red);}
.weekcmp .txt{font-size:13px;color:var(--dim);line-height:1.45;flex:1;}

/* ===== candado ===== */
#lockwrap{position:fixed;inset:0;z-index:90;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  background:var(--bg);}
#lockwrap .lbrand{font-family:var(--fd);font-weight:800;font-size:30px;letter-spacing:-.02em;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
#lockwrap .btn{width:auto;padding:14px 26px;}

/* ===== filtros compactos (Resumen) ===== */
.seg.mini{padding:4px;border-radius:13px;gap:4px;}
.seg.mini button{padding:7px 2px;font-size:12px;border-radius:9px;}

/* ===== rango de fechas: layout que no se encima nunca ===== */
.rangerow{display:flex;flex-wrap:wrap;gap:10px;margin:8px 0 2px;}
.rangerow .field{flex:1 1 140px;min-width:0;margin:0;}
.rangerow .field input{display:block;width:100%;min-width:0;height:42px;padding:0 12px;line-height:40px;}

/* ===== cuenta pintada dentro del sheet ===== */
.acctpill.solid{color:#fff;border:none;box-shadow:0 6px 14px rgba(0,0,0,.18);width:100%;justify-content:space-between;padding:12px 13px;border-radius:14px;font-size:14px;}
.acctpill.solid .nm{color:#fff;font-weight:700;}
.acctpill.solid svg{color:rgba(255,255,255,.9);}

#toast{position:fixed;left:50%;bottom:calc(var(--safeb) + 96px);transform:translateX(-50%) translateY(20px);
  background:var(--panel);color:var(--text);padding:12px 18px;border-radius:16px;font-size:14px;font-weight:600;
  opacity:0;pointer-events:none;transition:.25s;z-index:60;box-shadow:0 12px 34px rgba(0,0,0,.25);white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;border:1px solid var(--line);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.good{border-color:var(--acc);}
#toast.act{pointer-events:auto;cursor:pointer;}
#toast .ta{color:var(--acc);font-weight:800;margin-left:8px;}
</style>

/* ---------------------- utilidades de texto ---------------------- */
function deaccent(s){ return String(s==null?"":s).normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
function normAlnum(s){ return deaccent(String(s==null?"":s).toLowerCase()).replace(/[^a-z0-9\s]/g," ").replace(/\s+/g," ").trim(); }
function hasKw(normText, kw){ var re=new RegExp("(^|\\s)"+kw.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"($|\\s)"); return re.test(normText); }
function escapeRe(s){ return String(s).replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }

/* ---------------------- fechas ---------------------- */
function iso(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function todayISO(){ return iso(new Date()); }
function fromISO(s){ return new Date(s+"T12:00:00"); }
function addDays(isoStr,n){ var d=fromISO(isoStr); d.setDate(d.getDate()+n); return iso(d); }
var MESES={enero:0,febrero:1,marzo:2,abril:3,mayo:4,junio:5,julio:6,agosto:7,septiembre:8,setiembre:8,octubre:9,noviembre:10,diciembre:11};
var DIAS={domingo:0,lunes:1,martes:2,miercoles:3,jueves:4,viernes:5,sabado:6};
function parseDate(text, baseISO){
  baseISO=baseISO||todayISO();
  var t=normAlnum(text), raw=deaccent(String(text==null?"":text).toLowerCase()), m;
  if(/(^|\s)antier($|\s)/.test(t)||/anteayer/.test(t)) return {date:addDays(baseISO,-2), match:(/anteayer/.test(t)?"anteayer":"antier")};
  if(/(^|\s)ayer($|\s)/.test(t)) return {date:addDays(baseISO,-1), match:"ayer"};
  if(/pasado manana/.test(t)) return {date:addDays(baseISO,2), match:"pasado manana"};
  if(/(^|\s)manana($|\s)/.test(t)) return {date:addDays(baseISO,1), match:"manana"};
  if(/(^|\s)hoy($|\s)/.test(t)) return {date:baseISO, match:"hoy"};
  m=t.match(/hace\s+(\d{1,3})\s+dias?/); if(m) return {date:addDays(baseISO,-parseInt(m[1],10)), match:m[0]};
  m=t.match(/(\d{1,2})\s+de\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|setiembre|octubre|noviembre|diciembre)/);
  if(m){ var dd=parseInt(m[1],10),mo=MESES[m[2]],base=fromISO(baseISO),yr=base.getFullYear(),cand=new Date(yr,mo,dd,12,0,0);
    if(cand>new Date(base.getFullYear(),base.getMonth(),base.getDate(),23,59,59)) cand=new Date(yr-1,mo,dd,12,0,0);
    return {date:iso(cand), match:m[0]}; }
  m=raw.match(/(^|\s)(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?(?=$|\s)/);
  if(m){ var d1=parseInt(m[2],10),d2=parseInt(m[3],10),yy=m[4];
    if(d1>=1&&d1<=31&&d2>=1&&d2<=12){ var y=yy?(yy.length===2?2000+parseInt(yy,10):parseInt(yy,10)):fromISO(baseISO).getFullYear();
      var mraw=m[0].trim(); return {date:iso(new Date(y,d2-1,d1,12,0,0)), match:(text.indexOf(mraw)>=0?mraw:(m[2]+"/"+m[3]))}; } }
  for(var name in DIAS){ if(hasKw(t,name)){ var future=/proximo|que viene|siguiente/.test(t);
    var b2=fromISO(baseISO),cur=b2.getDay(),target=DIAS[name],diff;
    if(future){ diff=(target-cur+7)%7; if(diff===0)diff=7; } else { diff=(cur-target+7)%7; if(diff===0)diff=7; diff=-diff; }
    return {date:addDays(baseISO,diff), match:name}; } }
  return {date:baseISO, match:null};
}
function formatDateMD(isoStr){ var d=fromISO(isoStr); return (d.getMonth()+1)+"/"+d.getDate()+"/"+String(d.getFullYear()).slice(-2); }

/* ---------------------- montos ---------------------- */
function parseAmount(text){
  if(!text) return null;
  var t=" "+text.toLowerCase()+" ", best=null;
  var re=/(\$?\s*)((?:\d{1,3}(?:[,\.]\d{3})+(?:\.\d{1,2})?)|(?:\d+(?:\.\d{1,2})?))(?:\s*(k|mil|pesos|peso|varos|varo|lucas|luca)\b)?/g, m;
  while((m=re.exec(t))!==null){
    var raw=m[2],suffix=(m[3]||"").trim(),hadDollar=/\$/.test(m[1]),val=normalizeNumber(raw);
    if(val==null) continue;
    if(suffix==="k"||suffix==="lucas"||suffix==="luca"||suffix==="mil") val=val*1000;
    var score=0; if(hadDollar)score+=3; if(suffix)score+=2; if(raw.indexOf(".")>=0||raw.indexOf(",")>=0)score+=1; if(val>=1)score+=1;
    if(best===null||score>best.score) best={amount:val,match:m[0].trim(),score:score};
  }
  if(!best){
    if(/(^|\s)(un\s+)?mil(\s|$)/.test(" "+normAlnum(text)+" ")) return {amount:1000, match:"mil"};
    return null;
  }
  return {amount:Math.round(best.amount*100)/100, match:best.match};
}
function normalizeNumber(raw){
  raw=raw.trim();
  if(/,/.test(raw)&&/\./.test(raw)) raw=raw.replace(/,/g,"");
  else if(/,/.test(raw)){ var p=raw.split(","); if(p.length===2&&p[1].length<=2&&p[0].length<=3&&!/^\d{3}$/.test(p[1])) raw=p[0]+"."+p[1]; else raw=raw.replace(/,/g,""); }
  var n=parseFloat(raw); return isNaN(n)?null:n;
}

/* ---------------------- MSI (meses) ---------------------- */
function parseMSI(text){
  var t=normAlnum(text), m;
  m=t.match(/\b(\d{1,2})\s*(?:msi|meses sin intereses|meses|mses)\b/); if(m) return parseInt(m[1],10);
  m=t.match(/\ba\s+(\d{1,2})\s+meses/); if(m) return parseInt(m[1],10);
  m=t.match(/\bdiferido\s+(?:a\s+)?(\d{1,2})/); if(m) return parseInt(m[1],10);
  return 1;
}

/* ---------------------- cuentas ---------------------- */
function aliasIn(str){ // str normalizado; devuelve cuenta de la 1ª alias que aparezca
  for(var i=0;i<CUR_ALIASES.length;i++){ if(hasKw(str,CUR_ALIASES[i][0])) return CUR_ALIASES[i][1]; }
  return null;
}
function firstTDCIn(str){
  for(var i=0;i<CUR_ALIASES.length;i++){ if(isTDC(CUR_ALIASES[i][1]) && hasKw(str,CUR_ALIASES[i][0])) return CUR_ALIASES[i][1]; }
  return null;
}
/* cuenta de pago: la que sigue a "con / tarjeta / tdc"; o "efectivo/cash" suelto */
function detectAccount(text){
  var t=normAlnum(text);
  for(var i=0;i<CUR_ALIASES.length;i++){
    var a=CUR_ALIASES[i][0];
    if(hasKw(t,"con "+a)||hasKw(t,"con mi "+a)||hasKw(t,"con la "+a)||hasKw(t,"con el "+a)||hasKw(t,"tarjeta "+a)||hasKw(t,"pagando con "+a))
      return CUR_ALIASES[i][1];
  }
  if(hasKw(t,"en efectivo")||hasKw(t,"efectivo")) return "Cash";
  return null;
}

/* ---------------------- transferencias ---------------------- */
function parseTransfer(text, ctx){
  ctx=ctx||{};
  var t=normAlnum(text);
  var amt=parseAmount(text), amount=amt?amt.amount:null, msi=parseMSI(text);
  var deA=t.match(/\bde\s+(.+?)\s+a(?:l)?\s+(.+)$/);
  var fromDE=deA?aliasIn(deA[1]):null, toDE=deA?aliasIn(deA[2]):null;
  var isRet=RET_WORDS.some(function(w){return hasKw(t,w);});
  var isDep=DEP_WORDS.some(function(w){return hasKw(t,w);});
  var isPay=PAY_WORDS.some(function(w){return hasKw(t,w);});
  var isXfer=XFER_WORDS.some(function(w){return hasKw(t,w);});
  var tdc=firstTDCIn(t);
  var payMethod=detectAccount(text);

  // Pago de TDC (una sola línea a TDC): solo si la tarjeta es el OBJETO del pago,
  // no cuando es el MÉTODO ("con <tdc>" = compra pagada con esa tarjeta).
  if(isPay && tdc && !isXfer && tdc!==payMethod){
    var fromPay=payMethod || fromDE || null;
    return {kind:"transfer", from:fromPay, to:tdc, amount:amount, msi:msi, tdcpay:true};
  }
  if(isRet){ return {kind:"transfer", from:(fromDE||detectAccount(text)||aliasIn(t)||null), to:"Cash", amount:amount, msi:1}; }
  if(isDep){ return {kind:"transfer", from:"Cash", to:(toDE||detectAccount(text)||null), amount:amount, msi:1}; }
  if(isXfer || (fromDE && toDE)){ return {kind:"transfer", from:fromDE, to:toDE, amount:amount, msi:1}; }
  return null;
}

/* ---------------------- tipo / categoría / lugar / detalle ---------------------- */
function detectType(normText){
  var i;
  for(i=0;i<INCOME_REFUND.length;i++) if(hasKw(normText,INCOME_REFUND[i])) return "Ingreso";
  for(i=0;i<INCOME_VERBS.length;i++) if(hasKw(normText,INCOME_VERBS[i])) return "Ingreso";
  return "Egreso";
}
function detectCategory(normText, ctx){
  ctx=ctx||{};
  if(ctx.customRules){ for(var c=0;c<ctx.customRules.length;c++){ if(hasKw(normText,normAlnum(ctx.customRules[c][0]))) return ctx.customRules[c][1]; } }
  if(ctx.learn && ctx.learn.places){ for(var p in ctx.learn.places){ if(p && hasKw(normText,p)) return ctx.learn.places[p]; } }
  for(var r=0;r<INCOME_REFUND.length;r++) if(hasKw(normText,INCOME_REFUND[r])) return "Reembolsable";
  for(var i=0;i<RULES.length;i++){ if(hasKw(normText,RULES[i][0])) return RULES[i][1]; }
  return null;
}
var PLACE_STOP={de:1,en:1,el:1,la:1,los:1,las:1,un:1,una:1,por:1,para:1,con:1,me:1,mi:1,ayer:1,hoy:1,antier:1,pesos:1,peso:1,y:1,del:1,al:1,tarjeta:1};
function extractPlace(text){
  var t=" "+normAlnum(text)+" ", m=t.match(/\sen\s(?:el\s|la\s|los\s|las\s)?([a-z0-9].*)$/);
  if(!m) return "";
  var words=m[1].split(" "), out=[];
  for(var i=0;i<words.length;i++){ var wd=words[i]; if(!wd) continue;
    if(/^\d+$/.test(wd)) break;
    if(PLACE_STOP[wd]||aliasIn(wd)) break; if(out.length>=3) break; out.push(wd); }
  return out.map(titleWord).join(" ");
}
function titleWord(w){ return w.charAt(0).toUpperCase()+w.slice(1); }
function extractDetails(text, amountMatch){
  var t=text; if(amountMatch) t=t.replace(new RegExp(escapeRe(amountMatch),"i")," ");
  var n=normAlnum(t), m=n.match(/\bde\s+([a-z]+(?:\s[a-z]+){0,2})/);
  var strip={gaste:1,pague:1,compre:1,cobraron:1,me:1,cobre:1,costo:1,un:1,una:1,unos:1,unas:1,en:1,el:1,la:1,los:1,las:1,por:1,pesos:1,peso:1,de:1,con:1,y:1,al:1,del:1,mi:1,meses:1,msi:1};
  var clean=n.split(" ").filter(function(w){return w&&!strip[w];}).join(" ").trim(), out=clean;
  if(m){ var c=m[1].split(" ").filter(function(w){return !strip[w];}).join(" ").trim(); if(c) out=c; }
  if(out.length>48) out=out.slice(0,48).trim();
  return out?out.charAt(0).toUpperCase()+out.slice(1):"";
}

/* ---------------------- parseo principal ---------------------- */
function parseText(text, ctx){
  ctx=ctx||{}; var baseISO=ctx.today||todayISO();

  /* regalo/efectivo entre la pareja: "le di 1000 a ratoncita" */
  var gift=detectCashGift(text, ctx);
  if(gift){
    var dR=parseDate(text, baseISO);
    var noD=dR.match? text.replace(new RegExp(escapeRe(dR.match),"i")," ") : text;
    var aR=parseAmount(noD);
    var noA=(aR&&aR.match)? noD.replace(new RegExp(escapeRe(aR.match),"i")," ") : noD;
    return {
      kind:"txn", date:dR.date, amount:aR?aR.amount:null, type:"Egreso",
      category:"Efectivo", account:"Cash", place:"",
      details:stripGiftWords(noA, ctx.personAliases),
      shared:true, cashGift:gift,
      matched:{date:!!dR.match, amount:!!aR, category:true, account:false}
    };
  }

  var shared=hasSharedKw(text);
  if(shared) text=stripSharedKw(text);
  var norm=normAlnum(text);

  var xfer=parseTransfer(text, ctx);
  var dateRes=parseDate(text, baseISO);

  if(xfer){
    return {
      kind:"transfer", date:dateRes.date, amount:xfer.amount,
      fromAccount:xfer.from, toAccount:xfer.to, tdcpay:!!xfer.tdcpay,
      msi:xfer.msi||1, details:"", category:"Transferencias",
      matched:{date:!!dateRes.match, amount:xfer.amount!=null, transfer:true}
    };
  }

  var noDate=dateRes.match? text.replace(new RegExp(escapeRe(dateRes.match),"i")," ") : text;
  var noMsi=noDate.replace(/\b(?:a\s+)?\d{1,2}\s*(?:msi|meses(?:\s+sin\s+intereses)?|mses)\b/gi," ");
  var amtRes=parseAmount(noMsi), amount=amtRes?amtRes.amount:null;
  var account=detectAccount(text)||ctx.account||"Cash";
  var category=detectCategory(norm, ctx), type=detectType(norm);
  var rmap=ctx.renames||CUR_RENAMES;
  if(category && rmap[category]) category=rmap[category];
  if(category && CATS[category]){ var k=CATS[category].kind; if(k==="in")type="Ingreso"; else if(k==="out")type="Egreso"; }
  if(!category){ var oi=(type==="Ingreso")?"Otros Ingresos":null; category=(oi&&rmap[oi])?rmap[oi]:oi; }
  var place=extractPlace(noDate), details=extractDetails(noDate, amtRes?amtRes.match:null);
  var et=(category&&CATS[category])?(type==="Egreso"?CATS[category].et:""):"";
  var msi=isTDC(account)?parseMSI(text):1;

  if(shared){ category=sharedCatFor(category); et=""; }
  return {
    kind:"txn", date:dateRes.date, amount:amount, type:type, category:category,
    account:account, place:place, details:details, expenseType:et, msi:msi, shared:shared,
    matched:{date:!!dateRes.match, amount:!!amtRes, category:!!category, account:!!detectAccount(text)}
  };
}

/* dividir varias transacciones en una frase */
/* Separa una frase dictada en movimientos usando los MONTOS como ancla
   (no depende de comas). Ignora números de fecha ("20 de enero") y de MSI ("3 meses"). */
function splitMovements(text){
  var toks=String(text||"").split(/\s+/).filter(Boolean);
  if(toks.length<2) return null;
  var norm=toks.map(function(t){return normAlnum(t);});
  function isNum(t){ return /\d/.test(t) && parseAmount(t)!==null; }
  var anchors=[];
  for(var i=0;i<toks.length;i++){
    if(!isNum(norm[i])) continue;
    var nx=norm[i+1]||"", nx2=norm[i+2]||"";
    if(MESES.hasOwnProperty(nx)) continue;                 // "20 enero"
    if(nx==="de" && MESES.hasOwnProperty(nx2)) continue;    // "20 de enero"
    if(nx==="meses"||nx==="mes"||nx==="msi"||nx==="mses"||nx==="mensualidades") continue; // MSI
    anchors.push(i);
  }
  if(anchors.length<2) return null;
  var TRAIL={hoy:1,ayer:1,antier:1,anteayer:1,manana:1,pasado:1,pesos:1,peso:1,varos:1,varo:1,lucas:1,luca:1,mxn:1,pesos1:1,
    en:1,con:1,de:1,del:1,al:1,la:1,el:1,los:1,las:1,mi:1,mis:1,a:1,por:1,y:1,e:1,sin:1,intereses:1,meses:1,mes:1,msi:1,mses:1,pagando:1,tarjeta:1,efectivo:1};
  var ACCT_WORDS={}; CUR_ALIASES.forEach(function(al){ al[0].split(" ").forEach(function(w){ if(w) ACCT_WORDS[w]=1; }); });
  var starts=[0];
  for(var k=0;k<anchors.length-1;k++){
    var j=anchors[k]+1;
    while(j<toks.length && j<anchors[k+1] && (norm[j]==="" || TRAIL[norm[j]] || ACCT_WORDS[norm[j]])) j++;
    if(j>=anchors[k+1]) j=anchors[k+1];   // el resto es descripción del siguiente monto
    starts.push(j);
  }
  var segs=[];
  for(var s=0;s<starts.length;s++){
    var a=starts[s], b=(s+1<starts.length)?starts[s+1]:toks.length;
    if(b<=a) b=a+1;
    var seg=toks.slice(a,b).join(" ").trim();
    if(seg) segs.push(seg);
  }
  return segs.length>=2? segs : null;
}

function parseMulti(text, ctx){
  ctx=ctx||{};
  var today=ctx.today||todayISO();
  // 1º conectores (coma/"y"/";"…); 2º por montos (dictado sin puntuación)
  var pieces=String(text||"").split(/\s*(?:,|\+|;|\bo\b| y | e | tambien | también | mas | más | luego | despues | después )\s*/i).map(function(s){return s.trim();}).filter(Boolean);
  if(pieces.length<2){ pieces=splitMovements(text)||[text]; }
  if(!pieces || pieces.length<2){ return [parseText(text,ctx)]; }
  var out=[], valid=0, carryDate=today, carryAcct=ctx.account||"Cash";
  pieces.forEach(function(p){
    var det=detectAccount(p);
    var r=parseText(p, Object.assign({},ctx,{account: det||carryAcct}));
    if(r.amount==null) return;
    if(det) carryAcct=det;
    var dm=parseDate(p, today);
    if(dm.match){ carryDate=dm.date; } else { r.date=carryDate; }
    out.push(r); valid++;
  });
  if(valid<2) return [parseText(text,ctx)];
  return out;
}

function expenseTypeFor(category,type){ if(type!=="Egreso") return ""; var c=CATS[category]; return c?c.et:""; }

/* ---------------------- saldo de efectivo / totales ---------------------- */
function activeEntries(entries){ return Object.keys(entries||{}).map(function(k){return entries[k];}).filter(function(e){return e && !e.deleted;}); }
function cashDelta(e){
  if(e.deleted) return 0;
  if(e.kind==="transfer"){ var d=0; if(e.fromAccount==="Cash") d-=(e.amount||0); if(e.toAccount==="Cash") d+=(e.amount||0); return d; }
  if(e.account!=="Cash") return 0;
  if(typeof e.amount!=="number") return 0;
  return e.type==="Ingreso"? e.amount : -e.amount;
}
function computeBalance(entries, startingBalance){
  var b=Number(startingBalance)||0;
  activeEntries(entries).forEach(function(e){ b+=cashDelta(e); });
  return Math.round(b*100)/100;
}
function inRange(d,from,to){ if(from&&d<from) return false; if(to&&d>to) return false; return true; }
function cashTotals(entries, from, to){
  var inn=0,out=0;
  activeEntries(entries).forEach(function(e){ if(!inRange(e.date,from,to)) return; var d=cashDelta(e); if(d>0)inn+=d; else out+=-d; });
  return {inn:Math.round(inn*100)/100, out:Math.round(out*100)/100};
}
/* totales por categoría (egresos, todas las cuentas, sin transferencias) */
function categoryTotals(entries, from, to, kind){
  kind=kind||"Egreso"; var map={};
  activeEntries(entries).forEach(function(e){
    if(e.kind==="transfer") return; if(!inRange(e.date,from,to)) return;
    if(e.type!==kind) return; var c=e.category||"Sin categoría";
    map[c]=(map[c]||0)+(e.amount||0);
  });
  return Object.keys(map).map(function(c){return {category:c, total:Math.round(map[c]*100)/100};})
    .sort(function(a,b){return b.total-a.total;});
}
function accountTotals(entries, from, to, kind){
  kind=kind||"Egreso"; var m={};
  activeEntries(entries).forEach(function(e){
    if(e.kind==="transfer") return; if(!inRange(e.date,from,to)) return; if(e.type!==kind) return;
    var a=e.account||"Cash"; m[a]=(m[a]||0)+(e.amount||0);
  });
  return Object.keys(m).map(function(a){return {label:a, total:Math.round(m[a]*100)/100};}).sort(function(x,y){return y.total-x.total;});
}
function etTotals(entries, from, to){
  var m={"Vital":0,"Extraordinario":0,"Sin tipo":0};
  activeEntries(entries).forEach(function(e){
    if(e.kind==="transfer") return; if(e.type!=="Egreso") return; if(!inRange(e.date,from,to)) return;
    var k=e.expenseType||"Sin tipo"; if(!(k in m)) k="Sin tipo"; m[k]+=(e.amount||0);
  });
  return Object.keys(m).filter(function(k){return m[k]>0;}).map(function(k){return {label:k, total:Math.round(m[k]*100)/100};}).sort(function(x,y){return y.total-x.total;});
}

/* ---------------------- exportación ---------------------- */
var COLS_NORMAL=["Date","Amount","Transaction","Expense Type","Account","Place","Payment Method","Details","Tags"];
var COLS_TDC=["Date","Amount","Expense Type","Account","Place","Medio de pago","Detalle","# en Meses","Tags"];
function amountForExport(n){ var r=Math.round(n*100)/100; return (r%1===0)?String(r):r.toFixed(2); }
function entryTab(e){ if(e.kind==="transfer") return isTDC(e.toAccount)?"tdc":"normal"; return isTDC(e.account)?"tdc":"normal"; }
function exportTags(e){ var t=String(e.tags||"").trim(); if(e.scope==="shared") t=t?(t+", ratones"):"ratones"; return t; }
function expandEntry(e){
  if(e.kind==="transfer"){
    if(isTDC(e.toAccount)){
      return [{tab:"tdc", row:[formatDateMD(e.date), amountForExport(-(e.amount||0)), "", "Transferencias", e.toAccount, e.fromAccount||"", e.details||"", (e.msi||1), ""]}];
    }
    return [
      {tab:"normal", row:[formatDateMD(e.date), amountForExport(e.amount||0), "Egreso", "", "Transferencias", "", e.fromAccount||"", e.details||"", ""]},
      {tab:"normal", row:[formatDateMD(e.date), amountForExport(e.amount||0), "Ingreso", "", "Transferencias", "", e.toAccount||"", e.details||"", ""]}
    ];
  }
  if(isTDC(e.account)){
    var signed=e.type==="Egreso"?(e.amount||0):-(e.amount||0);
    return [{tab:"tdc", row:[formatDateMD(e.date), amountForExport(signed), e.expenseType||"", e.category||"", e.place||"", e.account, e.details||"", (e.msi||1), exportTags(e)]}];
  }
  return [{tab:"normal", row:[formatDateMD(e.date), amountForExport(e.amount||0), e.type||"", e.expenseType||"", e.category||"", e.place||"", e.account||"", e.details||"", exportTags(e)]}];
}
function tsvForTab(entriesArr, tab, withHeader){
  var lines=[]; if(withHeader) lines.push((tab==="tdc"?COLS_TDC:COLS_NORMAL).join("\t"));
  entriesArr.forEach(function(e){ expandEntry(e).forEach(function(x){ if(x.tab===tab) lines.push(x.row.join("\t")); }); });
  return lines.join("\n");
}

/* ---------------------- Ratones (gastos en pareja) ---------------------- */
var SHARED_CATS=["Abarrotes","Renta","Hogar","Restaurante","Gas","Electricidad","Internet","Recarga","Servicios","Membresías","Coche","Ropa","Regalo","Viajes","Efectivo","Corte"];
/* categoría personal → categoría Ratones (para dictado) */
var SHARED_MAP={
  "Abarrotes":"Abarrotes","Hogar":"Hogar","Gas":"Gas","Renta":"Renta","Internet":"Internet","Electricidad":"Electricidad",
  "Restaurante":"Restaurante","Delivery":"Restaurante","Salidas":"Restaurante","Cafetería Trabajo":"Restaurante",
  "Gasolina":"Coche","Mecánico":"Coche","Seguro Auto":"Coche","Estacionamiento":"Coche",
  "Transporte":"Viajes","Alojamiento":"Viajes","Actividades":"Viajes","Uber":"Viajes",
  "Ropa":"Ropa","Zapatos":"Ropa","Regalos":"Regalo","Teléfono":"Recarga",
  "Entretenimiento":"Membresías","Servicios":"Servicios","Trámites/Comisiones/Servicios":"Servicios","Agua":"Servicios"
};
function sharedCatFor(c){
  if(!c) return null;
  if(SHARED_CATS.indexOf(c)>=0) return c;
  if(SHARED_MAP[c]) return SHARED_MAP[c];
  for(var o in CUR_RENAMES){ if(CUR_RENAMES[o]===c){
    if(SHARED_CATS.indexOf(o)>=0) return o;
    if(SHARED_MAP[o]) return SHARED_MAP[o];
  } }
  return null;
}
var SHARED_KW=/\b(ratones|ratoncit[oa]s?)\b/gi;
function hasSharedKw(text){ var n=" "+normAlnum(text)+" "; return / ratones | ratoncitos? | ratoncitas? /.test(n); }
function stripSharedKw(text){ return String(text||"").replace(SHARED_KW," "); }

/* ---- personas (regalos/efectivo entre la pareja) ---- */
var GIVE_RE=/(^|\s)(le di|le entregue|le regale|le pase|le mande|le preste|le deposite|le transferi|le pague|le solte|di|entregue|regale|pase|mande|preste|transferi)(\s|$)/;
var RECEIVE_RE=/(^|\s)(me dio|me entrego|me regalo|me paso|me mando|me presto|me deposito|me transferio|me pago|me regreso|me devolvio)(\s|$)/;
var MONEY_RE=/(^|\s)(efectivo|dinero|cash|lana|billetes?|feria)(\s|$)/;
var TAKE_RE=/(^|\s)(le\s+)?(agarre|agarramos|tome)(\s|$)/;
function personIn(normText, aliases){
  if(!aliases) return null;
  var found=null;
  ["p1","p2"].forEach(function(p){ (aliases[p]||[]).forEach(function(a){ if(a && hasKw(normText,a)) found=p; }); });
  return found;
}
/* Devuelve {from,to} si el texto describe efectivo dado/recibido entre la pareja. */
function detectCashGift(text, ctx){
  ctx=ctx||{}; if(!ctx.personAliases) return null;
  var me=ctx.me||"p1", other=(me==="p1")?"p2":"p1";
  var n=normAlnum(text);
  if(/(^|\s)(cajero|atm)(\s|$)/.test(n)) return null; /* retiro de cajero, no regalo */
  var who=personIn(n, ctx.personAliases);
  var give=GIVE_RE.test(n), recv=RECEIVE_RE.test(n);
  var take=TAKE_RE.test(n) && MONEY_RE.test(n);
  if(recv){ if(!who||who===me) return null; return {from:who, to:me}; }
  if(take){ return {from:(who&&who!==me)?who:other, to:me}; } /* "agarré efectivo": me dieron */
  if(give){ if(!who||who===me) return null; return {from:me, to:who}; }
  if(who && who!==me && MONEY_RE.test(n)){
    /* sin verbo: "dinero para ratoncita" (yo doy) / "efectivo de ratona" (me dan) */
    var fromThem=false;
    (ctx.personAliases[who]||[]).forEach(function(a){ if(a && new RegExp("(^|\\s)de\\s+(el\\s+|la\\s+)?"+a.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"($|\\s)").test(n)) fromThem=true; });
    return fromThem? {from:who, to:me} : {from:me, to:who};
  }
  return null;
}
/* quita nombres y verbos de regalo para dejar una descripción limpia */
function stripGiftWords(text, aliases){
  var t=normAlnum(text).replace(GIVE_RE," ").replace(RECEIVE_RE," ").replace(TAKE_RE," ");
  var stop={a:1,en:1,efectivo:1,dinero:1,cash:1,lana:1,billete:1,billetes:1,feria:1,de:1,del:1,para:1,el:1,la:1,los:1,las:1,un:1,una:1,unos:1,pesos:1,peso:1,varos:1,varo:1,mil:1,k:1,lucas:1,luca:1,le:1,me:1,ya:1,y:1};
  var aset={};
  ["p1","p2"].forEach(function(p){ (aliases&&aliases[p]||[]).forEach(function(a){ String(a||"").split(/\s+/).forEach(function(w){ if(w) aset[w]=1; }); }); });
  var toks=t.split(/\s+/).filter(function(w){ return w && !stop[w] && !aset[w] && !/^\d+$/.test(w); });
  var s=toks.join(" ").trim();
  return s?s.charAt(0).toUpperCase()+s.slice(1):"";
}

/* saldo de pareja: lo pagado por cada quien menos lo que le tocaba.
   splitP1 = % que le toca a p1. bal>0 → p2 le debe a p1. */
function sharedBalance(entries){
  var p1Paid=0,p2Paid=0,p1Share=0,p2Share=0;
  activeEntries(entries).forEach(function(e){
    if(e.scope!=="shared"||e.kind==="transfer") return;
    var amt=(e.type==="Ingreso")?-(e.amount||0):(e.amount||0);
    var sp=(typeof e.splitP1==="number")?e.splitP1:50;
    if(e.paidBy==="p2") p2Paid+=amt; else p1Paid+=amt;
    p1Share+=amt*sp/100; p2Share+=amt*(100-sp)/100;
  });
  function r(n){ return Math.round(n*100)/100; }
  return {p1Paid:r(p1Paid),p2Paid:r(p2Paid),p1Share:r(p1Share),p2Share:r(p2Share),bal:r(p1Paid-p1Share)};
}
/* gasto conjunto por categoría (excluye Corte y Efectivo: mueven saldo, no son consumo) */
function sharedCatTotals(entries,from,to){
  var m={};
  activeEntries(entries).forEach(function(e){
    if(e.scope!=="shared"||e.kind==="transfer") return;
    if(!inRange(e.date,from,to)) return;
    if(e.category==="Corte"||e.category==="Efectivo") return;
    var amt=(e.type==="Ingreso")?-(e.amount||0):(e.amount||0);
    var c=e.category||"Sin categoría"; m[c]=(m[c]||0)+amt;
  });
  return Object.keys(m).map(function(c){return {label:c,total:Math.round(m[c]*100)/100};})
    .filter(function(x){return x.total>0;}).sort(function(a,b){return b.total-a.total;});
}
function splitLabel(sp){ sp=(typeof sp==="number")?sp:50; return sp+"/"+(100-sp); }
function colsShared(names){ names=names||{p1:"P1",p2:"P2"};
  return ["Date","Amount","Category","Place","Details","Tags","Pagó","División ("+names.p1+"/"+names.p2+")"]; }
function sharedRow(e,names){
  names=names||{p1:"P1",p2:"P2"};
  var amt=(e.type==="Ingreso")?-(e.amount||0):(e.amount||0);
  return [formatDateMD(e.date), amountForExport(amt), e.category||"", e.place||"", e.details||"", e.tags||"",
    names[e.paidBy==="p2"?"p2":"p1"], splitLabel(e.splitP1)];
}
function tsvShared(entriesArr,names,withHeader){
  var lines=[]; if(withHeader) lines.push(colsShared(names).join("\t"));
  entriesArr.forEach(function(e){ if(e.scope==="shared"&&e.kind!=="transfer") lines.push(sharedRow(e,names).join("\t")); });
  return lines.join("\n");
}

/* ---------------------- dinero ---------------------- */
function formatMoney(n){
  var neg=n<0; n=Math.abs(Math.round(n*100)/100);
  var s=(n%1===0)?String(n):n.toFixed(2), parts=s.split("."); parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,",");
  return (neg?"-$":"$")+parts.join(".");
}

/* ===== render ===== */
function render(){
  document.body.className=(V.tab==="reg")?"reg":"";

  if(V.tab==="reg") app.innerHTML=viewReg();
  else if(V.tab==="saldo") app.innerHTML=viewSaldo();
  else if(V.tab==="hist") app.innerHTML=viewHist();
  else if(V.tab==="res") app.innerHTML=viewResumen();
  else if(V.tab==="exp") app.innerHTML=viewExport();
  else if(V.tab==="set") app.innerHTML=viewSettings();
  renderTabs();
  var changed=(V.tab!==render._last); render._last=V.tab;
  if(changed){ app.classList.remove("viewfade"); void app.offsetWidth; app.classList.add("viewfade"); if(V.tab!=="reg") window.scrollTo(0,0); }
  applyAccent();
}
function go(tab){ if(tab===V.tab) return; if(tab==="set") V.prevTab=(V.tab==="set"?V.prevTab:V.tab); V.tab=tab; buzz(5); render(); }
function back(){ V.tab=V.prevTab||"reg"; render(); }

function header(title,withBack){

/* ============ REGISTRAR ============ */

  }).join("");

function acctPill(lbl,name,onclick){
  return '<button class="acctpill" onclick="'+onclick+'"><span class="lbl">'+lbl+'</span><span class="cdot" style="background:'+esc(colorFor(name))+'"></span>'+
    '<span class="nm">'+esc(name)+'</span>'+ico("chevD",16)+'</button>';
}
function xferPreset(lbl,from,to){ return '<button class="chip" onclick="V.xferFrom=\''+jsq(from)+'\';V.xferTo=\''+jsq(to)+'\';render()">'+esc(lbl)+'</button>'; }
function heroAmt(){ var s=V.amt||"0",p=s.split("."); var i=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,","); return p.length>1?i+'<span class="dec">.'+esc(p[1])+'</span>':i; }
function freqCats(mode){
  if(mode==="Ingreso") return ["Otros Ingresos","Reembolsable","Cashback","Regalos"];
  var count={}; E.activeEntries(liveEntries()).forEach(function(e){ if(e.kind!=="transfer"&&e.type==="Egreso"&&e.category) count[e.category]=(count[e.category]||0)+1; });
  var seed=["Restaurante","Abarrotes","Gasolina","Uber","Delivery","Salidas"];
  var CM=E.catsMap(); var out=[]; Object.keys(count).sort(function(a,b){return count[b]-count[a];}).concat(seed).forEach(function(c){ if(out.indexOf(c)<0&&CM[c]&&CM[c].kind==="out") out.push(c); });
  return out.slice(0,7);
}
function setMode(m){ V.mode=m; if(m==="Transferencia") V.cat=null; render(); }
function pickChip(c){ c=unq(c); if(V.amt&&parseFloat(V.amt)>0){ V.cat=c; quickSave(); return; } V.cat=(V.cat===c?null:c); render(); }
function padDigit(d){ if(V.amt.replace(".","").length>=10) return; if(V.amt==="0") V.amt=""; V.amt+=d; buzz(6); refreshHero(true); }
function padDot(){ if(V.amt.indexOf(".")>=0) return; if(!V.amt) V.amt="0"; V.amt+="."; buzz(6); refreshHero(true); }
function padBack(){ if(!V.amt) return; V.amt=V.amt.slice(0,-1); buzz(4); refreshHero(); }
function heroSize(){ var n=(V.amt||"0").replace(".","").length; return n>9?" sz3":(n>6?" sz2":""); }
function refreshHero(pop){ var el=document.querySelector(".hero .amt"); if(el){ el.className="amt"+(V.amt?"":" zero")+heroSize(); el.innerHTML='<span class="cur">$</span>'+heroAmt(); if(pop){ el.classList.remove("pop"); void el.offsetWidth; el.classList.add("pop"); } } }
function currentAmount(){ var n=parseFloat(V.amt); return isNaN(n)?0:Math.round(n*100)/100; }
function focusNL(){ var el=document.getElementById("nlText"); if(el){ el.focus(); } }
var recog=null, recognizing=false, dictBuffer="";
function setMicState(on){
  var b=document.getElementById("micBig");
  if(b){ b.classList.toggle("rec",on); b.innerHTML=(on?ico("stop",26):ico("mic",27)); }
}
function autoGrow(el){ if(!el) return; el.style.height="auto"; el.style.height=(el.scrollHeight)+"px"; }
function startDictation(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ focusNL(); toast("Toca el micrófono de tu teclado para dictar"); return; }
  if(recognizing){ stopDictation(); return; }         // 2º toque = parar y analizar
  try{
    recog=new SR(); recog.lang="es-MX"; recog.continuous=true; recog.interimResults=true; recog.maxAlternatives=1;
    dictBuffer=""; recognizing=true; setMicState(true);
    recog.onresult=function(ev){
      var fin="", intr="";
      for(var i=ev.resultIndex;i<ev.results.length;i++){ var r=ev.results[i]; if(r.isFinal) fin+=r[0].transcript+" "; else intr+=r[0].transcript; }
      if(fin) dictBuffer+=fin;
      var el=document.getElementById("nlText"); if(el){ el.value=(dictBuffer+intr).trim(); autoGrow(el); }
    };
    recog.onerror=function(e){ recognizing=false; setMicState(false); if(e&&e.error==="not-allowed") toast("Permite el micrófono en Safari"); };
    recog.onend=function(){ recognizing=false; setMicState(false); var el=document.getElementById("nlText"); if(el&&el.value.trim()) interpret(); };
    recog.start();
    toast("Escuchando… toca el micrófono otra vez para analizar");
  }catch(e){ recognizing=false; setMicState(false); focusNL(); }
}
function stopDictation(){ if(recog){ try{recog.stop();}catch(e){} } }

function quickSave(){
  if(recognizing){ stopDictation(); return; }
  var amt=currentAmount();
  if(amt<=0){
    var nl=document.getElementById("nlText");
    if(nl && nl.value.trim()){ interpret(); return; }   // procesa lo dictado/escrito
    toast("Escribe un monto o dicta"); return;
  }
  if(V.mode==="Transferencia"){
    if(V.xferFrom===V.xferTo){ toast("Elige cuentas distintas"); return; }
    commitTransfer({date:E.todayISO(),amount:amt,fromAccount:V.xferFrom,toAccount:V.xferTo,details:"",msi:1});
    V.amt=""; render(); toast("Transferencia "+money(amt),true); return;
  }
  var type=(V.mode==="Ingreso")?"Ingreso":"Egreso";
  if(!V.cat){ openSheetFromPad(); return; }
  commitTxn({date:E.todayISO(),amount:amt,type:type,category:V.cat,account:V.account,place:"",details:"",tags:"",expenseType:etFor(V.cat,type),msi:1});
  rememberAccount(); V.amt=""; V.cat=null; render(); toast(money(amt)+" · "+V.cat,true);
}
function rememberAccount(){ DB.settings.lastAccount=V.account; }

function interpret(){
  var el=document.getElementById("nlText"); if(!el) return;
  var text=(el.value||"").trim(); if(!text){ toast("Escribe o dicta algo"); return; }
  var drafts=E.parseMulti(text,parseCtx());
  if(drafts.length>1){ openMulti(drafts); return; }
  var r=drafts[0];
  if(r.kind==="transfer"){
    openSheet(null,null,"Confirmar transferencia",{kind:"transfer",date:r.date,amount:r.amount||currentAmount()||0,fromAccount:r.fromAccount||V.xferFrom,toAccount:r.toAccount||V.xferTo,details:r.details||"",msi:r.msi||1});
    return;
  }
  if(r.cashGift){
    var g=r.cashGift;
    openSheet({date:r.date,amount:r.amount||currentAmount()||0,type:"Egreso",category:"Efectivo",account:"Cash",place:"",details:r.details||"",tags:"",expenseType:"",msi:1,scope:"shared",paidBy:g.from,splitP1:(g.to==="p1"?100:0),giftTo:g.to},null,"Confirmar efectivo");
    return;
  }
  openSheet({date:r.date,amount:r.amount||currentAmount()||0,type:r.type||"Egreso",category:r.category,account:r.account||V.account,place:r.place||"",details:r.details||"",tags:"",expenseType:(r.shared?"":(r.category?etFor(r.category,r.type||"Egreso"):"")),msi:r.msi||1,scope:r.shared?"shared":"personal",paidBy:r.shared?prof():undefined,splitP1:r.shared?defaultSplit():undefined},null,"Confirmar registro");
}
function openSheetFromPad(){
  if(V.mode==="Transferencia"){ openSheet(null,null,"Nueva transferencia",{kind:"transfer",date:E.todayISO(),amount:currentAmount(),fromAccount:V.xferFrom,toAccount:V.xferTo,details:"",msi:1}); return; }
  var type=(V.mode==="Ingreso")?"Ingreso":"Egreso";
  openSheet({date:E.todayISO(),amount:currentAmount(),type:type,category:V.cat,account:V.account,place:"",details:"",expenseType:V.cat?etFor(V.cat,type):"",msi:1},null,"Nuevo registro");
}

function viewSaldo(){
  var b=balance(),mIso=E.todayISO().slice(0,7),t=cashTotalsMine(mIso+"-01",mIso+"-31");
  return header()+
    '<div class="card bigbal"><div class="lbl">Efectivo en mano</div><div class="v'+(b<0?" neg":"")+'">'+esc(money(b))+'</div></div>'+
    '<div class="twocol"><div class="card"><div class="k">Entró (mes)</div><div class="val in">'+esc(money(t.inn))+'</div></div>'+
    '<div class="card"><div class="k">Salió (mes)</div><div class="val out">'+esc(money(t.out))+'</div></div></div>'+
    ratMiniCard()+
    '<button class="btn ghost" onclick="reconcile()">Cuadrar efectivo con lo que traigo</button>'+
    '<div style="height:10px"></div>'+
    '<button class="btn ghost" onclick="editStart()">Saldo inicial ('+esc(money(DB.settings.startingBalance))+')</button>'+

}
function ratMiniCard(){
  if(!E.activeEntries(DB.entries).some(function(e){return e.scope==="shared";})) return "";
  var sb=E.sharedBalance(DB.entries), nm=names(), me=prof();
  var txt = sb.bal===0 ? "Están a mano"
    : (sb.bal>0 ? (me==="p1" ? nm.p2+" te debe" : "Le debes a "+nm.p1)
                : (me==="p2" ? nm.p1+" te debe" : "Le debes a "+nm.p2));
  var meOwes=(sb.bal>0&&me==="p2")||(sb.bal<0&&me==="p1");
  return '<div class="card ratmini" onclick="V.resView=\'rat\';go(\'res\')">'+
    '<div class="ic" style="color:var(--acc)">'+ico("mouse",20)+'</div>'+
    '<div class="mid"><div class="t">Ratones</div><div class="s">'+esc(txt)+'</div></div>'+
    '<div class="amt '+(sb.bal===0?"":(meOwes?"out":"in"))+'">'+esc(money(Math.abs(sb.bal)).replace("$",""))+'</div></div>';
}
function recentList(n){
  var arr=E.activeEntries(liveEntries()).sort(sortDesc);
  if(!arr.length) return '<div class="empty"><div class="big">Sin movimientos</div>Registra tu primer gasto o carga de efectivo.</div>';
  return arr.slice(0,n).map(entryRow).join("");
}
function reconcile(){
  var cur=balance(),v=prompt("¿Cuánto efectivo traes en realidad? (saldo actual: "+money(cur)+")");
  if(v==null) return; var real=parseFloat(String(v).replace(/[^0-9.\-]/g,"")); if(isNaN(real)){ toast("Monto no válido"); return; }
  var diff=Math.round((real-cur)*100)/100; if(diff===0){ toast("Ya estaba cuadrado ✔",true); return; }
  commitTxn({date:E.todayISO(),amount:Math.abs(diff),type:diff>0?"Ingreso":"Egreso",category:"Ajuste/Pendiente",account:"Cash",place:"",details:"Ajuste de efectivo",expenseType:"",msi:1});
  render(); toast("Cuadrado: "+(diff>0?"+":"")+money(diff),true);
}
function editStart(){ var v=prompt("Saldo inicial de efectivo:",DB.settings.startingBalance); if(v==null) return; var n=parseFloat(String(v).replace(/[^0-9.\-]/g,"")); if(isNaN(n)){toast("Monto no válido");return;} DB.settings.startingBalance=Math.round(n*100)/100; save(); render(); toast("Actualizado",true); }

function sortDesc(a,b){ return (b.date+"~"+(b.createdAt||0))<(a.date+"~"+(a.createdAt||0))?-1:1; }
function entryRow(e,i){ return entryRowBase(e,"openEdit",true,(typeof i==="number")?i:-1); }
function entryRowBase(e,click,swipe,idx){
  var inner;
  if(e.kind==="transfer"){
    var tdcX=E.isTDC(e.toAccount);
    var subX=(e.fromAccount||"?")+" → "+(e.toAccount||"?")+(e.details?(" · "+e.details):"");

      '<div class="mid"><div class="t">'+(tdcX?"Pago tarjeta":"Transferencia")+'</div><div class="s">'+esc(subX)+'</div></div>'+
