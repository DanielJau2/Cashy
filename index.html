:root{
  --ink:#100F0C; --ink2:#191712; --ink3:#221F18; --line:#2C2A22;
  --bone:#ECE5D6; --dim:#A9A08C; --faint:#6E6857;
  --gold:#E7B45A; --gold-dim:#8A6E38; --green:#7FC8A0; --red:#E0917C;
  --fb:-apple-system,system-ui,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --fd:'BebasNeue',var(--fb);
  --safeb:env(safe-area-inset-bottom,0px); --safet:env(safe-area-inset-top,0px);
  --tabh:76px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--ink);color:var(--bone);font-family:var(--fb);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overscroll-behavior-y:none;overflow-x:hidden;}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0;}
input,textarea,select{font-family:inherit;color:inherit;max-width:100%;}
input:focus,textarea:focus,select:focus{outline:none;}
::placeholder{color:var(--faint);}
.hide{display:none!important;}

#app{max-width:520px;margin:0 auto;padding:0 18px calc(var(--safeb) + var(--tabh) + 14px);min-height:100vh;}
body.reg #app{height:100dvh;overflow:hidden;padding-bottom:0;}

/* header sticky */
.head{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
  gap:10px;padding:calc(var(--safet) + 10px) 0 10px;margin-bottom:6px;
  background:linear-gradient(var(--ink) 72%, rgba(16,15,12,0));}
.head .lft{display:flex;align-items:center;gap:8px;min-width:0;}
.head .brand{font-family:var(--fd);font-size:25px;letter-spacing:.06em;line-height:1;}
.head .brand b{color:var(--gold);font-weight:400;}
.head .title{font-family:var(--fd);font-size:22px;letter-spacing:.05em;text-transform:uppercase;color:var(--bone);}
.head .rgt{display:flex;align-items:center;gap:9px;}
.head .bal{font-family:var(--fb);font-size:11.5px;color:var(--dim);text-align:right;line-height:1.25;}
.head .bal b{display:block;font-family:var(--fd);font-size:21px;letter-spacing:.02em;color:var(--bone);}
.iconbtn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;color:var(--dim);border:1px solid var(--line);background:var(--ink2);flex:0 0 auto;}
.iconbtn:active{background:var(--ink3);}

/* segmented */
.seg{display:flex;gap:5px;background:var(--ink2);border:1px solid var(--line);border-radius:13px;padding:5px;}
.seg button{flex:1;padding:9px 4px;border-radius:9px;font-size:13px;font-weight:600;color:var(--dim);transition:.12s;}
.seg button.on{background:var(--ink3);color:var(--bone);box-shadow:inset 0 0 0 1px var(--line);}
.seg button.on.in{color:var(--green);} .seg button.on.xf{color:var(--gold);}

/* account pill */
.acctpill{display:flex;align-items:center;gap:8px;width:100%;padding:11px 14px;border-radius:13px;
  background:var(--ink2);border:1px solid var(--line);font-size:14px;font-weight:600;}
.acctpill .lbl{color:var(--faint);font-weight:500;font-size:12px;letter-spacing:.05em;text-transform:uppercase;}
.acctpill .nm{margin-left:auto;color:var(--bone);}
.acctpill .nm.tdc{color:var(--gold);}
.acctpill svg{width:16px;height:16px;color:var(--faint);}
.xfrow{display:flex;gap:8px;align-items:stretch;}
.xfrow .acctpill{flex:1;}
.xfrow .ar{display:grid;place-items:center;color:var(--faint);flex:0 0 auto;}

/* hero */
.hero{text-align:center;}
.hero .lbl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-family:var(--fd);}
.hero .amt{font-family:var(--fd);font-size:64px;line-height:.95;letter-spacing:.01em;display:flex;align-items:baseline;justify-content:center;gap:2px;}
.hero .amt .cur{font-size:30px;color:var(--gold);transform:translateY(-11px);}
.hero .amt.zero{color:var(--faint);}
.hero .amt .dec{color:var(--dim);}

/* mic / NL */
.microw{display:flex;gap:8px;}
.micbtn{flex:0 0 auto;width:52px;border-radius:14px;background:var(--gold);color:#241a08;display:grid;place-items:center;}
.micbtn svg{width:24px;height:24px;}
.micbtn:active{filter:brightness(.94);}
.nlfield{flex:1;background:var(--ink2);border:1px solid var(--line);border-radius:14px;padding:0 14px;font-size:15px;}

/* chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 18px;margin:0 -18px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;padding:9px 14px;border-radius:999px;border:1px solid var(--line);background:var(--ink2);font-size:13.5px;color:var(--dim);white-space:nowrap;font-weight:500;}
.chip.on{border-color:var(--gold-dim);color:var(--gold);background:rgba(231,180,90,.08);}
.chip.more{color:var(--faint);}

/* keypad */
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.key{border-radius:14px;background:var(--ink2);border:1px solid var(--line);font-family:var(--fd);font-size:28px;letter-spacing:.02em;color:var(--bone);display:grid;place-items:center;min-height:46px;}
.key:active{background:var(--ink3);}
.key.sub{font-family:var(--fb);font-size:15px;color:var(--dim);font-weight:600;}
.key svg{width:23px;height:23px;}

/* reg layout sin scroll */
.regpage{display:flex;flex-direction:column;gap:10px;height:calc(100dvh - var(--safet) - var(--safeb) - var(--tabh) - 8px);}
.regpage .pad{flex:1 1 auto;grid-template-rows:repeat(4,1fr);}
.regpage .key{min-height:0;}

/* buttons */
.btn{width:100%;padding:15px;border-radius:15px;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:9px;}
.btn.primary{background:var(--gold);color:#241a08;} .btn.primary:active{filter:brightness(.94);}
.btn.ghost{background:var(--ink2);border:1px solid var(--line);color:var(--bone);} .btn.ghost:active{background:var(--ink3);}
.btn.mini{padding:11px;font-size:14px;border-radius:12px;}
.btn:disabled{opacity:.45;}

/* cards */
.card{background:var(--ink2);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:12px;}
.bigbal{text-align:center;padding:26px 18px 22px;}
.bigbal .lbl{font-family:var(--fd);letter-spacing:.16em;color:var(--faint);font-size:13px;text-transform:uppercase;}
.bigbal .v{font-family:var(--fd);font-size:72px;line-height:1;margin-top:6px;}
.bigbal .v.neg{color:var(--red);}
.twocol{display:flex;gap:12px;margin-bottom:12px;}
.twocol .card{flex:1;margin:0;text-align:center;padding:16px 10px;}
.twocol .k{font-size:12px;color:var(--faint);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;}
.twocol .val{font-family:var(--fd);font-size:32px;} .twocol .val.in{color:var(--green);} .twocol .val.out{color:var(--red);}
.sechead{display:flex;align-items:center;justify-content:space-between;margin:18px 2px 10px;}
.sechead h3{font-family:var(--fd);font-size:20px;letter-spacing:.05em;margin:0;font-weight:400;text-transform:uppercase;}
.sechead .nav{display:flex;align-items:center;gap:6px;color:var(--dim);}
.sechead .nav button{width:30px;height:30px;border-radius:9px;border:1px solid var(--line);background:var(--ink2);display:grid;place-items:center;color:var(--dim);}

/* list rows */
.row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--ink2);border:1px solid var(--line);border-radius:14px;margin-bottom:8px;}
.row:active{background:var(--ink3);}
.row .ic{width:38px;height:38px;border-radius:11px;background:var(--ink3);display:grid;place-items:center;flex:0 0 auto;font-family:var(--fd);font-size:17px;color:var(--gold);}
.row .ic.tdc{color:#d9a3ff;} .row .ic.xf{color:var(--dim);}
.row .mid{flex:1;min-width:0;}
.row .mid .t{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row .mid .s{font-size:12px;color:var(--faint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row .amt{font-family:var(--fd);font-size:23px;flex:0 0 auto;}
.row .amt.in{color:var(--green);} .row .amt.out{color:var(--bone);} .row .amt.xf{color:var(--dim);}
.row .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex:0 0 auto;}
.daygrp{font-size:12px;color:var(--faint);letter-spacing:.05em;text-transform:uppercase;margin:16px 4px 8px;font-weight:600;}
.empty{text-align:center;color:var(--faint);padding:40px 20px;font-size:14px;line-height:1.6;}
.empty .big{font-family:var(--fd);font-size:28px;color:var(--dim);letter-spacing:.04em;margin-bottom:8px;}

.field{margin-bottom:12px;}
.field .fl{font-size:12px;color:var(--dim);letter-spacing:.04em;margin-bottom:6px;text-transform:uppercase;}
.field input,.field textarea,.field select{width:100%;background:var(--ink3);border:1px solid var(--line);border-radius:12px;padding:12px 13px;font-size:15px;}
.field textarea{min-height:50px;resize:vertical;line-height:1.5;}
.pill2{display:flex;gap:8px;flex-wrap:wrap;}
.pill2 button{flex:1;min-width:70px;padding:11px;border-radius:12px;border:1px solid var(--line);background:var(--ink3);color:var(--dim);font-weight:600;font-size:13.5px;}
.pill2 button.on{border-color:var(--gold-dim);color:var(--gold);background:rgba(231,180,90,.08);}

/* sheet */
.sheetwrap{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;}
.sheetbg{position:absolute;inset:0;background:rgba(6,6,4,.62);backdrop-filter:blur(2px);}
.sheet{position:relative;width:100%;max-width:520px;background:var(--ink);border:1px solid var(--line);
  border-radius:22px 22px 0 0;padding:14px 18px calc(var(--safeb) + 20px);max-height:92vh;
  overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;touch-action:pan-y;
  box-shadow:0 -20px 60px rgba(0,0,0,.5);animation:up .22s ease;}
@keyframes up{from{transform:translateY(28px);opacity:.6;}to{transform:none;opacity:1;}}
.sheet *{max-width:100%;}
.grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 12px;}
.sheet h2{font-family:var(--fd);font-size:23px;letter-spacing:.04em;margin:0 0 8px;font-weight:400;text-transform:uppercase;}
.sheet .amt-edit{font-family:var(--fd);font-size:48px;text-align:center;letter-spacing:.02em;margin:2px 0 12px;border:none;background:none;width:100%;color:var(--bone);}
.catgrid{display:flex;flex-wrap:wrap;gap:7px;max-height:190px;overflow-y:auto;overflow-x:hidden;padding:2px;}
.catgrid button{padding:8px 11px;border-radius:10px;border:1px solid var(--line);background:var(--ink2);font-size:12.5px;color:var(--dim);}
.catgrid button.on{border-color:var(--gold-dim);color:var(--gold);background:rgba(231,180,90,.08);}
.catgrid .gl{width:100%;font-size:11px;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin:8px 2px 2px;}
.sheetbtns{display:flex;gap:10px;margin-top:14px;}
.mcard{background:var(--ink2);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:9px;}
.mcard .top{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.mcard .top .a{font-family:var(--fd);font-size:26px;}
.mcard select{width:100%;margin-top:8px;background:var(--ink3);border:1px solid var(--line);border-radius:10px;padding:9px;font-size:13px;}
.mcard .rm{color:var(--faint);font-size:12px;}

.sblk{background:var(--ink2);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;}

.catrow .cn{font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.acctlist button{display:flex;align-items:center;gap:10px;width:100%;padding:12px 12px;border-radius:12px;border:1px solid var(--line);background:var(--ink2);margin-bottom:8px;font-size:15px;}

.acctlist .glabel{font-size:11px;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin:10px 2px 6px;}

/* charts */
.bar{margin-bottom:11px;}

.bar .lab .c{color:var(--bone);} .bar .lab .v{color:var(--dim);font-family:var(--fd);font-size:16px;letter-spacing:.02em;}

.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(16,15,12,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:8px 0 calc(var(--safeb) + 8px);}
.tabbar .inner{display:flex;justify-content:space-around;width:100%;max-width:520px;margin:0 auto;}

.tabbar button svg{width:22px;height:22px;}
.tabbar button.on{color:var(--gold);}

var INCOME_REFUND = ["reembolso","me reembolsaron","me regresaron","devolucion","me devolvieron"];
var INCOME_VERBS = ["me pagaron","me pago","cobre","recibi","me dieron","me depositaron","gane","vendi","venta","aguinaldo","bono","me llego"];
var RET_WORDS = ["retiro","retire","retiraste","saque","cajero","dispuse","disposicion","saque dinero"];
var DEP_WORDS = ["deposito","deposite","meti al banco","ingrese al banco","abono al banco"];
var PAY_WORDS = ["pago","pague","abone","liquide","pago de tarjeta","abono a la tarjeta","pago a la tdc"];
var XFER_WORDS = ["transferencia","transferi","transfiere","pase","traspaso","spei"];

/* ---------------------- utilidades de texto ---------------------- */
function deaccent(s){ return String(s==null?"":s).normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
function normAlnum(s){ return deaccent(String(s==null?"":s).toLowerCase()).replace(/[^a-z0-9\s]/g," ").replace(/\s+/g," ").trim(); }
function hasKw(normText, kw){ var re=new RegExp("(^|\\s)"+kw.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"($|\\s)"); return re.test(normText); }
function escapeRe(s){ return String(s).replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }

/* ---------------------- fechas ---------------------- */
function iso(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function todayISO(){ return iso(new Date()); }
function fromISO(s){ return new Date(s+"T12:00:00"); }
function addDays(isoStr,n){ var d=fromISO(isoStr); d.setDate(d.getDate()+n); return iso(d); }
var MESES={enero:0,febrero:1,marzo:2,abril:3,mayo:4,junio:5,julio:6,agosto:7,septiembre:8,setiembre:8,octubre:9,noviembre:10,diciembre:11};
var DIAS={domingo:0,lunes:1,martes:2,miercoles:3,jueves:4,viernes:5,sabado:6};
function parseDate(text, baseISO){
  baseISO=baseISO||todayISO();
  var t=normAlnum(text), raw=deaccent(String(text==null?"":text).toLowerCase()), m;
  if(/(^|\s)antier($|\s)/.test(t)||/anteayer/.test(t)) return {date:addDays(baseISO,-2), match:(/anteayer/.test(t)?"anteayer":"antier")};
  if(/(^|\s)ayer($|\s)/.test(t)) return {date:addDays(baseISO,-1), match:"ayer"};
  if(/pasado manana/.test(t)) return {date:addDays(baseISO,2), match:"pasado manana"};
  if(/(^|\s)manana($|\s)/.test(t)) return {date:addDays(baseISO,1), match:"manana"};
  if(/(^|\s)hoy($|\s)/.test(t)) return {date:baseISO, match:"hoy"};
  m=t.match(/hace\s+(\d{1,3})\s+dias?/); if(m) return {date:addDays(baseISO,-parseInt(m[1],10)), match:m[0]};
  m=t.match(/(\d{1,2})\s+de\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|setiembre|octubre|noviembre|diciembre)/);
  if(m){ var dd=parseInt(m[1],10),mo=MESES[m[2]],base=fromISO(baseISO),yr=base.getFullYear(),cand=new Date(yr,mo,dd,12,0,0);
    if(cand>new Date(base.getFullYear(),base.getMonth(),base.getDate(),23,59,59)) cand=new Date(yr-1,mo,dd,12,0,0);
    return {date:iso(cand), match:m[0]}; }
  m=raw.match(/(^|\s)(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?(?=$|\s)/);
  if(m){ var d1=parseInt(m[2],10),d2=parseInt(m[3],10),yy=m[4];
    if(d1>=1&&d1<=31&&d2>=1&&d2<=12){ var y=yy?(yy.length===2?2000+parseInt(yy,10):parseInt(yy,10)):fromISO(baseISO).getFullYear();
      var mraw=m[0].trim(); return {date:iso(new Date(y,d2-1,d1,12,0,0)), match:(text.indexOf(mraw)>=0?mraw:(m[2]+"/"+m[3]))}; } }
  for(var name in DIAS){ if(hasKw(t,name)){ var future=/proximo|que viene|siguiente/.test(t);
    var b2=fromISO(baseISO),cur=b2.getDay(),target=DIAS[name],diff;
    if(future){ diff=(target-cur+7)%7; if(diff===0)diff=7; } else { diff=(cur-target+7)%7; if(diff===0)diff=7; diff=-diff; }
    return {date:addDays(baseISO,diff), match:name}; } }
  return {date:baseISO, match:null};
}
function formatDateMD(isoStr){ var d=fromISO(isoStr); return (d.getMonth()+1)+"/"+d.getDate()+"/"+String(d.getFullYear()).slice(-2); }

/* ---------------------- montos ---------------------- */
function parseAmount(text){
  if(!text) return null;
  var t=" "+text.toLowerCase()+" ", best=null;
  var re=/(\$?\s*)((?:\d{1,3}(?:[,\.]\d{3})+(?:\.\d{1,2})?)|(?:\d+(?:\.\d{1,2})?))(?:\s*(k|mil|pesos|peso|varos|varo|lucas|luca)\b)?/g, m;
  while((m=re.exec(t))!==null){
    var raw=m[2],suffix=(m[3]||"").trim(),hadDollar=/\$/.test(m[1]),val=normalizeNumber(raw);
    if(val==null) continue;
    if(suffix==="k"||suffix==="lucas"||suffix==="luca"||suffix==="mil") val=val*1000;
    var score=0; if(hadDollar)score+=3; if(suffix)score+=2; if(raw.indexOf(".")>=0||raw.indexOf(",")>=0)score+=1; if(val>=1)score+=1;
    if(best===null||score>best.score) best={amount:val,match:m[0].trim(),score:score};
  }
  if(!best) return null;
  return {amount:Math.round(best.amount*100)/100, match:best.match};
}
function normalizeNumber(raw){
  raw=raw.trim();
  if(/,/.test(raw)&&/\./.test(raw)) raw=raw.replace(/,/g,"");
  else if(/,/.test(raw)){ var p=raw.split(","); if(p.length===2&&p[1].length<=2&&p[0].length<=3&&!/^\d{3}$/.test(p[1])) raw=p[0]+"."+p[1]; else raw=raw.replace(/,/g,""); }
  var n=parseFloat(raw); return isNaN(n)?null:n;
}

/* ---------------------- MSI (meses) ---------------------- */
function parseMSI(text){
  var t=normAlnum(text), m;
  m=t.match(/\b(\d{1,2})\s*(?:msi|meses sin intereses|meses|mses)\b/); if(m) return parseInt(m[1],10);
  m=t.match(/\ba\s+(\d{1,2})\s+meses/); if(m) return parseInt(m[1],10);
  m=t.match(/\bdiferido\s+(?:a\s+)?(\d{1,2})/); if(m) return parseInt(m[1],10);
  return 1;
}

/* ---------------------- cuentas ---------------------- */
function aliasIn(str){ // str normalizado; devuelve cuenta de la 1ª alias que aparezca
  for(var i=0;i<ACCT_ALIASES.length;i++){ if(hasKw(str,ACCT_ALIASES[i][0])) return ACCT_ALIASES[i][1]; }
  return null;
}
function firstTDCIn(str){
  for(var i=0;i<ACCT_ALIASES.length;i++){ if(isTDC(ACCT_ALIASES[i][1]) && hasKw(str,ACCT_ALIASES[i][0])) return ACCT_ALIASES[i][1]; }
  return null;
}
/* cuenta de pago: la que sigue a "con / tarjeta / tdc"; o "efectivo/cash" suelto */
function detectAccount(text){
  var t=normAlnum(text);
  for(var i=0;i<ACCT_ALIASES.length;i++){
    var a=ACCT_ALIASES[i][0];
    if(hasKw(t,"con "+a)||hasKw(t,"con mi "+a)||hasKw(t,"con la "+a)||hasKw(t,"con el "+a)||hasKw(t,"tarjeta "+a)||hasKw(t,"pagando con "+a))
      return ACCT_ALIASES[i][1];
  }
  if(hasKw(t,"en efectivo")||hasKw(t,"efectivo")) return "Cash";
  return null;
}

/* ---------------------- transferencias ---------------------- */
function parseTransfer(text, ctx){
  ctx=ctx||{};
  var t=normAlnum(text);
  var amt=parseAmount(text), amount=amt?amt.amount:null, msi=parseMSI(text);
  var deA=t.match(/\bde\s+(.+?)\s+a(?:l)?\s+(.+)$/);
  var fromDE=deA?aliasIn(deA[1]):null, toDE=deA?aliasIn(deA[2]):null;
  var isRet=RET_WORDS.some(function(w){return hasKw(t,w);});
  var isDep=DEP_WORDS.some(function(w){return hasKw(t,w);});
  var isPay=PAY_WORDS.some(function(w){return hasKw(t,w);});
  var isXfer=XFER_WORDS.some(function(w){return hasKw(t,w);});
  var tdc=firstTDCIn(t);
  var payMethod=detectAccount(text);

  // Pago de TDC (una sola línea a TDC): solo si la tarjeta es el OBJETO del pago,
  // no cuando es el MÉTODO ("con <tdc>" = compra pagada con esa tarjeta).
  if(isPay && tdc && !isXfer && tdc!==payMethod){
    var fromPay=payMethod || fromDE || null;
    return {kind:"transfer", from:fromPay, to:tdc, amount:amount, msi:msi, tdcpay:true};
  }
  if(isRet){ return {kind:"transfer", from:(fromDE||detectAccount(text)||aliasIn(t)||null), to:"Cash", amount:amount, msi:1}; }
  if(isDep){ return {kind:"transfer", from:"Cash", to:(toDE||detectAccount(text)||null), amount:amount, msi:1}; }
  if(isXfer || (fromDE && toDE)){ return {kind:"transfer", from:fromDE, to:toDE, amount:amount, msi:1}; }
  return null;
}

/* ---------------------- tipo / categoría / lugar / detalle ---------------------- */
function detectType(normText){
  var i;
  for(i=0;i<INCOME_REFUND.length;i++) if(hasKw(normText,INCOME_REFUND[i])) return "Ingreso";
  for(i=0;i<INCOME_VERBS.length;i++) if(hasKw(normText,INCOME_VERBS[i])) return "Ingreso";
  return "Egreso";
}
function detectCategory(normText, ctx){
  ctx=ctx||{};
  if(ctx.customRules){ for(var c=0;c<ctx.customRules.length;c++){ if(hasKw(normText,normAlnum(ctx.customRules[c][0]))) return ctx.customRules[c][1]; } }
  if(ctx.learn && ctx.learn.places){ for(var p in ctx.learn.places){ if(p && hasKw(normText,p)) return ctx.learn.places[p]; } }
  for(var r=0;r<INCOME_REFUND.length;r++) if(hasKw(normText,INCOME_REFUND[r])) return "Reembolsable";
  for(var i=0;i<RULES.length;i++){ if(hasKw(normText,RULES[i][0])) return RULES[i][1]; }
  return null;
}
var PLACE_STOP={de:1,en:1,el:1,la:1,los:1,las:1,un:1,una:1,por:1,para:1,con:1,me:1,mi:1,ayer:1,hoy:1,antier:1,pesos:1,peso:1,y:1,del:1,al:1,tarjeta:1};
function extractPlace(text){
  var t=" "+normAlnum(text)+" ", m=t.match(/\sen\s(?:el\s|la\s|los\s|las\s)?([a-z0-9].*)$/);
  if(!m) return "";
  var words=m[1].split(" "), out=[];
  for(var i=0;i<words.length;i++){ var wd=words[i]; if(!wd) continue;
    if(PLACE_STOP[wd]||aliasIn(wd)) break; if(out.length>=3) break; out.push(wd); }
  return out.map(titleWord).join(" ");
}
function titleWord(w){ return w.charAt(0).toUpperCase()+w.slice(1); }
function extractDetails(text, amountMatch){
  var t=text; if(amountMatch) t=t.replace(new RegExp(escapeRe(amountMatch),"i")," ");
  var n=normAlnum(t), m=n.match(/\bde\s+([a-z]+(?:\s[a-z]+){0,2})/);
  var strip={gaste:1,pague:1,compre:1,cobraron:1,me:1,cobre:1,costo:1,un:1,una:1,unos:1,unas:1,en:1,el:1,la:1,los:1,las:1,por:1,pesos:1,peso:1,de:1,con:1,y:1,al:1,del:1,mi:1,meses:1,msi:1};
  var clean=n.split(" ").filter(function(w){return w&&!strip[w];}).join(" ").trim(), out=clean;
  if(m){ var c=m[1].split(" ").filter(function(w){return !strip[w];}).join(" ").trim(); if(c) out=c; }
  if(out.length>48) out=out.slice(0,48).trim();
  return out?out.charAt(0).toUpperCase()+out.slice(1):"";
}

/* ---------------------- parseo principal ---------------------- */
function parseText(text, ctx){
  ctx=ctx||{}; var baseISO=ctx.today||todayISO();
  var norm=normAlnum(text);

  var xfer=parseTransfer(text, ctx);
  var dateRes=parseDate(text, baseISO);

  if(xfer){
    return {
      kind:"transfer", date:dateRes.date, amount:xfer.amount,
      fromAccount:xfer.from, toAccount:xfer.to, tdcpay:!!xfer.tdcpay,
      msi:xfer.msi||1, details:"", category:"Transferencias",
      matched:{date:!!dateRes.match, amount:xfer.amount!=null, transfer:true}
    };
  }

  var noDate=dateRes.match? text.replace(new RegExp(escapeRe(dateRes.match),"i")," ") : text;
  var noMsi=noDate.replace(/\b(?:a\s+)?\d{1,2}\s*(?:msi|meses(?:\s+sin\s+intereses)?|mses)\b/gi," ");
  var amtRes=parseAmount(noMsi), amount=amtRes?amtRes.amount:null;
  var account=detectAccount(text)||ctx.account||"Cash";
  var category=detectCategory(norm, ctx), type=detectType(norm);
  if(category && CATS[category]){ var k=CATS[category].kind; if(k==="in")type="Ingreso"; else if(k==="out")type="Egreso"; }
  if(!category) category=(type==="Ingreso")?"Otros Ingresos":null;
  var place=extractPlace(noDate), details=extractDetails(noDate, amtRes?amtRes.match:null);
  var et=(category&&CATS[category])?(type==="Egreso"?CATS[category].et:""):"";
  var msi=isTDC(account)?parseMSI(text):1;

  return {
    kind:"txn", date:dateRes.date, amount:amount, type:type, category:category,
    account:account, place:place, details:details, expenseType:et, msi:msi,
    matched:{date:!!dateRes.match, amount:!!amtRes, category:!!category, account:!!detectAccount(text)}
  };
}

/* dividir varias transacciones en una frase */
function parseMulti(text, ctx){
  ctx=ctx||{};
  var pieces=text.split(/\s*(?:,|\+|;| y | e | tambien | también | mas | más )\s*/i).map(function(s){return s.trim();}).filter(Boolean);
  if(pieces.length<2){ return [parseText(text,ctx)]; }
  var baseDate=parseDate(text, ctx.today||todayISO()).date;
  var out=[], valid=0;
  pieces.forEach(function(p){
    var r=parseText(p, ctx);
    if(r.amount==null){ return; }
    if(!parseDate(p, ctx.today||todayISO()).match) r.date=baseDate;
    out.push(r); valid++;
  });
  if(valid<2) return [parseText(text,ctx)];
  return out;
}

function expenseTypeFor(category,type){ if(type!=="Egreso") return ""; var c=CATS[category]; return c?c.et:""; }

/* ---------------------- saldo de efectivo / totales ---------------------- */
function activeEntries(entries){ return Object.keys(entries||{}).map(function(k){return entries[k];}).filter(function(e){return e && !e.deleted;}); }
function cashDelta(e){
  if(e.deleted) return 0;
  if(e.kind==="transfer"){ var d=0; if(e.fromAccount==="Cash") d-=(e.amount||0); if(e.toAccount==="Cash") d+=(e.amount||0); return d; }
  if(e.account!=="Cash") return 0;
  if(typeof e.amount!=="number") return 0;
  return e.type==="Ingreso"? e.amount : -e.amount;
}
function computeBalance(entries, startingBalance){
  var b=Number(startingBalance)||0;
  activeEntries(entries).forEach(function(e){ b+=cashDelta(e); });
  return Math.round(b*100)/100;
}
function inRange(d,from,to){ if(from&&d<from) return false; if(to&&d>to) return false; return true; }
function cashTotals(entries, from, to){
  var inn=0,out=0;
  activeEntries(entries).forEach(function(e){ if(!inRange(e.date,from,to)) return; var d=cashDelta(e); if(d>0)inn+=d; else out+=-d; });
  return {inn:Math.round(inn*100)/100, out:Math.round(out*100)/100};
}
/* totales por categoría (egresos, todas las cuentas, sin transferencias) */
function categoryTotals(entries, from, to, kind){
  kind=kind||"Egreso"; var map={};
  activeEntries(entries).forEach(function(e){
    if(e.kind==="transfer") return; if(!inRange(e.date,from,to)) return;
    if(e.type!==kind) return; var c=e.category||"Sin categoría";
    map[c]=(map[c]||0)+(e.amount||0);
  });
  return Object.keys(map).map(function(c){return {category:c, total:Math.round(map[c]*100)/100};})
    .sort(function(a,b){return b.total-a.total;});
}

/* ---------------------- exportación ---------------------- */
var COLS_NORMAL=["Date","Amount","Transaction","Expense Type","Account","Place","Payment Method","Details","Tags"];
var COLS_TDC=["Date","Amount","Expense Type","Account","Place","Medio de pago","Detalle","# en Meses","Tags"];
function amountForExport(n){ var r=Math.round(n*100)/100; return (r%1===0)?String(r):r.toFixed(2); }
function entryTab(e){ if(e.kind==="transfer") return isTDC(e.toAccount)?"tdc":"normal"; return isTDC(e.account)?"tdc":"normal"; }
function expandEntry(e){
  if(e.kind==="transfer"){
    if(isTDC(e.toAccount)){
      return [{tab:"tdc", row:[formatDateMD(e.date), amountForExport(-(e.amount||0)), "", "Transferencias", e.toAccount, e.fromAccount||"", e.details||"", (e.msi||1), ""]}];
    }
    return [
      {tab:"normal", row:[formatDateMD(e.date), amountForExport(e.amount||0), "Egreso", "", "Transferencias", "", e.fromAccount||"", e.details||"", ""]},
      {tab:"normal", row:[formatDateMD(e.date), amountForExport(e.amount||0), "Ingreso", "", "Transferencias", "", e.toAccount||"", e.details||"", ""]}
    ];
  }
  if(isTDC(e.account)){
    var signed=e.type==="Egreso"?(e.amount||0):-(e.amount||0);
    return [{tab:"tdc", row:[formatDateMD(e.date), amountForExport(signed), e.expenseType||"", e.category||"", e.place||"", e.account, e.details||"", (e.msi||1), ""]}];
  }
  return [{tab:"normal", row:[formatDateMD(e.date), amountForExport(e.amount||0), e.type||"", e.expenseType||"", e.category||"", e.place||"", e.account||"", e.details||"", ""]}];
}
function tsvForTab(entriesArr, tab, withHeader){
  var lines=[]; if(withHeader) lines.push((tab==="tdc"?COLS_TDC:COLS_NORMAL).join("\t"));
  entriesArr.forEach(function(e){ expandEntry(e).forEach(function(x){ if(x.tab===tab) lines.push(x.row.join("\t")); }); });
  return lines.join("\n");
}

/* ---------------------- dinero ---------------------- */
function formatMoney(n){
  var neg=n<0; n=Math.abs(Math.round(n*100)/100);
  var s=(n%1===0)?String(n):n.toFixed(2), parts=s.split("."); parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,",");
  return (neg?"-$":"$")+parts.join(".");
}

/* ---------------------- export del módulo ---------------------- */
var api={
  CATS:CATS,CAT_LIST:CAT_LIST,CAT_GROUPS:CAT_GROUPS,RULES:RULES,
  ACCOUNTS:ACCOUNTS,ACCT_NAMES:ACCT_NAMES,isTDC:isTDC,
  COLS_NORMAL:COLS_NORMAL,COLS_TDC:COLS_TDC,
  deaccent:deaccent,normAlnum:normAlnum,hasKw:hasKw,
  iso:iso,todayISO:todayISO,fromISO:fromISO,addDays:addDays,parseDate:parseDate,formatDateMD:formatDateMD,
  parseAmount:parseAmount,normalizeNumber:normalizeNumber,parseMSI:parseMSI,
  detectAccount:detectAccount,aliasIn:aliasIn,firstTDCIn:firstTDCIn,parseTransfer:parseTransfer,
  detectType:detectType,detectCategory:detectCategory,extractPlace:extractPlace,extractDetails:extractDetails,
  parseText:parseText,parseMulti:parseMulti,expenseTypeFor:expenseTypeFor,
  activeEntries:activeEntries,cashDelta:cashDelta,computeBalance:computeBalance,
  cashTotals:cashTotals,categoryTotals:categoryTotals,inRange:inRange,
  entryTab:entryTab,expandEntry:expandEntry,tsvForTab:tsvForTab,amountForExport:amountForExport,formatMoney:formatMoney
};
if(typeof module!=="undefined"&&module.exports) module.exports=api; else root.CashyEngine=api;
})(typeof window!=="undefined"?window:globalThis);

"use strict";
var E=window.CashyEngine;

/* ===== Supabase (mismo proyecto/cuenta que rutinas) ===== */
var SUPABASE_URL="https://zudkpqzrgqkjymmzeryv.supabase.co";
var SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1ZGtwcXpyZ3FranltbXplcnl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMDkwNDUsImV4cCI6MjA5ODY4NTA0NX0.S0wPUzblMvLnP4m2kBeUSh26TROkf89ZzGfYwAd0ZT0";
var TABLE="cash_data";
var SYNC_ON=/^https:\/\/.+\.supabase\.co/.test(SUPABASE_URL)&&SUPABASE_ANON_KEY.length>30;
var sb=null,session=null,applyingRemote=false,pushTimer=null,syncMsg="";

/* ===== storage ===== */
var KEY="cashy_db_v1",SCHEMA=2;
var DB=read(KEY)||null;
function read(k){ try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;} }
function persist(){ try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){} }
function save(){ persist(); if(session&&!applyingRemote) scheduleSync(); }
function blankDB(){ return {schemaVersion:SCHEMA,updatedAt:0,
  settings:{startingBalance:0,startingBalanceDate:E.todayISO(),webhookUrl:"",reminderTime:"21:00",catET:{},favAccounts:["Cash","BBVA Dr","Openbank","LikeU"],lastAccount:"Cash",customRules:[]},
  entries:{},learn:{places:{}}}; }
function migrate(d){
  if(!d) d=blankDB();
  d.schemaVersion=SCHEMA; d.settings=d.settings||{};
  var s=d.settings;
  if(typeof s.startingBalance!=="number") s.startingBalance=0;
  s.startingBalanceDate=s.startingBalanceDate||E.todayISO();
  s.webhookUrl=s.webhookUrl||""; s.reminderTime=s.reminderTime||"21:00";
  s.catET=s.catET||{}; s.favAccounts=s.favAccounts||["Cash","BBVA Dr","Openbank","LikeU"];
  s.lastAccount=s.lastAccount||"Cash"; s.customRules=s.customRules||[];
  d.entries=d.entries||{}; d.learn=d.learn||{places:{}}; d.learn.places=d.learn.places||{};
  for(var id in d.entries){ var e=d.entries[id];
    e.exported=!!e.exported; e.deleted=!!e.deleted;
    if(e.kind!=="transfer"){ e.kind="txn"; if(!e.account) e.account="Cash"; if(typeof e.msi!=="number") e.msi=1; }
  }
  return d;
}
DB=migrate(DB);

/* ===== helpers ===== */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function money(n){ return E.formatMoney(n); }
function toast(m,g){ var t=document.getElementById("toast"); t.textContent=m; t.className="show"+(g?" good":""); clearTimeout(t._h); t._h=setTimeout(function(){t.className="";},1900); }
function etFor(cat,type){ if(type!=="Egreso") return ""; if(DB.settings.catET&&Object.prototype.hasOwnProperty.call(DB.settings.catET,cat)) return DB.settings.catET[cat]; return E.expenseTypeFor(cat,type); }
function balance(){ return E.computeBalance(DB.entries,DB.settings.startingBalance); }
function catInitial(c){ return (c||"?").replace(/[^A-Za-zÁÉÍÓÚÑ]/,"").charAt(0).toUpperCase()||"$"; }
function parseCtx(){ return {today:E.todayISO(),learn:DB.learn,customRules:DB.settings.customRules,account:V.account}; }
function jsq(s){ return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }
function unq(s){ return String(s).replace(/\\'/g,"'").replace(/\\\\/g,"\\"); }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

/* ===== estado ===== */
var V={tab:"reg",prevTab:"reg",mode:"Gasto",amt:"",cat:null,
  account:DB.settings.lastAccount||"Cash",xferFrom:"BBVA Dr",xferTo:"Cash",
  histMonth:E.todayISO().slice(0,7),expScope:"pend",expFrom:"",expTo:"",
  resMonth:E.todayISO().slice(0,7),resKind:"Egreso"};

/* ===== iconos ===== */
var IC={
  reg:'<path d="M12 5v14M5 12h14"/>',
  saldo:'<rect x="3" y="6" width="18" height="12" rx="2.4"/><circle cx="12" cy="12" r="2.2"/><path d="M6 9v6M18 9v6"/>',
  hist:'<circle cx="12" cy="12" r="8.5"/><path d="M12 8v4l3 2"/>',
  res:'<path d="M4 20h16"/><path d="M7 20v-6M12 20v-10M17 20v-8"/>',
  exp:'<path d="M12 4v11M8 11l4 4 4-4"/><path d="M5 19.5h14"/>',
  gear:'<circle cx="12" cy="12" r="3.2"/><path d="M19.1 13.2a7.6 7.6 0 000-2.4l1.9-1.4-1.9-3.3-2.3 1a7.6 7.6 0 00-2-1.2L14.4 3H9.6l-.4 2.9a7.6 7.6 0 00-2 1.2l-2.3-1L3 8.4l1.9 1.4a7.6 7.6 0 000 2.4L3 13.6l1.9 3.3 2.3-1a7.6 7.6 0 002 1.2l.4 2.9h4.8l.4-2.9a7.6 7.6 0 002-1.2l2.3 1 1.9-3.3z"/>',
  back:'<path d="M15 5l-7 7 7 7"/>',
  chevL:'<path d="M14 6l-6 6 6 6"/>',chevR:'<path d="M10 6l6 6-6 6"/>',
  chevD:'<path d="M6 9l6 6 6-6"/>',
  del:'<path d="M6 6l12 12M18 6L6 18"/>',
  mic:'<rect x="9" y="3" width="6" height="12" rx="3"/><path d="M6 11a6 6 0 0012 0"/><path d="M12 17v3M9 20h6"/>',
  spark:'<path d="M12 3l1.7 4.6L18 9l-4.3 1.4L12 15l-1.7-4.6L6 9l4.3-1.4z"/>',
  copy:'<rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/>',
  send:'<path d="M4 12l16-7-7 16-2-6z"/>',
  check:'<path d="M4 12l5 5L20 6"/>',
  star:'<path d="M12 3l2.6 5.3 5.8.85-4.2 4.1 1 5.75L12 17l-5.2 2.6 1-5.75-4.2-4.1 5.8-.85z"/>',
  xfer:'<path d="M4 8h13M14 5l3 3-3 3M20 16H7M10 13l-3 3 3 3"/>',
  down:'<path d="M12 4v11M8 11l4 4 4-4"/><path d="M5 19.5h14"/>'
};
function ico(n,s){s=s||22;return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+(IC[n]||"")+'</svg>';}

/* ===== render ===== */
function render(){
  document.body.className=(V.tab==="reg")?"reg":"";
  var app=document.getElementById("app");
  if(V.tab==="reg") app.innerHTML=viewReg();
  else if(V.tab==="saldo") app.innerHTML=viewSaldo();
  else if(V.tab==="hist") app.innerHTML=viewHist();
  else if(V.tab==="res") app.innerHTML=viewResumen();
  else if(V.tab==="exp") app.innerHTML=viewExport();
  else if(V.tab==="set") app.innerHTML=viewSettings();
  renderTabs();
  if(V.tab!=="reg") window.scrollTo(0,0);
}
function go(tab){ if(tab==="set") V.prevTab=(V.tab==="set"?V.prevTab:V.tab); V.tab=tab; render(); }
function back(){ V.tab=V.prevTab||"reg"; render(); }

function header(title,withBack){
  var left = withBack
    ? '<button class="iconbtn" onclick="back()">'+ico("back",20)+'</button><div class="title">'+esc(title)+'</div>'
    : (title?('<div class="title">'+esc(title)+'</div>'):'<div class="brand">CASH<b>Y</b></div>');
  var b=balance();
  var right = (V.tab==="reg"||V.tab==="saldo")
    ? '<div class="bal" onclick="go(\'saldo\')">Efectivo<b>'+esc(money(b))+'</b></div>'
    : '';
  return '<div class="head"><div class="lft">'+left+'</div>'+
    '<div class="rgt">'+right+'<button class="iconbtn" onclick="go(\'set\')">'+ico("gear",19)+'</button></div></div>';
}

/* ============ REGISTRAR ============ */
function viewReg(){
  var modes=[["Gasto","out"],["Ingreso","in"],["Transferencia","xf"]];
  var seg=modes.map(function(m){ var on=V.mode===m[0]; return '<button class="'+(on?"on "+m[1]:"")+'" onclick="setMode(\''+m[0]+'\')">'+m[0]+'</button>'; }).join("");
  var isX=V.mode==="Transferencia";

  var acctUI;
  if(isX){
    acctUI='<div class="xfrow">'+
      acctPill("Desde",V.xferFrom,"pickXfer('from')")+
      '<div class="ar">'+ico("chevR",20)+'</div>'+
      acctPill("Hasta",V.xferTo,"pickXfer('to')")+'</div>'+
      '<div class="chips">'+xferPreset("Retiro","BBVA Dr","Cash")+xferPreset("Depósito","Cash","BBVA Dr")+xferPreset("Pago TDC","BBVA Dr","LikeU")+'</div>';
  } else {
    acctUI=acctPill("Cuenta",V.account,"pickAccount()");
  }

  var lbl=(V.mode==="Ingreso")?"Entra":(V.mode==="Gasto"?"Sale":"Mueves");
  var chips="";
  if(!isX){
    var list=freqCats(V.mode);
    chips='<div class="chips">'+list.map(function(c){return '<button class="chip'+(V.cat===c?" on":"")+'" onclick="pickChip(\''+jsq(c)+'\')">'+esc(c)+'</button>';}).join("")+
      '<button class="chip more" onclick="openSheetFromPad()">Más…</button></div>';
  }

  var pad=[["1"],["2"],["3"],["4"],["5"],["6"],["7"],["8"],["9"],["dot"],["0"],["back"]].map(function(k){
    if(k[0]==="back") return '<button class="key" onclick="padBack()">'+ico("back",22)+'</button>';
    if(k[0]==="dot") return '<button class="key sub" onclick="padDot()">.</button>';
    return '<button class="key" onclick="padDigit(\''+k[0]+'\')">'+k[0]+'</button>';
  }).join("");

  return header()+
    '<div class="regpage">'+
      '<div class="seg">'+seg+'</div>'+
      acctUI+
      '<div class="hero"><div class="lbl">'+lbl+'</div><div class="amt'+(V.amt?"":" zero")+'"><span class="cur">$</span>'+heroAmt()+'</div></div>'+
      '<div class="microw">'+
        '<button class="micbtn" onclick="focusNL()">'+ico("mic",24)+'</button>'+
        '<input class="nlfield" id="nlText" placeholder="Dicta o escribe: «50 en tacos ayer»" enterkeyhint="go" onkeydown="if(event.key===\'Enter\')interpret()">'+
      '</div>'+
      chips+
      '<div class="pad">'+pad+'</div>'+
      '<button class="btn primary" onclick="quickSave()">'+ico("check",20)+' Guardar</button>'+
    '</div>';
}
function acctPill(lbl,name,onclick){
  return '<button class="acctpill" onclick="'+onclick+'"><span class="lbl">'+lbl+'</span>'+
    '<span class="nm'+(E.isTDC(name)?" tdc":"")+'">'+esc(name)+'</span>'+ico("chevD",16)+'</button>';
}
function xferPreset(lbl,from,to){ return '<button class="chip" onclick="V.xferFrom=\''+jsq(from)+'\';V.xferTo=\''+jsq(to)+'\';render()">'+esc(lbl)+'</button>'; }
function heroAmt(){ var s=V.amt||"0",p=s.split("."); var i=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,","); return p.length>1?i+'<span class="dec">.'+esc(p[1])+'</span>':i; }
function freqCats(mode){
  if(mode==="Ingreso") return ["Otros Ingresos","Reembolsable","Cashback","Regalos"];
  var count={}; E.activeEntries(DB.entries).forEach(function(e){ if(e.kind!=="transfer"&&e.type==="Egreso"&&e.category) count[e.category]=(count[e.category]||0)+1; });
  var seed=["Restaurante","Abarrotes","Gasolina","Uber","Delivery","Salidas"];
  var out=[]; Object.keys(count).sort(function(a,b){return count[b]-count[a];}).concat(seed).forEach(function(c){ if(out.indexOf(c)<0&&E.CATS[c]&&E.CATS[c].kind==="out") out.push(c); });
  return out.slice(0,7);
}
function setMode(m){ V.mode=m; if(m==="Transferencia") V.cat=null; render(); }
function pickChip(c){ c=unq(c); if(V.amt&&parseFloat(V.amt)>0){ V.cat=c; quickSave(); return; } V.cat=(V.cat===c?null:c); render(); }
function padDigit(d){ if(V.amt.replace(".","").length>=10) return; if(V.amt==="0") V.amt=""; V.amt+=d; refreshHero(); }
function padDot(){ if(V.amt.indexOf(".")>=0) return; if(!V.amt) V.amt="0"; V.amt+="."; refreshHero(); }
function padBack(){ V.amt=V.amt.slice(0,-1); refreshHero(); }
function refreshHero(){ var el=document.querySelector(".hero .amt"); if(el){ el.className="amt"+(V.amt?"":" zero"); el.innerHTML='<span class="cur">$</span>'+heroAmt(); } }
function currentAmount(){ var n=parseFloat(V.amt); return isNaN(n)?0:Math.round(n*100)/100; }
function focusNL(){ var el=document.getElementById("nlText"); if(el){ el.focus(); } }

function quickSave(){
  var amt=currentAmount();
  if(amt<=0){ toast("Escribe un monto"); return; }
  if(V.mode==="Transferencia"){
    if(V.xferFrom===V.xferTo){ toast("Elige cuentas distintas"); return; }
    commitTransfer({date:E.todayISO(),amount:amt,fromAccount:V.xferFrom,toAccount:V.xferTo,details:"",msi:1});
    V.amt=""; render(); toast("Transferencia "+money(amt),true); return;
  }
  var type=(V.mode==="Ingreso")?"Ingreso":"Egreso";
  if(!V.cat){ openSheetFromPad(); return; }
  commitTxn({date:E.todayISO(),amount:amt,type:type,category:V.cat,account:V.account,place:"",details:"",expenseType:etFor(V.cat,type),msi:1});
  rememberAccount(); V.amt=""; V.cat=null; render(); toast(money(amt)+" · "+V.cat,true);
}
function rememberAccount(){ DB.settings.lastAccount=V.account; }

function interpret(){
  var el=document.getElementById("nlText"); if(!el) return;
  var text=(el.value||"").trim(); if(!text){ toast("Escribe o dicta algo"); return; }
  var drafts=E.parseMulti(text,parseCtx());
  if(drafts.length>1){ openMulti(drafts); return; }
  var r=drafts[0];
  if(r.kind==="transfer"){
    openSheet(null,null,"Confirmar transferencia",{kind:"transfer",date:r.date,amount:r.amount||currentAmount()||0,fromAccount:r.fromAccount||V.xferFrom,toAccount:r.toAccount||V.xferTo,details:r.details||"",msi:r.msi||1});
    return;
  }
  openSheet({date:r.date,amount:r.amount||currentAmount()||0,type:r.type||"Egreso",category:r.category,account:r.account||V.account,place:r.place||"",details:r.details||"",expenseType:r.category?etFor(r.category,r.type||"Egreso"):"",msi:r.msi||1},null,"Confirmar registro");
}
function openSheetFromPad(){
  if(V.mode==="Transferencia"){ openSheet(null,null,"Nueva transferencia",{kind:"transfer",date:E.todayISO(),amount:currentAmount(),fromAccount:V.xferFrom,toAccount:V.xferTo,details:"",msi:1}); return; }
  var type=(V.mode==="Ingreso")?"Ingreso":"Egreso";
  openSheet({date:E.todayISO(),amount:currentAmount(),type:type,category:V.cat,account:V.account,place:"",details:"",expenseType:V.cat?etFor(V.cat,type):"",msi:1},null,"Nuevo registro");
}

/* ============ SALDO ============ */
function viewSaldo(){
  var b=balance(),mIso=E.todayISO().slice(0,7),t=E.cashTotals(DB.entries,mIso+"-01",mIso+"-31");
  return header()+
    '<div class="card bigbal"><div class="lbl">Efectivo en mano</div><div class="v'+(b<0?" neg":"")+'">'+esc(money(b))+'</div></div>'+
    '<div class="twocol"><div class="card"><div class="k">Entró (mes)</div><div class="val in">'+esc(money(t.inn))+'</div></div>'+
    '<div class="card"><div class="k">Salió (mes)</div><div class="val out">'+esc(money(t.out))+'</div></div></div>'+
    '<button class="btn ghost" onclick="reconcile()">Cuadrar efectivo con lo que traigo</button>'+
    '<div style="height:10px"></div>'+
    '<button class="btn ghost" onclick="editStart()">Saldo inicial ('+esc(money(DB.settings.startingBalance))+')</button>'+
    '<div class="sechead"><h3>Últimos movimientos</h3></div>'+ recentList(7);
}
function recentList(n){
  var arr=E.activeEntries(DB.entries).sort(sortDesc);
  if(!arr.length) return '<div class="empty"><div class="big">Sin movimientos</div>Registra tu primer gasto o carga de efectivo.</div>';
  return arr.slice(0,n).map(entryRow).join("");
}
function reconcile(){
  var cur=balance(),v=prompt("¿Cuánto efectivo traes en realidad? (saldo actual: "+money(cur)+")");
  if(v==null) return; var real=parseFloat(String(v).replace(/[^0-9.\-]/g,"")); if(isNaN(real)){ toast("Monto no válido"); return; }
  var diff=Math.round((real-cur)*100)/100; if(diff===0){ toast("Ya estaba cuadrado ✔",true); return; }
  commitTxn({date:E.todayISO(),amount:Math.abs(diff),type:diff>0?"Ingreso":"Egreso",category:"Ajuste/Pendiente",account:"Cash",place:"",details:"Ajuste de efectivo",expenseType:"",msi:1});
  render(); toast("Cuadrado: "+(diff>0?"+":"")+money(diff),true);
}
function editStart(){ var v=prompt("Saldo inicial de efectivo:",DB.settings.startingBalance); if(v==null) return; var n=parseFloat(String(v).replace(/[^0-9.\-]/g,"")); if(isNaN(n)){toast("Monto no válido");return;} DB.settings.startingBalance=Math.round(n*100)/100; save(); render(); toast("Actualizado",true); }

/* ============ HISTORIAL ============ */
function viewHist(){
  var m=V.histMonth,label=E.fromISO(m+"-01").toLocaleDateString("es-MX",{month:"long",year:"numeric"});
  var arr=E.activeEntries(DB.entries).filter(function(e){return e.date.slice(0,7)===m;}).sort(sortDesc);
  var t=E.cashTotals(DB.entries,m+"-01",m+"-31");
  var body="";
  if(!arr.length) body='<div class="empty"><div class="big">Mes vacío</div>No hay movimientos en '+esc(label)+'.</div>';
  else{ var last=""; arr.forEach(function(e){ if(e.date!==last){ last=e.date; body+='<div class="daygrp">'+esc(dayLabel(e.date))+'</div>'; } body+=entryRow(e); }); }
  return header()+
    '<div class="sechead"><h3>'+esc(cap(label))+'</h3><div class="nav"><button onclick="shiftMonth(-1)">'+ico("chevL",18)+'</button><button onclick="shiftMonth(1)">'+ico("chevR",18)+'</button></div></div>'+
    '<div class="twocol"><div class="card"><div class="k">Efectivo entró</div><div class="val in">'+esc(money(t.inn))+'</div></div>'+
    '<div class="card"><div class="k">Efectivo salió</div><div class="val out">'+esc(money(t.out))+'</div></div></div>'+ body;
}
function shiftMonth(d){ var dt=E.fromISO(V.histMonth+"-01"); dt.setMonth(dt.getMonth()+d); V.histMonth=E.iso(dt).slice(0,7); render(); }
function sortDesc(a,b){ return (b.date+"~"+(b.createdAt||0))<(a.date+"~"+(a.createdAt||0))?-1:1; }
function entryRow(e){
  if(e.kind==="transfer"){
    var tdc=E.isTDC(e.toAccount);
    var sub=(e.fromAccount||"?")+" → "+(e.toAccount||"?")+(e.details?(" · "+e.details):"");
    return '<div class="row" onclick="openEdit(\''+e.id+'\')"><div class="ic xf">'+ico("xfer",18)+'</div>'+
      '<div class="mid"><div class="t">'+(tdc?"Pago tarjeta":"Transferencia")+'</div><div class="s">'+esc(sub)+'</div></div>'+
      (e.exported?'<div class="dot"></div>':'')+'<div class="amt xf">'+esc(money(e.amount).replace("$",""))+'</div></div>';
  }
  var sign=e.type==="Ingreso"?"+":"−", tdc=E.isTDC(e.account);
  var sub=[e.account!=="Cash"?e.account:"",e.place,e.details].filter(Boolean).join(" · ")||(e.expenseType||e.type);
  return '<div class="row" onclick="openEdit(\''+e.id+'\')"><div class="ic'+(tdc?" tdc":"")+'">'+esc(catInitial(e.category))+'</div>'+
    '<div class="mid"><div class="t">'+esc(e.category||"Sin categoría")+'</div><div class="s">'+esc(sub)+'</div></div>'+
    (e.exported?'<div class="dot"></div>':'')+'<div class="amt '+(e.type==="Ingreso"?"in":"out")+'">'+sign+esc(money(e.amount).replace("$",""))+'</div></div>';
}

/* ============ RESUMEN / GRÁFICAS ============ */
function viewResumen(){
  var m=V.resMonth,label=E.fromISO(m+"-01").toLocaleDateString("es-MX",{month:"long",year:"numeric"});
  var rows=E.categoryTotals(DB.entries,m+"-01",m+"-31",V.resKind);
  var total=rows.reduce(function(s,r){return s+r.total;},0);
  var seg='<div class="seg" style="margin-bottom:14px">'+
    '<button class="'+(V.resKind==="Egreso"?"on out":"")+'" onclick="V.resKind=\'Egreso\';render()">Gastos</button>'+
    '<button class="'+(V.resKind==="Ingreso"?"on in":"")+'" onclick="V.resKind=\'Ingreso\';render()">Ingresos</button></div>';
  var bars = rows.length? rows.map(function(r){
    var pct=total>0?Math.round(r.total/total*100):0;
    return '<div class="bar'+(V.resKind==="Ingreso"?" in":"")+'"><div class="lab"><span class="c">'+esc(r.category)+'</span><span class="v">'+esc(money(r.total))+'</span></div>'+
      '<div class="track"><div class="fill" style="width:'+Math.max(pct,2)+'%"></div></div></div>';
  }).join("") : '<div class="empty"><div class="big">Sin datos</div>No hay '+(V.resKind==="Egreso"?"gastos":"ingresos")+' en '+esc(label)+'.</div>';
  return header("Resumen")+
    '<div class="sechead" style="margin-top:0"><h3>'+esc(cap(label))+'</h3><div class="nav"><button onclick="shiftRes(-1)">'+ico("chevL",18)+'</button><button onclick="shiftRes(1)">'+ico("chevR",18)+'</button></div></div>'+
    seg+
    '<div class="card" style="text-align:center;padding:16px"><div class="k" style="font-size:12px;color:var(--faint);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px">'+(V.resKind==="Egreso"?"Total gastado":"Total ingresos")+'</div><div style="font-family:var(--fd);font-size:40px;letter-spacing:.02em;'+(V.resKind==="Ingreso"?"color:var(--green)":"")+'">'+esc(money(total))+'</div></div>'+
    bars;
}
function shiftRes(d){ var dt=E.fromISO(V.resMonth+"-01"); dt.setMonth(dt.getMonth()+d); V.resMonth=E.iso(dt).slice(0,7); render(); }

/* ============ EXPORTAR ============ */
function scopeEntries(){
  var arr=E.activeEntries(DB.entries).slice().sort(function(a,b){ return (a.date+"~"+(a.createdAt||0))<(b.date+"~"+(b.createdAt||0))?-1:1; });
  if(V.expScope==="pend") return arr.filter(function(e){return !e.exported;});
  if(V.expScope==="mes"){ var m=E.todayISO().slice(0,7); return arr.filter(function(e){return e.date.slice(0,7)===m;}); }
  if(V.expScope==="rango"){ var f=V.expFrom,t=V.expTo; return arr.filter(function(e){return E.inRange(e.date,f||null,t||null);}); }
  return arr;
}
function viewExport(){
  var scopes=[["pend","Pendientes"],["mes","Este mes"],["rango","Rango"],["all","Todo"]];
  var seg=scopes.map(function(s){return '<button class="'+(V.expScope===s[0]?"on out":"")+'" onclick="V.expScope=\''+s[0]+'\';render()">'+s[1]+'</button>';}).join("");
  var rangeUI = V.expScope==="rango"
    ? '<div class="twocol" style="margin:12px 0 0"><div class="field" style="flex:1;margin:0"><div class="fl">Desde</div><input type="date" value="'+esc(V.expFrom)+'" oninput="V.expFrom=this.value;render()"></div>'+
      '<div class="field" style="flex:1;margin:0"><div class="fl">Hasta</div><input type="date" value="'+esc(V.expTo)+'" oninput="V.expTo=this.value;render()"></div></div>' : '';
  var arr=scopeEntries();
  var tsvN=E.tsvForTab(arr,"normal",false), tsvT=E.tsvForTab(arr,"tdc",false);
  var nN=tsvN?tsvN.split("\n").length:0, nT=tsvT?tsvT.split("\n").length:0;
  return header("Exportar")+
    '<div class="seg">'+seg+'</div>'+ rangeUI+
    '<div class="card" style="margin-top:12px"><p style="margin:0;color:var(--dim);font-size:13px;line-height:1.5">Pega directo en tu hoja. <b style="color:var(--bone)">Cuentas normales</b> abajo y <b style="color:var(--bone)">TDC</b> aparte, cada una en el orden de tus columnas.</p></div>'+
    '<div class="sechead" style="margin-top:6px"><h3>Cuentas normales · '+nN+'</h3></div>'+
    '<textarea class="export-ta" readonly id="taN">'+esc(tsvN||"(vacío)")+'</textarea>'+
    '<button class="btn primary mini" style="margin-top:10px" onclick="copyTA(\'taN\','+nN+')">'+ico("copy",17)+' Copiar cuentas normales</button>'+
    '<div class="sechead"><h3>Tarjetas TDC · '+nT+'</h3></div>'+
    '<textarea class="export-ta" readonly id="taT">'+esc(tsvT||"(vacío)")+'</textarea>'+
    '<button class="btn primary mini" style="margin-top:10px" onclick="copyTA(\'taT\','+nT+')">'+ico("copy",17)+' Copiar TDC</button>'+
    '<div style="height:10px"></div>'+
    '<button class="btn ghost mini" onclick="markExported()">'+ico("check",17)+' Marcar como exportados</button>'+
    '<div class="sblk" style="margin-top:16px"><h3>Google Sheets (opcional)</h3>'+
      '<p>Manda los pendientes solitos: cuentas normales a la pestaña «Cashy» y TDC a «TDC».</p>'+
      '<div class="field"><input id="whUrl" placeholder="https://script.google.com/…/exec" value="'+esc(DB.settings.webhookUrl)+'"></div>'+
      '<div style="display:flex;gap:10px"><button class="btn ghost mini" style="flex:1" onclick="saveWebhook()">Guardar URL</button>'+
      '<button class="btn ghost mini" style="flex:1" onclick="sendWebhook()">'+ico("send",16)+' Enviar pendientes</button></div>'+
      '<div class="sync-line" id="whMsg"></div></div>';
}
function copyTA(id,n){ var ta=document.getElementById(id); if(!ta||!ta.value||ta.value==="(vacío)"){ toast("Nada para copiar"); return; }
  copyText(ta.value,function(){ toast("Copiado ✔ ("+n+" renglones)",true); }, ta); }
function copyText(text,cb,ta){ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(cb,function(){fb(ta,cb);}); } else fb(ta,cb); }
function fb(ta,cb){ if(ta){ ta.focus(); ta.select(); try{document.execCommand("copy"); cb&&cb(); return;}catch(e){} } toast("Selecciona y copia manual"); }
function markExported(){ var arr=scopeEntries().filter(function(e){return !e.exported;}); if(!arr.length){ toast("No hay pendientes"); return; } arr.forEach(function(e){ e.exported=true; e.updatedAt=Date.now(); }); save(); render(); toast(arr.length+" marcados",true); }
function saveWebhook(){ var el=document.getElementById("whUrl"); DB.settings.webhookUrl=el?el.value.trim():""; save(); toast("URL guardada",true); }
function sendWebhook(){
  var url=((document.getElementById("whUrl")||{}).value||"").trim();
  if(!/^https:\/\/script\.google\.com\//.test(url)){ setWh("Pon una URL válida de Apps Script."); return; }
  DB.settings.webhookUrl=url; save();
  var arr=scopeEntries().filter(function(e){return !e.exported;});
  if(!arr.length){ setWh("No hay pendientes por enviar."); return; }
  var normal=[],tdc=[]; arr.forEach(function(e){ E.expandEntry(e).forEach(function(x){ (x.tab==="tdc"?tdc:normal).push(x.row); }); });
  setWh("Enviando "+arr.length+"…");
  var payload=JSON.stringify({normal:normal,tdc:tdc,colsNormal:E.COLS_NORMAL,colsTDC:E.COLS_TDC});
  fetch(url,{method:"POST",mode:"no-cors",body:payload}).then(function(){ arr.forEach(function(e){ e.exported=true; e.updatedAt=Date.now(); }); save(); render(); setWh("Enviados "+arr.length+" ✔ (revisa tu hoja)"); })
    .catch(function(){ setWh("Sin conexión o Google no respondió. Usa Copiar."); });
}
function setWh(m){ var el=document.getElementById("whMsg"); if(el) el.textContent=m; }

/* ============ AJUSTES ============ */
function viewSettings(){
  return header("Ajustes",true)+
    syncBlock()+
    '<div class="sblk"><h3>Efectivo</h3><div class="field"><div class="fl">Saldo inicial</div><input id="stBal" inputmode="decimal" value="'+esc(DB.settings.startingBalance)+'"></div><button class="btn ghost mini" onclick="saveStart()">Guardar saldo inicial</button></div>'+
    '<div class="sblk"><h3>Recordatorio</h3><p>iOS no permite avisos programados confiables en apps web. Lo seguro: un <b>Atajo</b> que a esta hora abra Cashy.</p>'+
      '<div class="field"><div class="fl">Hora</div><input id="remTime" type="time" value="'+esc(DB.settings.reminderTime)+'"></div>'+
      '<div style="display:flex;gap:10px"><button class="btn ghost mini" style="flex:1" onclick="saveRem()">Guardar hora</button><button class="btn ghost mini" style="flex:1" onclick="testNotif()">Probar aviso</button></div>'+
      '<details class="foldable" style="margin-top:12px"><summary>Cómo crear el Atajo</summary><p style="margin-top:8px">Atajos → Automatización → Crear → Hora del día → tu hora + Diariamente → acción Abrir app → Cashy.</p></details></div>'+
    customRulesBlock()+
    catETBlock()+
    learnBlock()+
    '<div class="sblk"><h3>Respaldo</h3><p>Descarga o restaura todos tus datos.</p><div style="display:flex;gap:10px"><button class="btn ghost mini" style="flex:1" onclick="backup()">'+ico("down",16)+' Descargar</button><button class="btn ghost mini" style="flex:1" onclick="document.getElementById(\'imp\').click()">Importar</button></div><input type="file" id="imp" accept="application/json" class="hide" onchange="importBackup(event)"></div>'+
    supaBlock()+
    '<div style="text-align:center;color:var(--faint);font-size:12px;margin:18px 0 8px">Cashy · sin fricción</div>';
}
function saveStart(){ var v=(document.getElementById("stBal")||{}).value,n=parseFloat(String(v).replace(/[^0-9.\-]/g,"")); if(isNaN(n)){toast("Monto no válido");return;} DB.settings.startingBalance=Math.round(n*100)/100; save(); toast("Guardado",true); }
function saveRem(){ var v=(document.getElementById("remTime")||{}).value; if(v){ DB.settings.reminderTime=v; save(); toast("Hora guardada",true); } }
function testNotif(){ if(!("Notification" in window)){ toast("Sin soporte de avisos"); return; } Notification.requestPermission().then(function(p){ if(p==="granted"){ try{new Notification("Cashy",{body:"Así se verá tu recordatorio 💵"}); toast("Aviso enviado",true);}catch(e){toast("iOS puede ocultarlo");} } else toast("Permiso denegado"); }); }
function customRulesBlock(){
  var rows=(DB.settings.customRules||[]).map(function(r,i){ return '<div class="catrow"><div class="cn">«'+esc(r[0])+'» → <span style="color:var(--gold)">'+esc(r[1])+'</span></div><div class="tg"><button onclick="rmRule('+i+')">Quitar</button></div></div>'; }).join("")||'<p>Sin palabras propias todavía.</p>';
  var opts=E.CAT_LIST.map(function(c){return '<option value="'+esc(c)+'">'+esc(c)+'</option>';}).join("");
  return '<div class="sblk"><h3>Diccionario (palabras propias)</h3><p>Agrega palabras clave que la app reconocerá al dictar. Ej. «chilaquiles» → Restaurante.</p>'+rows+
    '<div class="field" style="margin-top:10px"><input id="crKw" placeholder="palabra o frase"></div>'+
    '<div class="field"><select id="crCat">'+opts+'</select></div>'+
    '<button class="btn ghost mini" onclick="addRule()">Agregar palabra</button></div>';
}
function addRule(){ var kw=((document.getElementById("crKw")||{}).value||"").trim().toLowerCase(); var cat=(document.getElementById("crCat")||{}).value; if(!kw){toast("Escribe la palabra");return;} DB.settings.customRules.push([kw,cat]); save(); render(); toast("Palabra agregada",true); }
function rmRule(i){ DB.settings.customRules.splice(i,1); save(); render(); }
function catETBlock(){
  var rows=E.CAT_LIST.filter(function(c){return E.CATS[c].kind==="out";}).map(function(c){
    var cur=etFor(c,"Egreso");
    function b(v,l){ return '<button class="'+(cur===v?"on":"")+'" onclick="setCatET(\''+jsq(c)+'\',\''+v+'\')">'+l+'</button>'; }
    return '<div class="catrow"><div class="cn">'+esc(c)+'</div><div class="tg">'+b("Vital","Vital")+b("Extraordinario","Extra")+'</div></div>';
  }).join("");
  return '<div class="sblk"><h3>Vital / Extraordinario</h3><p>Por categoría; cámbialo cuando quieras.</p>'+rows+'</div>';
}
function setCatET(c,v){ c=unq(c); DB.settings.catET[c]=v; save(); render(); }
function learnBlock(){
  var keys=Object.keys(DB.learn.places||{});
  var list=keys.length?keys.map(function(k){return '<div class="catrow"><div class="cn">'+esc(k)+' → <span style="color:var(--gold)">'+esc(DB.learn.places[k])+'</span></div><div class="tg"><button onclick="forget(\''+jsq(k)+'\')">Olvidar</button></div></div>';}).join(""):'<p>Aún no aprende lugares.</p>';
  return '<div class="sblk"><h3>Lugares aprendidos</h3>'+list+'</div>';
}
function forget(k){ k=unq(k); delete DB.learn.places[k]; save(); render(); }
function syncBlock(){
  var inner;
  if(!SYNC_ON) inner='<p>Sincronización no configurada.</p>';
  else if(!session) inner='<p>Entra con la <b>misma cuenta</b> de rutinas para sincronizar.</p><div class="field"><div class="fl">Correo</div><input id="sy-email" inputmode="email" autocomplete="username" placeholder="tu@correo.com"></div><div class="field"><div class="fl">Contraseña</div><input id="sy-pass" type="password" autocomplete="current-password" placeholder="••••••••"></div><button class="btn ghost mini" onclick="uiSignIn(this)">Entrar y sincronizar</button><div class="sync-line" id="syncline">'+esc(syncMsg)+'</div>';
  else inner='<p>Conectado como <b>'+esc((session.user&&session.user.email)||"tu cuenta")+'</b>.</p><div style="display:flex;gap:10px"><button class="btn ghost mini" style="flex:1" onclick="pullRemote()">Sincronizar</button><button class="btn ghost mini" style="flex:1" onclick="uiSignOut()">Salir</button></div><div class="sync-line" id="syncline">'+esc(syncMsg)+'</div>';
  return '<div class="sblk"><h3>Sincronización</h3>'+inner+'</div>';
}
function supaBlock(){
  var sql='create table if not exists cash_data (\n  id uuid primary key references auth.users(id),\n  data jsonb,\n  updated_at timestamptz default now()\n);\nalter table cash_data enable row level security;\ncreate policy "own row" on cash_data\n  for all using (auth.uid() = id) with check (auth.uid() = id);';
  return '<div class="sblk"><h3>Base de datos</h3><details class="foldable"><summary>SQL para crear la tabla (una vez)</summary><div class="mono" style="margin-top:10px">'+esc(sql)+'</div></details></div>';
}

/* ============ SHEET (crear/editar) ============ */
var draft=null,draftId=null;
function openEdit(id){ V.prevTab=V.tab; openSheet(null,id,"Editar"); }
function openSheet(pre,id,title,transferPre){
  if(id){ var e=DB.entries[id]; if(!e) return;
    if(e.kind==="transfer") draft={kind:"transfer",date:e.date,amount:e.amount,fromAccount:e.fromAccount,toAccount:e.toAccount,details:e.details,msi:e.msi||1};
    else draft={kind:"txn",date:e.date,amount:e.amount,type:e.type,category:e.category,account:e.account||"Cash",place:e.place,details:e.details,expenseType:e.expenseType,msi:e.msi||1};
    draftId=id;
  } else if(transferPre){ draft=Object.assign({kind:"transfer"},transferPre); draftId=null; }
  else { draft=Object.assign({kind:"txn",date:E.todayISO(),amount:0,type:"Egreso",category:null,account:V.account,place:"",details:"",expenseType:"",msi:1},pre||{}); draftId=null; }
  renderSheet(title||"Registro");
}
function renderSheet(title){
  var d=draft,body;
  if(d.kind==="transfer"){
    body='<div class="field"><div class="fl">Desde</div>'+acctBtnInline("df",d.fromAccount)+'</div>'+
      '<div class="field"><div class="fl">Hasta</div>'+acctBtnInline("dt",d.toAccount)+'</div>'+
      (E.isTDC(d.toAccount)?'<p style="font-size:12.5px;color:var(--faint);margin:-2px 0 12px">Pago de tarjeta: irá una línea a la pestaña TDC (monto negativo).</p>':'')+
      '<div class="field"><div class="fl">Descripción</div><input id="dfDet" value="'+esc(d.details)+'" oninput="draft.details=this.value"></div>';
  } else {
    var etBtns=d.type==="Egreso"?'<div class="field"><div class="fl">Tipo de gasto</div><div class="pill2"><button class="'+(d.expenseType==="Vital"?"on":"")+'" onclick="draftET(\'Vital\')">Vital</button><button class="'+(d.expenseType==="Extraordinario"?"on":"")+'" onclick="draftET(\'Extraordinario\')">Extra</button><button class="'+(d.expenseType===""?"on":"")+'" onclick="draftET(\'\')">—</button></div></div>':'';
    var msiUI=E.isTDC(d.account)?'<div class="field"><div class="fl">Meses (MSI)</div><input id="dfMsi" inputmode="numeric" value="'+esc(d.msi||1)+'" oninput="draft.msi=Math.max(1,parseInt(this.value.replace(/[^0-9]/g,\'\'))||1)"></div>':'';
    body='<div class="pill2"><button class="'+(d.type==="Egreso"?"on":"")+'" onclick="draftType(\'Egreso\')">Sale (Egreso)</button><button class="'+(d.type==="Ingreso"?"on":"")+'" onclick="draftType(\'Ingreso\')">Entra (Ingreso)</button></div>'+
      '<div class="field" style="margin-top:12px"><div class="fl">Cuenta / método de pago</div>'+acctBtnInline("da",d.account)+'</div>'+
      '<div class="field"><div class="fl">Categoría</div>'+catPickerHTML(d.category)+'</div>'+
      etBtns+ msiUI+
      '<div class="field"><div class="fl">Lugar / vendor</div><input id="dfPlace" value="'+esc(d.place)+'" placeholder="Ej. Oxxo, Frankenstein…" oninput="draft.place=this.value"></div>'+
      '<div class="field"><div class="fl">Descripción</div><input id="dfDet" value="'+esc(d.details)+'" oninput="draft.details=this.value"></div>';
  }
  var root=document.getElementById("sheetroot");
  root.innerHTML='<div class="sheetwrap"><div class="sheetbg" onclick="closeSheet()"></div><div class="sheet"><div class="grab"></div><h2>'+esc(title)+'</h2>'+
    '<input class="amt-edit" id="dfAmt" inputmode="decimal" value="'+esc(d.amount||"")+'" placeholder="0" oninput="draft.amount=parseFloat(this.value.replace(/[^0-9.]/g,\'\'))||0">'+
    body+
    '<div class="field"><div class="fl">Fecha</div><input id="dfDate" type="date" value="'+esc(d.date)+'" oninput="draft.date=this.value"></div>'+
    '<div class="sheetbtns">'+(draftId?'<button class="btn ghost" style="flex:0 0 46px" onclick="deleteEntry()">'+ico("del",20)+'</button>':'')+
    '<button class="btn ghost" onclick="closeSheet()">Cancelar</button><button class="btn primary" onclick="saveSheet()">Guardar</button></div></div></div>';
}
function acctBtnInline(which,name){ return '<button class="acctpill" onclick="pickAccountFor(\''+which+'\')"><span class="nm'+(E.isTDC(name)?" tdc":"")+'">'+esc(name)+'</span>'+ico("chevD",16)+'</button>'; }
function catPickerHTML(sel){
  var h='<div class="catgrid">';
  E.CAT_GROUPS.forEach(function(g){ h+='<div class="gl">'+esc(g[0])+'</div>'; g[1].forEach(function(c){ h+='<button class="'+(sel===c?"on":"")+'" onclick="draftCat(\''+jsq(c)+'\')">'+esc(c)+'</button>'; }); });
  return h+'</div>';
}
function draftType(t){ draft.type=t; if(t==="Ingreso") draft.expenseType=""; else if(draft.category) draft.expenseType=etFor(draft.category,"Egreso"); renderSheet(draftId?"Editar":"Registro"); }
function draftET(v){ draft.expenseType=v; renderSheet(draftId?"Editar":"Registro"); }
function draftCat(c){ c=unq(c); draft.category=c; var k=E.CATS[c]?E.CATS[c].kind:"out"; if(k==="in")draft.type="Ingreso"; else if(k==="out")draft.type="Egreso"; draft.expenseType=etFor(c,draft.type); renderSheet(draftId?"Editar":"Registro"); }
function closeSheet(){ document.getElementById("sheetroot").innerHTML=""; draft=null; draftId=null; }
function saveSheet(){
  var d=draft;
  if(!(d.amount>0)){ toast("Falta el monto"); return; }
  if(d.kind==="transfer"){
    if(d.fromAccount===d.toAccount){ toast("Elige cuentas distintas"); return; }
    commitTransfer({date:d.date,amount:Math.round(d.amount*100)/100,fromAccount:d.fromAccount,toAccount:d.toAccount,details:(d.details||"").trim(),msi:d.msi||1},draftId);
  } else {
    if(!d.category){ toast("Elige una categoría"); return; }
    commitTxn({date:d.date,amount:Math.round(d.amount*100)/100,type:d.type,category:d.category,account:d.account,place:(d.place||"").trim(),details:(d.details||"").trim(),expenseType:d.expenseType||"",msi:E.isTDC(d.account)?(d.msi||1):1},draftId);
  }
  closeSheet(); V.amt=""; V.cat=null; render(); toast("Guardado ✔",true);
}
function deleteEntry(){ if(!draftId) return; if(!confirm("¿Borrar este registro?")) return; var e=DB.entries[draftId]; if(e){ e.deleted=true; e.updatedAt=Date.now(); } save(); closeSheet(); render(); toast("Borrado"); }

/* ---- multi ---- */
var multi=[];
function openMulti(drafts){
  multi=drafts.map(function(r){
    if(r.kind==="transfer") return {kind:"transfer",date:r.date,amount:r.amount||0,fromAccount:r.fromAccount||V.xferFrom,toAccount:r.toAccount||V.xferTo,details:r.details||"",msi:r.msi||1};
    return {kind:"txn",date:r.date,amount:r.amount||0,type:r.type||"Egreso",category:r.category||(r.type==="Ingreso"?"Otros Ingresos":"Restaurante"),account:r.account||V.account,place:r.place||"",details:r.details||"",expenseType:r.category?etFor(r.category,r.type||"Egreso"):"",msi:r.msi||1};
  });
  renderMulti();
}
function renderMulti(){
  var cards=multi.map(function(m,i){
    if(m.kind==="transfer") return '<div class="mcard"><div class="top"><div>'+esc(m.fromAccount)+' → '+esc(m.toAccount)+'</div><div class="a">'+esc(money(m.amount))+'</div></div><button class="rm" onclick="rmMulti('+i+')">Quitar</button></div>';
    var opts=E.CAT_LIST.map(function(c){return '<option value="'+esc(c)+'"'+(m.category===c?" selected":"")+'>'+esc(c)+'</option>';}).join("");
    return '<div class="mcard"><div class="top"><div style="font-size:13px;color:var(--dim)">'+esc(m.account)+' · '+esc(m.type)+'</div><div class="a">'+esc(money(m.amount))+'</div></div>'+
      '<select onchange="multi['+i+'].category=this.value;multi['+i+'].expenseType=(multi['+i+'].type===\'Egreso\'?etFor(this.value,\'Egreso\'):\'\')">'+opts+'</select>'+
      '<button class="rm" style="margin-top:8px" onclick="rmMulti('+i+')">Quitar</button></div>';
  }).join("");
  document.getElementById("sheetroot").innerHTML='<div class="sheetwrap"><div class="sheetbg" onclick="closeMulti()"></div><div class="sheet"><div class="grab"></div><h2>'+multi.length+' movimientos</h2><p style="font-size:13px;color:var(--dim);margin:0 0 12px">Revisa y guarda todos de una.</p>'+cards+'<div class="sheetbtns"><button class="btn ghost" onclick="closeMulti()">Cancelar</button><button class="btn primary" onclick="saveMulti()">Guardar '+multi.length+'</button></div></div></div>';
}
function rmMulti(i){ multi.splice(i,1); if(!multi.length){ closeMulti(); return; } renderMulti(); }
function closeMulti(){ document.getElementById("sheetroot").innerHTML=""; multi=[]; }
function saveMulti(){ var n=multi.length; multi.forEach(function(m){ if(m.kind==="transfer") commitTransfer(m); else commitTxn(m); }); closeMulti(); V.amt=""; V.cat=null; render(); toast(n+" guardados ✔",true); }

/* ---- commit ---- */
function commitTxn(data,id){ commitGeneric(Object.assign({kind:"txn"},data),id,data.place,data.category); }
function commitTransfer(data,id){ commitGeneric(Object.assign({kind:"transfer"},data),id,null,null); }
function commitGeneric(data,id,place,category){
  var now=Date.now();
  if(id&&DB.entries[id]){ var e=DB.entries[id]; for(var k in e){ if(k!=="id"&&k!=="createdAt") delete e[k]; } Object.assign(e,data); e.id=id; e.updatedAt=now; e.exported=false; e.deleted=false; }
  else { var nid=uid(); DB.entries[nid]=Object.assign({id:nid,createdAt:now,updatedAt:now,exported:false,deleted:false},data); }
  if(place&&category&&E.CATS[category]){ var key=E.normAlnum(place); if(key&&key.length>=2) DB.learn.places[key]=category; }
  if(data.account) DB.settings.lastAccount=data.account;
  save();
}

/* ---- respaldo ---- */
function backup(){ var blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"}); var a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="cashy-respaldo-"+E.todayISO()+".json"; a.click(); setTimeout(function(){URL.revokeObjectURL(a.href);},1000); }
function importBackup(ev){ var f=ev.target.files&&ev.target.files[0]; if(!f) return; var r=new FileReader(); r.onload=function(){ try{ var d=JSON.parse(r.result); if(!d||!d.entries){ alert("No es un respaldo válido de Cashy."); return; } DB=migrate(mergeDB(DB,d)); save(); render(); toast("Importado",true); }catch(e){ alert("No se pudo leer el archivo."); } }; r.readAsText(f); }

/* ---- pickers de cuenta ---- */
var pickTarget=null;
function pickAccount(){ pickTarget="reg"; renderAccountSheet(V.account); }
function pickXfer(which){ pickTarget=(which==="from")?"xfFrom":"xfTo"; renderAccountSheet(which==="from"?V.xferFrom:V.xferTo); }
function pickAccountFor(which){ pickTarget=which; renderAccountSheet(which==="df"?draft.fromAccount:which==="dt"?draft.toAccount:draft.account); }
function chooseAccount(name){
  name=unq(name);
  if(pickTarget==="reg"){ V.account=name; DB.settings.lastAccount=name; }
  else if(pickTarget==="xfFrom") V.xferFrom=name;
  else if(pickTarget==="xfTo") V.xferTo=name;
  else if(pickTarget==="df") draft.fromAccount=name;
  else if(pickTarget==="dt") draft.toAccount=name;
  else if(pickTarget==="da") draft.account=name;
  closeAccountSheet();
  if(pickTarget && pickTarget.indexOf("d")===0 && draft) renderSheet(draftId?"Editar":"Registro"); else render();
  pickTarget=null;
}
function toggleFav(name,ev){ ev.stopPropagation(); name=unq(name); var f=DB.settings.favAccounts; var i=f.indexOf(name); if(i>=0) f.splice(i,1); else f.unshift(name); save(); renderAccountSheet(currentPickValue()); }
function currentPickValue(){ if(pickTarget==="reg")return V.account; if(pickTarget==="xfFrom")return V.xferFrom; if(pickTarget==="xfTo")return V.xferTo; if(draft){ if(pickTarget==="df")return draft.fromAccount; if(pickTarget==="dt")return draft.toAccount; return draft.account; } return ""; }
function renderAccountSheet(sel){
  var fav=DB.settings.favAccounts||[];
  function btn(name){ var t=E.isTDC(name); var isFav=fav.indexOf(name)>=0;
    return '<button class="'+(sel===name?"sel":"")+'" onclick="chooseAccount(\''+jsq(name)+'\')"><span>'+esc(name)+'</span>'+(t?'<span class="tag">TDC</span>':'')+
      '<span class="star'+(isFav?" on":"")+'" onclick="toggleFav(\''+jsq(name)+'\',event)">'+ico("star",17)+'</span></button>'; }
  var favList=fav.filter(function(n){return E.ACCT_NAMES.indexOf(n)>=0;});
  var deb=E.ACCOUNTS.filter(function(a){return !a.tdc;}).map(function(a){return a.name;});
  var tdc=E.ACCOUNTS.filter(function(a){return a.tdc;}).map(function(a){return a.name;});
  var html='<div class="sheetwrap"><div class="sheetbg" onclick="closeAccountSheet()"></div><div class="sheet"><div class="grab"></div><h2>Cuenta</h2><div class="acctlist">';
  if(favList.length){ html+='<div class="glabel">Favoritas</div>'+favList.map(btn).join(""); }
  html+='<div class="glabel">Débito y otras</div>'+deb.map(btn).join("");
  html+='<div class="glabel">Tarjetas de crédito</div>'+tdc.map(btn).join("");
  html+='</div></div></div>';
  document.getElementById("sheetroot").innerHTML=html;
}
function closeAccountSheet(){ if(draft) renderSheet(draftId?"Editar":"Registro"); else document.getElementById("sheetroot").innerHTML=""; }

/* ============ SYNC ============ */
function initSync(){
  if(!SYNC_ON) return;
  if(!(window.supabase&&window.supabase.createClient)){ syncMsg="Sin conexión a la nube."; return; }
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  sb.auth.getSession().then(function(res){ session=(res.data&&res.data.session)||null; if(session) afterLogin(); else if(V.tab==="set") render(); });
  sb.auth.onAuthStateChange(function(_e,s){ session=s||null; if(V.tab==="set") render(); });
  window.addEventListener("online",function(){ if(session) pullRemote(); });
  document.addEventListener("visibilitychange",function(){ if(!document.hidden&&session) pullRemote(); });
}
function uiSignIn(btn){ var e=document.getElementById("sy-email"),p=document.getElementById("sy-pass"); doSignIn(e?e.value:"",p?p.value:"",btn); }
function uiSignOut(){ doSignOut(); }
function doSignIn(email,pw,btn){
  if(!sb){ syncMsg="Sync no disponible."; upSync(); return; }
  if(!email||!pw){ syncMsg="Escribe correo y contraseña."; upSync(); return; }
  syncMsg="Entrando…"; upSync(); if(btn) btn.disabled=true;
  sb.auth.signInWithPassword({email:String(email).trim(),password:pw}).then(function(r){ if(btn) btn.disabled=false; if(r.error){ syncMsg="No se pudo entrar: "+r.error.message; if(V.tab==="set") render(); return; } sb.auth.getSession().then(function(res){ session=(res.data&&res.data.session)||null; afterLogin(); }); });
}
function afterLogin(){ pullRemote().then(function(){ pushRemote(); if(V.tab==="set") render(); }); }
function doSignOut(){ try{ if(sb) sb.auth.signOut(); }catch(e){} session=null; if(V.tab==="set") render(); }
function pullRemote(){
  if(!sb||!session) return Promise.resolve();
  syncMsg="Sincronizando…"; upSync();
  return sb.from(TABLE).select("data").eq("id",session.user.id).maybeSingle().then(function(r){
    if(r.error){ syncMsg="Error: "+r.error.message; upSync(); return; }
    if(r.data&&r.data.data){ applyingRemote=true; DB=migrate(mergeDB(DB,r.data.data)); persist(); applyingRemote=false; render(); }
    syncMsg="Sincronizado"; upSync();
  }).catch(function(){ syncMsg="Sin conexión."; upSync(); });
}
function pushRemote(){
  if(!sb||!session) return Promise.resolve();
  DB.updatedAt=Date.now();
  var clean={schemaVersion:DB.schemaVersion,settings:DB.settings,entries:DB.entries,learn:DB.learn,updatedAt:DB.updatedAt};
  return sb.from(TABLE).upsert({id:session.user.id,data:clean,updated_at:new Date().toISOString()}).then(function(r){ syncMsg=r.error?("Error: "+r.error.message):"Sincronizado"; upSync(); }).catch(function(){ syncMsg="Sin conexión."; upSync(); });
}
function scheduleSync(){ if(!sb||!session) return; clearTimeout(pushTimer); syncMsg="Sincronizando…"; upSync(); pushTimer=setTimeout(pushRemote,1500); }
function upSync(){ var el=document.getElementById("syncline"); if(el) el.textContent=syncMsg; }
function mergeDB(local,remote){
  local=local||{}; remote=remote||{};
  var out={schemaVersion:Math.max(local.schemaVersion||1,remote.schemaVersion||1),
    settings:Object.assign({},remote.settings||{},local.settings||{}),
    entries:{},learn:{places:Object.assign({},(remote.learn&&remote.learn.places)||{},(local.learn&&local.learn.places)||{})},
    updatedAt:Math.max(local.updatedAt||0,remote.updatedAt||0)};
  out.settings.catET=Object.assign({},(remote.settings&&remote.settings.catET)||{},(local.settings&&local.settings.catET)||{});
  var le=local.entries||{},re=remote.entries||{},keys={};
  Object.keys(le).forEach(function(k){keys[k]=1;}); Object.keys(re).forEach(function(k){keys[k]=1;});
  Object.keys(keys).forEach(function(k){ var a=le[k],b=re[k]; if(a&&b) out.entries[k]=((a.updatedAt||0)>=(b.updatedAt||0))?a:b; else out.entries[k]=a||b; });
  return out;
}

/* ============ misc ============ */
function dayLabel(isoStr){ var d=E.fromISO(isoStr),t=E.todayISO(); if(isoStr===t) return "Hoy"; if(isoStr===E.addDays(t,-1)) return "Ayer"; return d.toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long"}); }
function renderTabs(){
  var tabs=[["reg","Registrar","reg"],["saldo","Saldo","saldo"],["hist","Historial","hist"],["res","Resumen","res"],["exp","Exportar","exp"]];
  document.getElementById("tabs").innerHTML=tabs.map(function(t){ var on=(V.tab===t[0])||(t[0]==="reg"&&V.tab==="set"); return '<button class="'+(on?"on":"")+'" onclick="go(\''+t[0]+'\')">'+ico(t[2],22)+'<span>'+t[1]+'</span></button>'; }).join("");
}

render();
initSync();
</script>
